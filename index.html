<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Who's Older?</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F5F7;
    --surface: #E8E7E7;
    --border: rgba(30,26,26,0.08);
    --text-primary: #1E1A1A;
    --text-secondary: rgba(30,26,26,0.55);
    --text-hint: rgba(30,26,26,0.32);
    --green: #2A7A45;
    --red: #C0392B;
    --accent: rgba(30,26,26,0.04);
    --divider: rgba(30,26,26,0.12);
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #app.ready {
    opacity: 1;
  }

  /* HEADER */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 14px;
    padding-top: calc(env(safe-area-inset-top) + 18px);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  #title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  #counter-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  #lang-switcher {
    display: flex;
    gap: 2px;
    background: rgba(30,26,26,0.07);
    border-radius: 8px;
    padding: 3px;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--text-hint);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    letter-spacing: 0.05em;
    padding: 3px 7px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn.active {
    background: rgba(30,26,26,0.1);
    color: var(--text-secondary);
  }

  #counter {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    transition: color 0.4s ease;
    min-width: 18px;
    text-align: right;
  }

  #counter.bump {
    animation: counterBump 0.35s ease;
  }

  @keyframes counterBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--text-secondary); }
    100% { transform: scale(1); }
  }

  #counter.reset-anim {
    animation: counterReset 0.5s ease;
  }

  @keyframes counterReset {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* GAME AREA */
  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  /* CARDS */
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px 32px;
    cursor: pointer;
    position: relative;
    transition: background 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.03) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:active::before {
    opacity: 1;
  }

  .card.top {
    border-bottom: 1px solid var(--divider);
  }

  .card.correct {
    background: rgba(42, 122, 69, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.wrong {
    background: rgba(192, 57, 43, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.dimmed {
    opacity: 0.4;
    transition: opacity 0.3s ease;
  }

  .card-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    transition: transform 0.3s ease;
  }

  .person-name {
    font-family: 'PT Serif', serif;
    font-size: clamp(32px, 8.5vw, 48px);
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .person-hint {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .person-year {
    font-family: 'PT Serif', serif;
    font-size: clamp(40px, 11vw, 60px);
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.4s ease, color 0.3s ease;
    margin-top: 6px;
    letter-spacing: -0.02em;
  }

  .person-year.visible {
    opacity: 1;
  }

  .person-year.year-correct {
    color: var(--green);
  }

  .person-year.year-wrong {
    color: var(--red);
  }

  .person-year.year-dimmed {
    color: var(--text-hint);
  }

  #versus {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--divider);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    opacity: 1 !important;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    font-weight: 400;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: versusGlow 2.2s ease-in-out infinite;
  }

  #versus:hover {
    border-color: rgba(30,26,26,0.3);
  }

  @keyframes versusGlow {
    0%, 100% { box-shadow: 0 0 0px 0px rgba(30,26,26,0.0); border-color: rgba(30,26,26,0.12); }
    50% { box-shadow: 0 0 0px 5px rgba(30,26,26,0.07); border-color: rgba(30,26,26,0.28); }
  }

  #versus.clue-active {
    animation: none;
    border-color: rgba(30,26,26,0.35);
    box-shadow: 0 0 0px 4px rgba(30,26,26,0.06);
  }

  /* Clue overlays on cards */
  .clue-text {
    position: absolute;
    left: 0; right: 0;
    bottom: 0; top: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    text-align: center;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    background: rgba(245,245,247,0.93);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 0;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  .clue-text.visible {
    opacity: 1;
  }

  /* Year note (uncertain date) */
  .person-year-note {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.03em;
    margin-top: 2px;
    opacity: 0;
    transition: opacity 0.4s ease;
    text-align: center;
    min-height: 14px;
  }

  .person-year-note.visible {
    opacity: 1;
  }

  /* FUN FACT OVERLAY */
  #fact-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    background: #E3E3E8;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }

  #fact-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* TOP ZONE — dark gradient with name + year + timeline */
  #fact-top-zone {
    flex: 0 0 auto;
    background: #E3E3E8;
    padding: 36px 28px 60px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #fact-name {
    font-family: 'PT Serif', serif;
    font-size: clamp(32px, 9vw, 46px);
    font-weight: 400;
    color: #1E1A1A;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  #fact-year {
    font-family: 'PT Serif', serif;
    font-size: clamp(28px, 7.5vw, 40px);
    font-weight: 400;
    color: rgba(30,26,26,0.45);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  #fact-note {
    font-size: 11px;
    font-weight: 400;
    color: rgba(30,26,26,0.35);
    font-style: italic;
    letter-spacing: 0.01em;
    margin-top: 4px;
    line-height: 1.4;
  }

  /* TIMELINE — 3 rows */
  #fact-timeline {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Row 1: era names */
  #fact-tl-labels {
    display: flex;
    align-items: flex-end;
    margin-bottom: 10px;
  }

  .fact-tl-era {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-style: italic;
    color: rgba(30,26,26,0.5);
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  #fact-tl-era-spacer {
    width: 28px;
    flex-shrink: 0;
  }

  /* Row 2: line · dot · line */
  #fact-tl-track {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .fact-tl-line {
    flex: 1;
    height: 1px;
    background: rgba(30,26,26,0.18);
  }

  .fact-tl-line.lit {
    background: rgba(30,26,26,0.45);
  }

  #fact-tl-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(30,26,26,0.65);
    flex-shrink: 0;
  }

  /* Row 3: year below dot */
  #fact-tl-year-row {
    display: flex;
    margin-top: 6px;
  }

  #fact-tl-year-left {
    flex: 1;
  }

  #fact-tl-boundary {
    font-size: 11px;
    color: rgba(30,26,26,0.38);
    letter-spacing: 0.03em;
    text-align: center;
    width: 28px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  #fact-tl-year-right {
    flex: 1;
  }

  /* CONTEXT CARD */
  #fact-context-card {
    flex: 0 0 auto;
    margin: 0 20px;
    background: #ffffff;
    border-radius: 16px;
    padding: 16px 18px;
    margin-top: -52px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    position: relative;
    z-index: 3;
  }


  #fact-context-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(30,26,26,0.4);
    margin-bottom: 8px;
  }

  #fact-context-text {
    font-size: 14px;
    font-style: italic;
    color: rgba(30,26,26,0.65);
    line-height: 1.6;
  }

  /* BOTTOM ZONE — fact */
  #fact-bottom-zone {
    flex: 1;
    background: #E3E3E8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px 20px;
    gap: 16px;
    z-index: 1;
  }

  #fact-text {
    font-family: 'PT Serif', serif;
    font-size: clamp(19px, 5.2vw, 26px);
    font-weight: 400;
    color: #1E1A1A;
    line-height: 1.65;
    text-align: center;
  }

  #fact-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(30,26,26,0.3);
    animation: pulseDot 1.5s ease infinite;
    flex-shrink: 0;
  }

  #fact-tap-hint {
    font-size: 11px;
    color: rgba(30,26,26,0.3);
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.4); }
  }

  /* LANGUAGE SELECT SCREEN */
  #lang-select {
    position: fixed;
    inset: 0;
    z-index: 190;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #lang-select.visible {
    opacity: 1;
    pointer-events: all;
  }

  #lang-select.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  #lang-select-title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .lang-select-btn {
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 200px;
    padding: 18px 0;
    border-radius: 12px;
    cursor: pointer;
    margin: 8px 0;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-select-btn:active {
    background: var(--surface);
  }

  /* SCORE SCREEN */
  #score-overlay {
    position: absolute;
    inset: 0;
    z-index: 110;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(245, 245, 247, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  #score-overlay.visible {
    opacity: 1;
  }

  #score-overlay.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  #score-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #score-number {
    font-family: 'PT Serif', serif;
    font-size: clamp(64px, 18vw, 96px);
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #splash-title {
    font-family: 'PT Serif', serif;
    font-size: clamp(52px, 13vw, 76px);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: splashTitleIn 1s ease 0.4s forwards;
  }

  #splash-line {
    width: 0;
    height: 1px;
    background: var(--divider);
    margin-top: 20px;
    animation: splashLineIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
  }

  #splash-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 20px;
    animation: splashSubIn 0.6s ease 2s forwards;
  }

  #splash.hide {
    animation: splashOut 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  @keyframes splashTitleIn {
    to { opacity: 1; }
  }

  @keyframes splashLineIn {
    to { width: 48px; }
  }

  @keyframes splashSubIn {
    to { opacity: 1; }
  }

  @keyframes splashOut {
    to { opacity: 0; }
  }
  .card-enter {
    animation: cardEnter 0.6s ease both;
  }

  .card.top.card-enter {
    animation-delay: 0s;
  }

  .card.bottom.card-enter {
    animation-delay: 0s;
  }

  @keyframes cardEnter {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .card-exit-up {
    animation: cardFadeOut 0.35s ease both;
  }

  .card-exit-down {
    animation: cardFadeOut 0.35s ease both;
  }

  @keyframes cardFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* BOTTOM HINT */
  #bottom-hint {
    padding: 12px 24px;
    padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
    text-align: center;
    flex-shrink: 0;
  }

  #bottom-hint span {
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card.disabled {
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="splash">
  <div id="splash-title">Who's Older?</div>
  <div id="splash-line"></div>
  <div id="splash-sub">Tap to continue</div>
</div>

<div id="lang-select">
  <div id="lang-select-title">Choose language</div>
  <button class="lang-select-btn" onclick="chooseLang('en')">English</button>
  <button class="lang-select-btn" onclick="chooseLang('ru')">Русский</button>
</div>

<div id="app">
  <div id="header">
    <div></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="lang-switcher">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
      </div>
      <div id="counter-wrap">
        <span id="counter">0</span>
      </div>
    </div>
  </div>

  <div id="game">
    <div class="card top" id="card-top">
      <div class="card-inner">
        <div class="person-name" id="name-top"></div>
        <div class="person-hint" id="hint-top"></div>
        <div class="person-year" id="year-top"></div>
        <div class="person-year-note" id="note-top"></div>
      </div>
      <div class="clue-text" id="clue-top"></div>
    </div>

    <div id="versus" title="Hint">💡</div>

    <div class="card bottom" id="card-bottom">
      <div class="card-inner">
        <div class="person-name" id="name-bottom"></div>
        <div class="person-hint" id="hint-bottom"></div>
        <div class="person-year" id="year-bottom"></div>
        <div class="person-year-note" id="note-bottom"></div>
      </div>
      <div class="clue-text" id="clue-bottom"></div>
    </div>

    <div id="fact-overlay">
      <div id="fact-top-zone">
        <div id="fact-name"></div>
        <div id="fact-year"></div>
        <div id="fact-note"></div>
        <div id="fact-timeline">
          <!-- Row 1: era names -->
          <div id="fact-tl-labels">
            <div class="fact-tl-era" id="fact-era-left"></div>
            <div id="fact-tl-era-spacer"></div>
            <div class="fact-tl-era" id="fact-era-right"></div>
          </div>
          <!-- Row 2: line · dot · line -->
          <div id="fact-tl-track">
            <div class="fact-tl-line" id="fact-tl-line-left"></div>
            <div id="fact-tl-dot"></div>
            <div class="fact-tl-line" id="fact-tl-line-right"></div>
          </div>
          <!-- Row 3: year centred under dot -->
          <div id="fact-tl-year-row">
            <div id="fact-tl-year-left"></div>
            <div id="fact-tl-boundary"></div>
            <div id="fact-tl-year-right"></div>
          </div>
        </div>
      </div>
      <div id="fact-context-card">
        <div id="fact-context-label">Контекст</div>
        <div id="fact-context-text"></div>
      </div>
      <div id="fact-bottom-zone">
        <div id="fact-text"></div>
        <div id="fact-dot"></div>
        <div id="fact-tap-hint">Tap to continue</div>
      </div>
    </div>

    <div id="score-overlay">
      <div id="score-label">Your streak</div>
      <div id="score-number">0</div>
    </div>
  </div>

  <div id="bottom-hint"><span>Tap the one born first</span></div>
</div>

<script>
const DB = [
  {n:"Phidias",nr:"Фидий",b:-480,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Sculpted Statue of Zeus at Olympia",cluer:"Создал статую Зевса в Олимпии",hint:"sculptor",hintr:"скульптор",ctx:"At the height of Ancient Greece, marble temples rose across the cities — shaping ideals of perfect beauty",ctxr:"На пике расцвета Древней Греции города наполнялись мраморными храмами — формировалось представление об идеальной красоте",fact:"He oversaw the construction and artistic decoration of the Parthenon, including its massive statue of Athena",factr:"Он руководил художественным оформлением Парфенона, включая создание огромной статуи Афины",cat:"art"},
  {n:"Praxiteles",nr:"Пракситель",b:-395,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Sculpted Aphrodite of Knidos",cluer:"Создал Афродиту Книдскую",hint:"sculptor",hintr:"скульптор",ctx:"As Greek city-states flourished, sculpture became more natural, bringing gods and people closer to human form",ctxr:"В период расцвета полисов скульптура становилась более естественной, приближая богов и людей к человеческому облику",fact:"He was among the first sculptors to depict the nude female form in a life-size statue, notably Aphrodite of Knidos",factr:"Он одним из первых создал полноразмерную скульптуру обнажённой женщины — Афродиту Книдскую",cat:"art"},
  {n:"Vitruvius",nr:"Витрувий",b:-80,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “Ten Books on Architecture”",cluer:"Автор «Десяти книг об архитектуре»",hint:"architect and engineer",hintr:"архитектор и инженер",ctx:"As Rome expanded, roads and cities spread, and architectural principles took shape for future generations",ctxr:"По мере расширения Рима строились дороги и города, а архитектурные принципы оформлялись на будущее",fact:"His writings describe the ideal human proportions that inspired Leonardo da Vinci's famous Vitruvian Man drawing",factr:"Его описание идеальных пропорций человека вдохновило Леонардо да Винчи на создание знаменитого рисунка Витрувианского человека",cat:"art"},
  {n:"Leonardo da Vinci",nr:"Леонардо да Винчи",b:1452,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Painted “Mona Lisa”",cluer:"Написал «Мону Лизу»",hint:"polymath",hintr:"универсальный художник и учёный",ctx:"Europe was moving beyond the Middle Ages, rediscovering science, art and the study of the human body",ctxr:"Европа выходила из Средневековья, заново открывая науку, искусство и изучение человеческого тела",fact:"He wrote his notebooks in mirror script, from right to left",factr:"Он писал свои дневники зеркальным шрифтом, справа налево",cat:"art"},
  {n:"Michelangelo",nr:"Микеланджело",b:1475,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Painted Sistine Chapel ceiling",cluer:"Расписал потолок Сикстинской капеллы",hint:"sculptor and painter",hintr:"скульптор и художник",ctx:"Grand patrons supported ambitious projects, and artists created works on a monumental scale",ctxr:"Крупные покровители поддерживали масштабные проекты, а художники создавали произведения большого размаха",fact:"He considered himself primarily a sculptor rather than a painter, even while working on the Sistine Chapel ceiling",factr:"Он считал себя прежде всего скульптором, даже в период работы над росписью Сикстинской капеллы",cat:"art"},
  {n:"Raphael",nr:"Рафаэль",b:1483,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Painted “The School of Athens”",cluer:"Написал «Афинскую школу»",hint:"painter",hintr:"живописец",ctx:"Rome attracted artists seeking harmony and balance, shaping ideals of beauty in art and architecture",ctxr:"Рим привлекал художников, стремящихся к гармонии и балансу, формируя идеалы красоты",fact:"He died on his 37th birthday in 1520, leaving his final painting, the Transfiguration, unfinished",factr:"Он умер в день своего 37-летия в 1520 году, не завершив свою последнюю картину «Преображение»",cat:"art"},
  {n:"Donatello",nr:"Донателло",b:1386,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Sculpted bronze “David”",cluer:"Создал бронзового «Давида»",hint:"sculptor",hintr:"скульптор",ctx:"In growing cities like Florence, sculpture returned to realism, movement and emotional expression",ctxr:"В развивающихся городах вроде Флоренции скульптура возвращала реализм, движение и эмоции",fact:"His bronze statue of David was the first free-standing nude sculpture made since antiquity",factr:"Его бронзовая статуя Давида стала первой отдельно стоящей скульптурой обнажённой фигуры со времён античности",cat:"art"},
  {n:"Albrecht Dürer",nr:"Альбрехт Дюрер",b:1471,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Master of detailed engravings",cluer:"Мастер детализированных гравюр",hint:"painter and printmaker",hintr:"живописец и гравёр",ctx:"Printing spread ideas more widely, allowing artists and thinkers to reach broader audiences",ctxr:"Печатное дело расширяло распространение идей, позволяя художникам и мыслителям находить широкую аудиторию",fact:"He was the first Northern European artist to extensively use self-portraits, elevating the status of the artist",factr:"Он стал одним из первых художников Северной Европы, активно создававших автопортреты, повышая статус художника",cat:"art"},
  {n:"Caravaggio",nr:"Караваджо",b:1571,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Master of chiaroscuro",cluer:"Мастер светотени",hint:"painter",hintr:"живописец",ctx:"In a time of religious tension, art turned dramatic, using light and shadow to heighten emotion",ctxr:"В период религиозного напряжения искусство становилось более драматичным, используя свет и тень",fact:"He killed a man in a street brawl in 1606 and spent the rest of his life as a fugitive, continuing to paint masterpieces in exile",factr:"В 1606 году он убил человека в уличной драке и провёл остаток жизни в бегах, продолжая создавать шедевры в изгнании",cat:"art"},
  {n:"Rembrandt",nr:"Рембрандт",b:1606,note:"",noter:"",era:"Baroque:Renaissance",erar:"Барокко:Ренессанс",boundary:1600,clue:"Painted “The Night Watch”",cluer:"Написал «Ночной дозор»",hint:"painter",hintr:"живописец",ctx:"In a prosperous trading society, artists focused on everyday life and human emotion",ctxr:"В условиях развитой торговли художники обращались к повседневной жизни и человеческим переживаниям",fact:"He created over 90 self-portraits throughout his life",factr:"За свою жизнь он создал более 90 автопортретов",cat:"art"},
  {n:"Johannes Vermeer",nr:"Ян Вермеер",b:1632,note:"",noter:"",era:"Baroque:Renaissance",erar:"Барокко:Ренессанс",boundary:1600,clue:"Painted “Girl with a Pearl Earring”",cluer:"Написал «Девушку с жемчужной серёжкой»",hint:"painter",hintr:"живописец",ctx:"Quiet domestic scenes and careful use of light captured everyday moments in Dutch cities",ctxr:"Тихие бытовые сцены и работа со светом передавали повседневную жизнь в голландских городах",fact:"Only about 36 of his paintings survive — he is known as the Sphinx of Delft because so little is known about his life",factr:"Сохранилось лишь около 36 его картин — его называют «Дельфтским сфинксом», поскольку о его жизни известно очень мало",cat:"art"},
  {n:"Gian Lorenzo Bernini",nr:"Джан Лоренцо Бернини",b:1598,note:"",noter:"",era:"Baroque:Renaissance",erar:"Барокко:Ренессанс",boundary:1600,clue:"Designed St. Peter’s Square",cluer:"Оформил площадь Святого Петра",hint:"sculptor and architect",hintr:"скульптор и архитектор",ctx:"Rome embraced grandeur, and art became more expressive, aiming to impress and move audiences",ctxr:"Рим стремился к величию, а искусство становилось выразительным, воздействуя на зрителя",fact:"He designed the grand colonnade in St. Peter's Square in Rome — one of the most magnificent architectural spaces in the world",factr:"Он спроектировал величественную колоннаду на площади Святого Петра в Риме — одно из самых грандиозных архитектурных пространств в мире",cat:"art"},
  {n:"Diego Velázquez",nr:"Диего Веласкес",b:1599,note:"",noter:"",era:"Baroque:Renaissance",erar:"Барокко:Ренессанс",boundary:1600,clue:"Painted “Las Meninas”",cluer:"Написал «Менины»",hint:"painter",hintr:"живописец",ctx:"At the Spanish royal court, art combined images of power with close observation of people",ctxr:"При испанском дворе искусство соединяло образ власти с вниманием к человеку",fact:"He served as court painter to King Philip IV of Spain and painted the famous Las Meninas",factr:"Он был придворным художником короля Филиппа IV и написал знаменитую картину «Менины»",cat:"art"},
  {n:"Francisco Goya",nr:"Франсиско Гойя",b:1746,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Painted “The Third of May 1808”",cluer:"Написал «3 мая 1808 года»",hint:"painter",hintr:"живописец",ctx:"During times of conflict and change, art began reflecting both society and the impact of war",ctxr:"Во времена конфликтов и перемен искусство отражало общество и последствия войн",fact:"He became completely deaf at age 46 after a severe illness and went on to create his darkest and most powerful works",factr:"В 46 лет он полностью оглох после тяжёлой болезни и именно тогда создал свои самые мрачные и мощные произведения",cat:"art"},
  {n:"William Turner",nr:"Уильям Тёрнер",b:1775,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Painted dramatic landscapes",cluer:"Писал драматические пейзажи",hint:"painter",hintr:"живописец",ctx:"Industrial change reshaped landscapes, and artists explored light, atmosphere and movement",ctxr:"Промышленные изменения меняли пейзажи, а художники исследовали свет и атмосферу",fact:"He was known for his expressive use of light and color, influencing the development of Impressionism",factr:"Он прославился выразительным использованием света и цвета, оказав влияние на импрессионизм",cat:"art"},
  {n:"Eugène Delacroix",nr:"Эжен Делакруа",b:1798,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Painted “Liberty Leading the People”",cluer:"Написал «Свобода, ведущая народ»",hint:"painter",hintr:"живописец",ctx:"Amid political unrest, art expressed emotion, movement and ideas of freedom",ctxr:"На фоне политических волнений искусство выражало эмоции и идеи свободы",fact:"His painting Liberty Leading the People (1830) became an enduring symbol of revolution and one of the most famous images in French art",factr:"Его картина «Свобода, ведущая народ» (1830) стала символом революции и одним из самых узнаваемых образов французского искусства",cat:"art"},
  {n:"Claude Monet",nr:"Клод Моне",b:1840,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Painted “Water Lilies”",cluer:"Написал «Кувшинки»",hint:"painter",hintr:"живописец",ctx:"Modern life and new technologies inspired artists to study light and fleeting everyday scenes",ctxr:"Современная жизнь и технологии вдохновляли художников исследовать свет и мгновения повседневности",fact:"He painted his famous Water Lilies series while suffering from cataracts",factr:"Он писал знаменитые «Кувшинки», страдая от катаракты",cat:"art"},
  {n:"Vincent van Gogh",nr:"Винсент ван Гог",b:1853,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Painted “Starry Night”",cluer:"Написал «Звёздную ночь»",hint:"painter",hintr:"живописец",ctx:"In a changing industrial world, art increasingly reflected personal emotion and inner experience",ctxr:"В условиях индустриальных перемен искусство всё больше выражало личные эмоции",fact:"He sold very few paintings during his lifetime, with only a handful of documented sales",factr:"За жизнь он продал очень мало своих работ — достоверно известно лишь о нескольких продажах",cat:"art"},
  {n:"Paul Cézanne",nr:"Поль Сезанн",b:1839,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of modern art",cluer:"Предшественник модернизма",hint:"painter",hintr:"живописец",ctx:"As the modern world developed, artists rethought how to represent reality through form and structure",ctxr:"С развитием современного мира художники переосмысливали изображение реальности через форму",fact:"He was rejected by the École des Beaux-Arts and only gained widespread recognition for his work later in life",factr:"Его не приняли в École des Beaux-Arts, а широкое признание его творчество получило уже в более поздние годы",cat:"art"},
  {n:"Pablo Picasso",nr:"Пабло Пикассо",b:1881,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Co-founder of Cubism",cluer:"Сооснователь кубизма",hint:"painter and sculptor",hintr:"живописец и скульптор",ctx:"In a time of rapid change, artists broke traditional rules and explored new ways of seeing",ctxr:"В эпоху быстрых перемен художники отходили от традиций и искали новые способы изображения",fact:"He co-founded the Cubist movement and produced thousands of artworks over his lifetime",factr:"Он был одним из основателей кубизма и создал тысячи произведений за свою жизнь",cat:"art"},
  {n:"Salvador Dalí",nr:"Сальвадор Дали",b:1904,note:"",noter:"",era:"Modern:Industrial Age",erar:"Модерн:Индустриальная эпоха",boundary:1900,clue:"Painted “The Persistence of Memory”",cluer:"Написал «Постоянство памяти»",hint:"painter",hintr:"живописец",ctx:"In a period marked by uncertainty between wars, artists explored dreams and the subconscious through unusual imagery",ctxr:"В период неопределённости между войнами художники обращались к снам и подсознанию, создавая необычные образы",fact:"He designed the Chupa Chups lollipop logo",factr:"Он разработал логотип леденцов Chupa Chups",cat:"art"},
  {n:"Henri Matisse",nr:"Анри Матисс",b:1869,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of Fauvism",cluer:"Лидер фовизма",hint:"painter",hintr:"живописец",ctx:"Modern art evolved rapidly, with artists experimenting with bold color and simplified forms",ctxr:"Современное искусство быстро развивалось, а художники экспериментировали с ярким цветом и упрощёнными формами",fact:"In his eighties, too ill to paint, he created giant paper cut-out artworks from a wheelchair — calling it 'drawing with scissors'",factr:"В восьмидесятилетнем возрасте, уже не способный рисовать, он создавал огромные коллажи из бумаги в инвалидном кресле — называя это «рисованием ножницами»",cat:"art"},
  {n:"Wassily Kandinsky",nr:"Василий Кандинский",b:1866,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of abstract art",cluer:"Пионер абстрактного искусства",hint:"painter",hintr:"живописец",ctx:"As abstraction emerged, artists moved beyond visible reality toward expressing inner ideas",ctxr:"С развитием абстракции художники отходили от видимой реальности, стремясь выразить внутренние идеи",fact:"He was among the pioneers of abstract art and believed that colors and forms could evoke sensory experiences, including sounds",factr:"Он считается одним из основоположников абстрактного искусства и полагал, что цвета и формы могут вызывать у зрителя ощущения, включая звуковые ассоциации",cat:"art"},
  {n:"Frida Kahlo",nr:"Фрида Кало",b:1907,note:"",noter:"",era:"Modern:Industrial Age",erar:"Модерн:Индустриальная эпоха",boundary:1900,clue:"Painted self-portraits",cluer:"Писала автопортреты",hint:"painter",hintr:"живописец",ctx:"After revolutionary changes, Mexico redefined its identity, and art connected personal experience with culture",ctxr:"После революционных изменений Мексика переосмысливала свою идентичность, а искусство соединяло личный опыт и культуру",fact:"She began painting while recovering from a serious bus accident at age 18",factr:"Она начала рисовать в 18 лет, восстанавливаясь после тяжёлой аварии",cat:"art"},
  {n:"Andy Warhol",nr:"Энди Уорхол",b:1928,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Created Marilyn Monroe portraits",cluer:"Создал портреты Мэрилин Монро",hint:"artist and filmmaker",hintr:"художник и режиссёр",ctx:"Mass media and consumer culture influenced art, bringing attention to everyday objects and fame",ctxr:"Массовая культура и медиа влияли на искусство, обращая внимание на повседневные объекты и тему славы",fact:"He is widely associated with the phrase about “15 minutes of fame,” reflecting his ideas about mass media and celebrity culture",factr:"Его имя прочно связано с фразой о «15 минутах славы», отражающей его взгляды на массовую культуру и знаменитость",cat:"art"},
  {n:"Jackson Pollock",nr:"Джексон Поллок",b:1912,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Pioneer of drip painting",cluer:"Пионер дриппинга",hint:"painter",hintr:"живописец",ctx:"After World War II, artists explored spontaneity and movement through abstract expression",ctxr:"После Второй мировой войны художники исследовали спонтанность и движение в абстрактном искусстве",fact:"He pioneered 'drip painting' by laying canvases on the floor and dripping paint from above — he called it his way of being in the painting",factr:"Он создал «капельную живопись», кладя холсты на пол и капая краску сверху — называя это «способом быть внутри картины»",cat:"art"},
  {n:"Auguste Rodin",nr:"Огюст Роден",b:1840,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Sculpted “The Thinker”",cluer:"Создал «Мыслителя»",hint:"sculptor",hintr:"скульптор",ctx:"As modern society formed, sculpture moved beyond classical ideals to capture movement and emotion",ctxr:"С формированием современного общества скульптура отходила от классических идеалов, передавая движение и эмоции",fact:"His sculpture The Thinker was originally part of a larger work inspired by Dante’s Divine Comedy, representing a figure often associated with Dante himself",factr:"Скульптура «Мыслитель» изначально входила в композицию «Врата ада», вдохновлённую «Божественной комедией» Данте, и изображает фигуру, которую часто связывают с самим Данте",cat:"art"},
  {n:"Frank Lloyd Wright",nr:"Фрэнк Ллойд Райт",b:1867,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Designed Fallingwater house",cluer:"Спроектировал «Дом над водопадом»",hint:"architect",hintr:"архитектор",ctx:"Growing cities led architects to rethink how people live and interact with space",ctxr:"Рост городов заставлял архитекторов переосмысливать пространство и жильё",fact:"He designed hundreds of buildings over a long career spanning several decades",factr:"За долгую карьеру, продолжавшуюся несколько десятилетий, он спроектировал сотни зданий",cat:"art"},
  {n:"Le Corbusier",nr:"Ле Корбюзье",b:1887,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of modern architecture",cluer:"Пионер модернизма",hint:"architect",hintr:"архитектор",ctx:"Urbanization encouraged architects to design functional and planned environments for modern life",ctxr:"Урбанизация побуждала архитекторов создавать функциональную и продуманную среду",fact:"He was a key figure in developing modern architectural principles, including promoting open and flexible interior spaces",factr:"Он был одной из ключевых фигур в формировании принципов современной архитектуры, продвигая идеи открытых и гибких внутренних пространств",cat:"art"},
  {n:"Ludwig Mies van der Rohe",nr:"Людвиг Мис ван дер Роэ",b:1886,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of modernist architecture",cluer:"Представитель модернизма",hint:"architect",hintr:"архитектор",ctx:"After World War I, architecture emphasized simplicity, structure and new materials",ctxr:"После Первой мировой войны архитектура сосредоточилась на простоте, конструкции и новых материалах",fact:"His famous motto 'Less is more' became the defining principle of minimalist architecture",factr:"Его знаменитый девиз «Меньше значит больше» стал определяющим принципом минималистической архитектуры",cat:"art"},
  {n:"Zaha Hadid",nr:"Заха Хадид",b:1950,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Designed futuristic buildings",cluer:"Проектировала футуристические здания",hint:"architect",hintr:"архитектор",ctx:"In a globalized world, architecture explored bold, fluid and experimental forms",ctxr:"В глобальном мире архитектура развивалась в сторону смелых и экспериментальных форм",fact:"She was the first woman to win the Pritzker Architecture Prize",factr:"Она стала первой женщиной, получившей Притцкеровскую премию по архитектуре",cat:"art"},
  {n:"Antoni Gaudí",nr:"Антонио Гауди",b:1852,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Designed Sagrada Família",cluer:"Создал Саграда Фамилия",hint:"architect",hintr:"архитектор",ctx:"As Barcelona expanded, architecture took on imaginative and highly individual forms",ctxr:"По мере роста Барселоны архитектура приобретала выразительные и необычные формы",fact:"The Sagrada Família he designed has been under construction since 1882",factr:"Спроектированный им собор Саграда Фамилия находится в строительстве с 1882 года",cat:"art"},
  {n:"Coco Chanel",nr:"Коко Шанель",b:1883,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Created Chanel No. 5",cluer:"Создала Chanel No. 5",hint:"fashion designer",hintr:"модельер",ctx:"After World War I, changing roles of women influenced fashion toward simplicity and independence",ctxr:"После Первой мировой войны изменения роли женщин повлияли на моду, делая её более простой и свободной",fact:"She helped popularize more comfortable clothing for women, including the use of jersey fabric in fashion",factr:"Она способствовала распространению более удобной женской одежды, в том числе ввела в моду использование трикотажа",cat:"art"},
  {n:"Johannes Gutenberg",nr:"Иоганн Гутенберг",b:1400,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Invented printing press",cluer:"Изобрёл печатный станок",hint:"printer and inventor",hintr:"печатник и изобретатель",ctx:"The spread of printed books changed how knowledge was shared across Europe",ctxr:"Распространение печатных книг изменило способы передачи знаний в Европе",fact:"He introduced mechanical movable type printing to Europe, revolutionizing the spread of information",factr:"Он внедрил в Европе книгопечатание с подвижными литерами, что радикально изменило распространение знаний",cat:"business"},
  {n:"Henry Ford",nr:"Генри Форд",b:1863,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founded Ford Motor Company",cluer:"Основал Ford",hint:"industrialist",hintr:"промышленник",ctx:"Industrial production increased efficiency, making goods more accessible to many people",ctxr:"Промышленное производство повышало эффективность и делало товары доступнее",fact:"He introduced the moving assembly line, revolutionizing manufacturing",factr:"Он внедрил движущийся конвейер, совершив революцию в производстве",cat:"business"},
  {n:"John D. Rockefeller",nr:"Джон Рокфеллер",b:1839,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founded Standard Oil",cluer:"Основал Standard Oil",hint:"industrialist",hintr:"промышленник",ctx:"Rapid economic growth saw large industries shaping modern business and wealth",ctxr:"Быстрый экономический рост сопровождался развитием крупных отраслей, формирующих современный бизнес",fact:"He became one of the richest individuals in modern history and donated hundreds of millions of dollars to philanthropy, including founding the University of Chicago",factr:"Он стал одним из самых богатых людей современной истории и пожертвовал сотни миллионов долларов на благотворительность, в том числе на основание Чикагского университета",cat:"business"},
  {n:"Bill Gates",nr:"Билл Гейтс",b:1955,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Co-founder of Microsoft",cluer:"Сооснователь Microsoft",hint:"entrepreneur",hintr:"предприниматель",ctx:"Personal computers became widespread, changing how people work and communicate",ctxr:"Персональные компьютеры распространялись, меняя работу и общение людей",fact:"He co-founded Microsoft in 1975, which became one of the world’s largest software companies",factr:"Он стал сооснователем Microsoft в 1975 году — одной из крупнейших софтверных компаний мира",cat:"business"},
  {n:"Steve Jobs",nr:"Стив Джобс",b:1955,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Co-founder of Apple",cluer:"Сооснователь Apple",hint:"entrepreneur",hintr:"предприниматель",ctx:"Consumer technology reshaped everyday life, especially in communication and media",ctxr:"Потребительские технологии меняли повседневную жизнь, особенно в сфере общения и медиа",fact:"He co-founded Apple in 1976, with the company’s first operations run from a garage",factr:"Он стал сооснователем Apple в 1976 году, и на раннем этапе компания действительно работала из гаража",cat:"business"},
  {n:"Jeff Bezos",nr:"Джефф Безос",b:1964,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Founded Amazon",cluer:"Основал Amazon",hint:"entrepreneur",hintr:"предприниматель",ctx:"The growth of the internet shifted commerce toward online platforms",ctxr:"Развитие интернета способствовало переходу торговли в онлайн",fact:"He founded Amazon in 1994 as an online bookstore that grew into a global e-commerce giant",factr:"Он основал Amazon в 1994 году как интернет-магазин книг, который вырос в глобального гиганта электронной торговли",cat:"business"},
  {n:"Jack Ma",nr:"Джек Ма",b:1964,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Founded Alibaba",cluer:"Основал Alibaba",hint:"entrepreneur",hintr:"предприниматель",ctx:"Global trade and digital platforms made connections between businesses and customers easier",ctxr:"Глобальная торговля и цифровые платформы упрощали связь между бизнесом и клиентами",fact:"He co-founded Alibaba Group, which became one of the world’s largest e-commerce companies",factr:"Он стал сооснователем Alibaba Group — одной из крупнейших компаний электронной коммерции в мире",cat:"business"},
  {n:"Warren Buffett",nr:"Уоррен Баффетт",b:1930,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"CEO of Berkshire Hathaway",cluer:"Глава Berkshire Hathaway",hint:"investor",hintr:"инвестор",ctx:"Economic challenges highlighted the importance of long-term thinking and careful investment",ctxr:"Экономические трудности подчёркивали важность долгосрочного мышления и осторожных инвестиций",fact:"He is known as the “Oracle of Omaha” and built his fortune through long-term value investing",factr:"Он известен как «Оракул из Омахи» и заработал состояние благодаря долгосрочным инвестициям",cat:"business"},
  {n:"Marco Polo",nr:"Марко Поло",b:1254,note:"",noter:"",era:"High Middle Ages:Late Middle Ages",erar:"Высокое Средневековье:Позднее Средневековье",boundary:1300,clue:"Traveled to China",cluer:"Путешествовал в Китай",hint:"explorer",hintr:"путешественник",ctx:"Trade routes connected distant regions, increasing knowledge about other parts of the world",ctxr:"Торговые пути связывали отдалённые регионы, расширяя знания о мире",fact:"He spent many years in China and described his experiences at the court of Kublai Khan in his writings",factr:"Он провёл много лет в Китае и описал свои путешествия, включая пребывание при дворе Хубилай-хана",cat:"exploration"},
  {n:"Ibn Battuta",nr:"Ибн Баттута",b:1304,note:"",noter:"",era:"Late Middle Ages:High Middle Ages",erar:"Позднее Средневековье:Высокое Средневековье",boundary:1300,clue:"Traveled across Africa and Asia",cluer:"Путешествовал по Африке и Азии",hint:"explorer",hintr:"путешественник",ctx:"Travel across a vast interconnected world helped spread culture, ideas and experience",ctxr:"Путешествия по обширному связанному миру способствовали обмену культурой и знаниями",fact:"He traveled extensively across Africa, Asia, and Europe, covering tens of thousands of miles during his journeys",factr:"Он совершил обширные путешествия по Африке, Азии и Европе, преодолев десятки тысяч километров",cat:"exploration"},
  {n:"Zheng He",nr:"Чжэн Хэ",b:1371,note:"",noter:"",era:"Late Middle Ages:Renaissance",erar:"Позднее Средневековье:Ренессанс",boundary:1400,clue:"Led treasure voyages",cluer:"Руководил морскими экспедициями",hint:"explorer",hintr:"путешественник",ctx:"Large naval expeditions demonstrated power and expanded connections across seas",ctxr:"Крупные морские экспедиции демонстрировали мощь и расширяли связи между регионами",fact:"He commanded large treasure fleets during major maritime expeditions in the early 15th century",factr:"Он возглавлял крупные морские экспедиции с участием огромных флотов в начале XV века",cat:"exploration"},
  {n:"Christopher Columbus",nr:"Христофор Колумб",b:1451,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Reached the Americas in 1492",cluer:"Достиг Америки в 1492 году",hint:"explorer",hintr:"путешественник",ctx:"Search for new trade routes led to voyages that connected previously separate parts of the world",ctxr:"Поиск новых торговых путей привёл к путешествиям, соединившим разные части мира",fact:"He believed he had reached Asia when he arrived in the Americas and did not recognize it as a separate continent",factr:"Он полагал, что достиг Азии, когда прибыл в Америку, и не воспринимал её как отдельный континент",cat:"exploration"},
  {n:"Vasco da Gama",nr:"Васко да Гама",b:1460,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Opened sea route to India",cluer:"Открыл морской путь в Индию",hint:"explorer",hintr:"путешественник",ctx:"Sea routes between continents reshaped global trade and economic connections",ctxr:"Морские пути между континентами меняли мировую торговлю",fact:"He was the first European to reach India by sea",factr:"Он стал первым европейцем, добравшимся до Индии морским путём",cat:"exploration"},
  {n:"Ferdinand Magellan",nr:"Фердинанд Магеллан",b:1480,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Led first circumnavigation",cluer:"Организовал первое кругосветное плавание",hint:"explorer",hintr:"путешественник",ctx:"Long-distance voyages revealed the scale of the Earth and connected oceans",ctxr:"Дальние путешествия показали масштаб Земли и связали океаны",fact:"His expedition was the first to circumnavigate the Earth, though he died before completing it",factr:"Его экспедиция стала первой, обогнувшей земной шар, хотя сам он погиб до её завершения",cat:"exploration"},
  {n:"Hernán Cortés",nr:"Эрнан Кортес",b:1485,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Conquered Aztec Empire",cluer:"Завоевал империю ацтеков",hint:"conquistador",hintr:"конкистадор",ctx:"Encounters between distant civilizations often occurred through conflict and reshaped regions",ctxr:"Контакты между разными цивилизациями часто происходили через конфликты и меняли регионы",fact:"He ordered his ships to be destroyed after arriving in Mexico, limiting the possibility of retreat for his forces",factr:"После прибытия в Мексику он распорядился уничтожить свои корабли, лишив войско возможности отступления",cat:"exploration"},
  {n:"Francis Drake",nr:"Фрэнсис Дрейк",b:1540,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Circumnavigated the globe",cluer:"Совершил кругосветное плавание",hint:"explorer and privateer",hintr:"мореплаватель и капер",ctx:"Competition between empires increased the importance of naval power and control of trade routes",ctxr:"Соперничество империй усиливало значение морской силы и контроля над торговлей",fact:"He was the second person to circumnavigate the globe and the first to complete the journey as captain throughout the entire voyage",factr:"Он стал вторым человеком, обогнувшим земной шар, и первым, кто прошёл весь маршрут в качестве капитана",cat:"exploration"},
  {n:"James Cook",nr:"Джеймс Кук",b:1728,note:"",noter:"",era:"Enlightenment:Baroque",erar:"Просвещение:Барокко",boundary:1750,clue:"Mapped the Pacific Ocean",cluer:"Исследовал Тихий океан",hint:"explorer",hintr:"путешественник",ctx:"Exploration mapped previously unknown regions and expanded geographic knowledge",ctxr:"Исследования наносили на карты ранее неизвестные территории",fact:"He produced highly accurate maps of previously uncharted regions, greatly expanding European knowledge of the Pacific",factr:"Он создал точные карты ранее малоизученных территорий, значительно расширив европейские знания о Тихом океане",cat:"exploration"},
  {n:"Alexander von Humboldt",nr:"Александр фон Гумбольдт",b:1769,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Explored South America",cluer:"Исследовал Южную Америку",hint:"naturalist and explorer",hintr:"натуралист и путешественник",ctx:"Science and exploration became closely connected, encouraging a broader understanding of nature as a system",ctxr:"Наука и исследования сближались, формируя представление о природе как о единой системе",fact:"He explored Latin America and laid foundations for modern geography and environmental science",factr:"Он исследовал Латинскую Америку и заложил основы современной географии и экологии",cat:"exploration"},
  {n:"David Livingstone",nr:"Давид Ливингстон",b:1813,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Explored central Africa",cluer:"Исследовал Центральную Африку",hint:"explorer and missionary",hintr:"путешественник и миссионер",ctx:"European expansion into Africa was linked with exploration, trade and missionary activity",ctxr:"Европейское продвижение в Африке было связано с исследованиями, торговлей и миссионерством",fact:"He was the first European to describe Victoria Falls, which were long known to local populations",factr:"Он стал первым европейцем, описавшим водопад Виктория, который был известен местным народам задолго до этого",cat:"exploration"},
  {n:"Roald Amundsen",nr:"Руаль Амундсен",b:1872,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"First to reach South Pole",cluer:"Первым достиг Южного полюса",hint:"explorer",hintr:"путешественник",ctx:"The remaining unexplored regions of the Earth drew expeditions seeking to reach the poles",ctxr:"Последние неизведанные регионы Земли привлекали экспедиции, стремившиеся достичь полюсов",fact:"He was the first person to reach the South Pole in 1911",factr:"В 1911 году он первым достиг Южного полюса",cat:"exploration"},
  {n:"Robert Falcon Scott",nr:"Роберт Скотт",b:1868,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Led Antarctic expeditions",cluer:"Руководил антарктическими экспедициями",hint:"explorer",hintr:"путешественник",ctx:"Polar exploration became a test of endurance as nations competed in extreme conditions",ctxr:"Полярные исследования становились испытанием выносливости на фоне соперничества стран",fact:"He reached the South Pole only to find Amundsen had beaten him by 34 days",factr:"Он достиг Южного полюса, лишь чтобы обнаружить, что Амундсен опередил его на 34 дня",cat:"exploration"},
  {n:"Fridtjof Nansen",nr:"Фритьоф Нансен",b:1861,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of Arctic exploration",cluer:"Пионер арктических исследований",hint:"explorer and scientist",hintr:"путешественник и учёный",ctx:"Scientific research and exploration advanced together, especially in the study of polar regions",ctxr:"Научные исследования и путешествия развивались вместе, особенно в изучении полярных областей",fact:"He later won the Nobel Peace Prize for his humanitarian work",factr:"Впоследствии он получил Нобелевскую премию мира за гуманитарную деятельность",cat:"exploration"},
  {n:"Yuri Gagarin",nr:"Юрий Гагарин",b:1934,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"First human in space",cluer:"Первый человек в космосе",hint:"cosmonaut",hintr:"космонавт",ctx:"The space race marked a new stage of competition, as humans first traveled into space",ctxr:"Космическая гонка открыла новый этап соперничества, и человек впервые отправился в космос",fact:"His flight lasted just 108 minutes but changed history",factr:"Его полёт длился всего 108 минут, но вошёл в историю",cat:"exploration"},
  {n:"Neil Armstrong",nr:"Нил Армстронг",b:1930,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"First human on the Moon",cluer:"Первый человек на Луне",hint:"astronaut",hintr:"астронавт",ctx:"Space exploration reached a milestone when humans landed on the Moon",ctxr:"Космические исследования достигли важного рубежа — человек высадился на Луну",fact:"He carried small artifacts from the Wright brothers’ first airplane with him on the Apollo 11 mission",factr:"Во время миссии «Аполлон-11» он взял с собой небольшие предметы, связанные с первым самолётом братьев Райт",cat:"exploration"},
  {n:"Jacques Cousteau",nr:"Жак-Ив Кусто",b:1910,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Created underwater films",cluer:"Создавал подводные фильмы",hint:"oceanographer and explorer",hintr:"океанограф и исследователь",ctx:"Technological advances made it possible to explore and document the underwater world",ctxr:"Технологии позволили исследовать и изучать подводный мир",fact:"He co-invented the Aqua-Lung, enabling modern scuba diving",factr:"Он стал соизобретателем акваланга, сделавшего возможным современное подводное плавание",cat:"exploration"},
  {n:"Edmund Hillary",nr:"Эдмунд Хиллари",b:1919,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"First to climb Everest",cluer:"Первым покорил Эверест",hint:"mountaineer",hintr:"альпинист",ctx:"Mountaineering pushed human limits as expeditions reached the highest peaks on Earth",ctxr:"Альпинизм расширял пределы возможностей человека, достигая высочайших вершин",fact:"He was one of the first two people to reach the summit of Mount Everest in 1953",factr:"Он стал одним из первых двух людей, достигших вершины Эвереста в 1953 году",cat:"exploration"},
  {n:"Tenzing Norgay",nr:"Тенцинг Норгей",b:1914,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Climbed Everest with Hillary",cluer:"Покорил Эверест с Хиллари",hint:"mountaineer",hintr:"альпинист",ctx:"Reaching extreme places became a symbol of human endurance and cooperation",ctxr:"Покорение труднодоступных мест становилось символом выносливости и сотрудничества",fact:"He reached the summit of Mount Everest alongside Edmund Hillary in 1953",factr:"Он достиг вершины Эвереста вместе с Эдмундом Хиллари в 1953 году",cat:"exploration"},
  {n:"Thor Heyerdahl",nr:"Тур Хейердал",b:1914,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Led Kon-Tiki expedition",cluer:"Возглавил экспедицию «Кон-Тики»",hint:"explorer",hintr:"путешественник",ctx:"Experimental voyages tested ideas about how ancient peoples may have traveled and connected",ctxr:"Экспериментальные путешествия проверяли идеи о передвижениях древних народов",fact:"He sailed the Kon-Tiki raft across the Pacific Ocean to demonstrate ancient seafaring possibilities",factr:"Он пересёк Тихий океан на плоту «Кон-Тики», чтобы доказать возможности древнего мореплавания",cat:"exploration"},
  {n:"Homer",nr:"Гомер",b:-800,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “Iliad” and “Odyssey”",cluer:"Автор «Илиады» и «Одиссеи»",hint:"poet",hintr:"поэт",ctx:"Ancient Greek culture shaped myths and stories that influenced views of gods, heroes and the world",ctxr:"Древнегреческая культура формировала мифы и представления о богах и героях",fact:"The question of whether Homer was a single individual or multiple authors has been debated since antiquity",factr:"Вопрос о том, был ли Гомер одним человеком или несколькими авторами, обсуждается ещё со времён античности",cat:"literature"},
  {n:"Sophocles",nr:"Софокл",b:-496,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “Oedipus Rex”",cluer:"Автор «Царь Эдип»",hint:"playwright",hintr:"драматург",ctx:"Theater in Greek cities explored human nature, choice and fate through dramatic storytelling",ctxr:"Театр в греческих городах исследовал человеческую природу и судьбу",fact:"He wrote over 120 plays, though only seven survive in complete form today",factr:"Он написал более 120 пьес, из которых полностью сохранились лишь семь",cat:"literature"},
  {n:"Virgil",nr:"Вергилий",b:-70,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of the “Aeneid”",cluer:"Автор «Энеиды»",hint:"poet",hintr:"поэт",ctx:"Literature in the Roman world helped connect people with shared myths and identity",ctxr:"Литература в Римском мире формировала общую культурную идентичность",fact:"He spent years composing the Aeneid and reportedly asked for it to be destroyed before his death, though it was preserved",factr:"Он много лет работал над «Энеидой» и, по свидетельствам источников, перед смертью просил уничтожить поэму, но её сохранили",cat:"literature"},
  {n:"Dante Alighieri",nr:"Данте Алигьери",b:1265,note:"",noter:"",era:"Late Middle Ages:High Middle Ages",erar:"Позднее Средневековье:Высокое Средневековье",boundary:1300,clue:"Author of “Divine Comedy”",cluer:"Автор «Божественной комедии»",hint:"poet",hintr:"поэт",ctx:"European thought was shifting, and literature explored questions of morality and the afterlife",ctxr:"Европейская мысль менялась, а литература обращалась к вопросам морали и загробного мира",fact:"He wrote the Divine Comedy entirely in Italian, not Latin — revolutionary for his time",factr:"Он написал «Божественную комедию» целиком на итальянском языке, а не на латыни — это было революционно для его времени",cat:"literature"},
  {n:"Geoffrey Chaucer",nr:"Джеффри Чосер",b:1343,note:"",noter:"",era:"Late Middle Ages:High Middle Ages",erar:"Позднее Средневековье:Высокое Средневековье",boundary:1300,clue:"Author of “The Canterbury Tales”",cluer:"Автор «Кентерберийских рассказов»",hint:"poet",hintr:"поэт",ctx:"Storytelling began to reflect everyday life and a wider range of social groups",ctxr:"Литература всё чаще отражала повседневную жизнь и разные слои общества",fact:"He wrote The Canterbury Tales in Middle English, helping to establish it as a literary language",factr:"Он написал «Кентерберийские рассказы» на среднеанглийском языке, способствуя его становлению как литературного",cat:"literature"},
  {n:"William Shakespeare",nr:"Уильям Шекспир",b:1564,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Author of “Hamlet”",cluer:"Автор «Гамлета»",hint:"playwright",hintr:"драматург",ctx:"Theater became a major cultural form, exploring power, love and human character",ctxr:"Театр стал важной частью культуры, исследуя власть, любовь и характер человека",fact:"He significantly influenced the English language, contributing many words and expressions still in use today",factr:"Он оказал огромное влияние на английский язык, введя множество слов и выражений, которые используются до сих пор",cat:"literature"},
  {n:"Miguel de Cervantes",nr:"Мигель де Сервантес",b:1547,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Author of “Don Quixote”",cluer:"Автор «Дон Кихота»",hint:"novelist",hintr:"писатель",ctx:"Literature began to question traditional ideals of heroism and reality",ctxr:"Литература начала переосмысливать представления о героизме и реальности",fact:"Don Quixote is widely regarded as one of the first major works of modern literature",factr:"«Дон Кихот» широко считается одним из первых значительных произведений современной литературы",cat:"literature"},
  {n:"Johann Wolfgang von Goethe",nr:"Иоганн Вольфганг фон Гёте",b:1749,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Author of “Faust”",cluer:"Автор «Фауста»",hint:"writer and poet",hintr:"писатель и поэт",ctx:"New ideas about reason and emotion shaped literature and philosophy",ctxr:"Новые идеи о разуме и чувствах влияли на литературу и философию",fact:"He began writing his masterpiece Faust at age 23 and completed it just before his death at 82 — it took nearly 60 years",factr:"Он начал писать «Фауста» в 23 года и завершил его незадолго до смерти в 82 — работа заняла почти 60 лет",cat:"literature"},
  {n:"Jane Austen",nr:"Джейн Остин",b:1775,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Author of “Pride and Prejudice”",cluer:"Автор «Гордости и предубеждения»",hint:"novelist",hintr:"писатель",ctx:"Social norms and class structure strongly influenced everyday life and relationships",ctxr:"Социальные нормы и классовая структура определяли повседневную жизнь",fact:"She published all her novels anonymously during her lifetime",factr:"При жизни она публиковала все свои романы анонимно",cat:"literature"},
  {n:"Victor Hugo",nr:"Виктор Гюго",b:1802,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Les Misérables”",cluer:"Автор «Отверженных»",hint:"writer and poet",hintr:"писатель и поэт",ctx:"Political and social change inspired literature to address inequality and justice",ctxr:"Политические и социальные перемены находили отражение в литературе",fact:"Les Misérables is notable for its complex structure and long, detailed sentences",factr:"«Отверженные» известны сложной структурой и длинными, развернутыми предложениями",cat:"literature"},
  {n:"Alexander Pushkin",nr:"Александр Пушкин",b:1799,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Eugene Onegin”",cluer:"Автор «Евгения Онегина»",hint:"poet and writer",hintr:"поэт и писатель",ctx:"Literature became a way to express cultural identity and personal voice",ctxr:"Литература становилась способом выражения личности и культурной идентичности",fact:"He was killed in a duel at age 37 — defending the honour of his wife against a French officer",factr:"Он был убит на дуэли в 37 лет — защищая честь жены от французского офицера",cat:"literature"},
  {n:"Charles Dickens",nr:"Чарльз Диккенс",b:1812,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Oliver Twist”",cluer:"Автор «Оливера Твиста»",hint:"novelist",hintr:"писатель",ctx:"Industrial growth revealed social inequality and difficult living conditions",ctxr:"Индустриальный рост обнажал социальное неравенство и тяжёлые условия жизни",fact:"He published most of his novels in monthly installments in magazines",factr:"Большинство своих романов он публиковал ежемесячными выпусками в журналах",cat:"literature"},
  {n:"Leo Tolstoy",nr:"Лев Толстой",b:1828,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “War and Peace”",cluer:"Автор «Войны и мира»",hint:"writer and philosopher",hintr:"писатель и мыслитель",ctx:"Society faced deep contrasts between wealth and poverty, raising questions about meaning and values",ctxr:"Общество сталкивалось с контрастами богатства и бедности, поднимая вопросы смысла жизни",fact:"In his later years, he rejected many aspects of his aristocratic status and promoted a life of simplicity",factr:"В последние годы жизни он отказался от многих привилегий своего сословия и пропагандировал простой образ жизни",cat:"literature"},
  {n:"Fyodor Dostoevsky",nr:"Фёдор Достоевский",b:1821,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Crime and Punishment”",cluer:"Автор «Преступления и наказания»",hint:"writer and philosopher",hintr:"писатель и мыслитель",ctx:"Literature explored moral conflict, faith and human psychology in a changing world",ctxr:"Литература исследовала моральные конфликты, веру и психологию человека",fact:"He was sentenced to death but pardoned at the last moment before execution",factr:"Он был приговорён к смертной казни, но помилован в самый последний момент перед расстрелом",cat:"literature"},
  {n:"Mark Twain",nr:"Марк Твен",b:1835,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Tom Sawyer”",cluer:"Автор «Тома Сойера»",hint:"writer",hintr:"писатель",ctx:"Rapid change in society was reflected in stories about everyday life and national identity",ctxr:"Быстрые изменения в обществе отражались в рассказах о повседневной жизни",fact:"His real name was Samuel Langhorne Clemens",factr:"Его настоящее имя — Сэмюэл Лэнгхорн Клеменс",cat:"literature"},
  {n:"Jules Verne",nr:"Жюль Верн",b:1828,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Journey to the Center of the Earth”",cluer:"Автор «Путешествия к центру Земли»",hint:"writer",hintr:"писатель",ctx:"Scientific progress inspired imaginative visions of travel and exploration",ctxr:"Научный прогресс вдохновлял на воображаемые путешествия и открытия",fact:"His novels imagined technologies such as space travel and advanced submarines before they became reality",factr:"В своих романах он описывал такие технологии, как космические путешествия и продвинутые подводные лодки, задолго до их появления",cat:"literature"},
  {n:"Edgar Allan Poe",nr:"Эдгар Аллан По",b:1809,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “The Raven”",cluer:"Автор «Ворона»",hint:"writer",hintr:"писатель",ctx:"Interest in mystery and psychology shaped darker themes in literature",ctxr:"Интерес к тайнам и психологии формировал более мрачные темы в литературе",fact:"He married his 13-year-old cousin Virginia Clemm",factr:"Он женился на своей тринадцатилетней двоюродной сестре Вирджинии Клемм",cat:"literature"},
  {n:"Franz Kafka",nr:"Франц Кафка",b:1883,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Author of “The Metamorphosis”",cluer:"Автор «Превращения»",hint:"writer",hintr:"писатель",ctx:"Modern systems and bureaucracy increased feelings of alienation in society",ctxr:"Современные системы и бюрократия усиливали чувство отчуждения в обществе",fact:"He asked his friend Max Brod to burn all his manuscripts after his death — Brod refused",factr:"Он попросил своего друга Макса Брода сжечь все рукописи после смерти — Брод отказался",cat:"literature"},
  {n:"Ernest Hemingway",nr:"Эрнест Хемингуэй",b:1899,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Author of “The Old Man and the Sea”",cluer:"Автор «Старик и море»",hint:"writer",hintr:"писатель",ctx:"The impact of war influenced literature focused on meaning, resilience and experience",ctxr:"Влияние войн отражалось в литературе, посвящённой смыслу и опыту",fact:"He survived two plane crashes in consecutive days in 1954",factr:"Он пережил два авиакрушения за два дня подряд в 1954 году",cat:"literature"},
  {n:"George Orwell",nr:"Джордж Оруэлл",b:1903,note:"",noter:"",era:"Modern:Industrial Age",erar:"Модерн:Индустриальная эпоха",boundary:1900,clue:"Author of “1984”",cluer:"Автор «1984»",hint:"writer",hintr:"писатель",ctx:"Political ideologies clashed, raising concerns about power, control and truth",ctxr:"Политические идеологии сталкивались, вызывая тревогу о власти, контроле и правде",fact:"He wrote 1984 while seriously ill with tuberculosis",factr:"Он написал роман «1984», будучи тяжелобольным туберкулёзом",cat:"literature"},
  {n:"Agatha Christie",nr:"Агата Кристи",b:1890,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Creator of Hercule Poirot",cluer:"Создатель Эркюля Пуаро",hint:"writer",hintr:"писатель",ctx:"Growing interest in crime and justice shaped popular detective fiction",ctxr:"Интерес к преступлениям и правосудию формировал популярность детективной литературы",fact:"She is the best-selling fiction writer of all time",factr:"Она является самым продаваемым автором художественной литературы всех времён",cat:"literature"},
  {n:"J.R.R. Tolkien",nr:"Джон Рональд Руэл Толкин",b:1892,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Author of “The Lord of the Rings”",cluer:"Автор «Властелина колец»",hint:"writer",hintr:"писатель",ctx:"After global conflicts, literature turned to imagined worlds exploring timeless themes",ctxr:"После мировых конфликтов литература обращалась к вымышленным мирам и вечным темам",fact:"He created entire languages, including Elvish, for his Middle-earth legendarium",factr:"Он создал полноценные языки, включая эльфийские, для мира Средиземья",cat:"literature"},
  {n:"Gabriel García Márquez",nr:"Габриэль Гарсиа Маркес",b:1927,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Author of “One Hundred Years of Solitude”",cluer:"Автор «Сто лет одиночества»",hint:"writer",hintr:"писатель",ctx:"Cultural and political change in Latin America influenced storytelling that blended reality and imagination",ctxr:"Культурные и политические изменения в Латинской Америке влияли на литературу, соединяющую реальность и воображение",fact:"He wrote One Hundred Years of Solitude over about 18 months, often working full-time on the manuscript",factr:"Он написал «Сто лет одиночества» примерно за полтора года, полностью посвятив себя работе над романом",cat:"literature"},
  {n:"Jorge Luis Borges",nr:"Хорхе Луис Борхес",b:1899,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Author of “Ficciones”",cluer:"Автор «Вымыслов»",hint:"writer",hintr:"писатель",ctx:"Literature explored ideas of time, infinity and perception in new ways",ctxr:"Литература исследовала идеи времени, бесконечности и восприятия",fact:"He was nearly blind for the last 30 years of his life yet continued writing",factr:"Последние 30 лет жизни он почти не видел, однако продолжал писать",cat:"literature"},
  {n:"Rabindranath Tagore",nr:"Рабиндранат Тагор",b:1861,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Nobel Prize in Literature laureate",cluer:"Лауреат Нобелевской премии по литературе",hint:"writer and poet",hintr:"писатель и поэт",ctx:"Cultural and political awakening influenced art focused on identity and tradition",ctxr:"Культурное и политическое пробуждение влияло на искусство, обращённое к идентичности и традициям",fact:"He was the first non-European to win the Nobel Prize in Literature",factr:"Он стал первым неевропейцем, получившим Нобелевскую премию по литературе",cat:"literature"},
  {n:"Naguib Mahfouz",nr:"Нагиб Махфуз",b:1911,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Nobel Prize in Literature laureate",cluer:"Лауреат Нобелевской премии по литературе",hint:"writer",hintr:"писатель",ctx:"Changing society inspired stories about everyday life and social transformation",ctxr:"Меняющееся общество вдохновляло истории о повседневной жизни и переменах",fact:"He was stabbed in the neck by an Islamic extremist in 1994 at age 82 and survived, though with permanent nerve damage",factr:"В 1994 году исламский экстремист нанёс ему удар ножом в шею — 82-летний писатель выжил, но получил постоянное повреждение нервов",cat:"literature"},
  {n:"Chinua Achebe",nr:"Чинуа Ачебе",b:1930,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Author of “Things Fall Apart”",cluer:"Автор «И приходит разрушение»",hint:"writer",hintr:"писатель",ctx:"Post-colonial perspectives reshaped literature, giving voice to local histories and experiences",ctxr:"Постколониальный взгляд менял литературу, давая голос местной истории и опыту",fact:"His novel Things Fall Apart has been widely translated and has sold millions of copies worldwide",factr:"Его роман «Всё рассыпается» переведён на множество языков и разошёлся миллионными тиражами по всему миру",cat:"literature"},
  {n:"Haruki Murakami",nr:"Харуки Мураками",b:1949,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Author of “Norwegian Wood”",cluer:"Автор «Норвежского леса»",hint:"writer",hintr:"писатель",ctx:"Globalization and modern life influenced themes of isolation and identity",ctxr:"Глобализация и современная жизнь влияли на темы одиночества и идентичности",fact:"He ran a jazz bar before becoming a novelist",factr:"До того как стать писателем, он владел джаз-баром",cat:"literature"},
  {n:"J.K. Rowling",nr:"Дж. К. Роулинг",b:1965,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Author of “Harry Potter”",cluer:"Автор «Гарри Поттера»",hint:"writer",hintr:"писатель",ctx:"Global media and shared stories shaped a new generation of readers",ctxr:"Глобальные медиа и общие истории формировали новое поколение читателей",fact:"She wrote the first Harry Potter book while facing financial difficulties as a single mother",factr:"Первую книгу о Гарри Поттере она писала в сложный период жизни, будучи матерью-одиночкой с ограниченными средствами",cat:"literature"},
  {n:"Stephen King",nr:"Стивен Кинг",b:1947,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Author of “It”",cluer:"Автор «Оно»",hint:"writer",hintr:"писатель",ctx:"Modern life inspired stories exploring fear within familiar settings",ctxr:"Современная жизнь вдохновляла истории, раскрывающие страх в привычной среде",fact:"He wrote his first novel Carrie while working various jobs early in his career, including as a teacher",factr:"Свой первый роман «Кэрри» он написал в начале карьеры, работая на разных работах, в том числе учителем",cat:"literature"},
  {n:"Wolfgang Amadeus Mozart",nr:"Вольфганг Амадей Моцарт",b:1756,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Composed “The Magic Flute”",cluer:"Написал «Волшебную флейту»",hint:"composer",hintr:"композитор",ctx:"European cultural life thrived in royal courts where music played a central role",ctxr:"Культурная жизнь Европы развивалась при дворах, где музыка занимала важное место",fact:"He began composing music at a very young age and wrote his first symphonies in childhood",factr:"Он начал сочинять музыку в очень раннем возрасте и написал первые симфонии ещё в детстве",cat:"music"},
  {n:"Johann Sebastian Bach",nr:"Иоганн Себастьян Бах",b:1685,note:"",noter:"",era:"Baroque:Enlightenment",erar:"Барокко:Просвещение",boundary:1750,clue:"Composed “Brandenburg Concertos”",cluer:"Написал Бранденбургские концерты",hint:"composer",hintr:"композитор",ctx:"Religious traditions strongly influenced music and everyday culture",ctxr:"Религиозные традиции сильно влияли на музыку и повседневную культуру",fact:"He had 20 children, several of whom became notable composers",factr:"У него было 20 детей, несколько из которых стали известными композиторами",cat:"music"},
  {n:"Ludwig van Beethoven",nr:"Людвиг ван Бетховен",b:1770,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Composed Symphony No. 9",cluer:"Написал Девятую симфонию",hint:"composer",hintr:"композитор",ctx:"Changing ideas about freedom shaped more personal and expressive music",ctxr:"Идеи свободы влияли на более личное и выразительное развитие музыки",fact:"He composed his Ninth Symphony while completely deaf",factr:"Он сочинил Девятую симфонию будучи полностью глухим",cat:"music"},
