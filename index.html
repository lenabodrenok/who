  {n:"Pyotr Tchaikovsky",nr:"Пётр Чайковский",b:1840,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Composed “Swan Lake”",cluer:"Написал «Лебединое озеро»",hint:"composer",hintr:"композитор",ctx:"Cultural life flourished as large empires supported the arts",ctxr:"Культурная жизнь развивалась, а крупные империи поддерживали искусство",fact:"He composed major ballets including Swan Lake, The Sleeping Beauty, and The Nutcracker during his career",factr:"Он создал такие известные балеты, как «Лебединое озеро», «Спящая красавица» и «Щелкунчик»",cat:"music"},
  {n:"Frédéric Chopin",nr:"Фредерик Шопен",b:1810,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Composed nocturnes",cluer:"Написал ноктюрны",hint:"composer",hintr:"композитор",ctx:"Music became a way to express emotion and national identity",ctxr:"Музыка становилась способом выражения эмоций и национальной идентичности",fact:"He gave public performances as a child and was recognized early as a musical prodigy",factr:"Он выступал публично ещё в детстве и рано получил признание как музыкальный вундеркинд",cat:"music"},
  {n:"Giuseppe Verdi",nr:"Джузеппе Верди",b:1813,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Composed “La Traviata”",cluer:"Написал «Травиату»",hint:"composer",hintr:"композитор",ctx:"National movements influenced music connected with identity and unity",ctxr:"Национальные движения влияли на музыку, связанную с идеями единства",fact:"He used his fortune to build a rest home for retired musicians in Milan, which still operates today",factr:"На своё состояние он построил в Милане дом отдыха для вышедших на пенсию музыкантов, который работает по сей день",cat:"music"},
  {n:"Elvis Presley",nr:"Элвис Пресли",b:1935,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"The “King of Rock and Roll”",cluer:"«Король рок-н-ролла»",hint:"singer",hintr:"певец",ctx:"Youth culture grew after World War II, shaping music and identity",ctxr:"После Второй мировой войны развивалась молодёжная культура, влияя на музыку и самоидентификацию",fact:"He did not tour internationally and performed primarily in the United States, though he spent time abroad during his military service",factr:"Он не гастролировал за пределами США и выступал в основном в стране, хотя некоторое время провёл за рубежом во время службы в армии",cat:"music"},
  {n:"John Lennon",nr:"Джон Леннон",b:1940,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Member of The Beatles",cluer:"Участник The Beatles",hint:"singer and songwriter",hintr:"певец и автор песен",ctx:"Social change and protest movements influenced music as a form of expression",ctxr:"Социальные перемены и протесты влияли на музыку как средство выражения",fact:"He co-wrote a large number of songs with Paul McCartney as part of the Lennon–McCartney partnership",factr:"Он совместно с Полом Маккартни написал множество песен в рамках авторского дуэта Lennon–McCartney",cat:"music"},
  {n:"Freddie Mercury",nr:"Фредди Меркьюри",b:1946,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Lead vocalist of Queen",cluer:"Солист группы Queen",hint:"singer",hintr:"певец",ctx:"Global media expanded, turning musicians into internationally recognized figures",ctxr:"Глобальные медиа развивались, делая музыкантов всемирно известными",fact:"He was born in Zanzibar, which is now part of Tanzania",factr:"Он родился на Занзибаре — территории, которая сегодня входит в состав Танзании",cat:"music"},
  {n:"Michael Jackson",nr:"Майкл Джексон",b:1958,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"The “King of Pop”",cluer:"«Король поп-музыки»",hint:"singer",hintr:"певец",ctx:"Television and music videos transformed entertainment and global pop culture",ctxr:"Телевидение и музыкальные клипы меняли индустрию развлечений и поп-культуру",fact:"He popularized the moonwalk during a televised performance in 1983, bringing the dance move to global attention",factr:"Он популяризировал «лунную походку», показав её по телевидению в 1983 году и сделав всемирно известной",cat:"music"},
  {n:"Madonna",nr:"Мадонна",b:1958,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"The “Queen of Pop”",cluer:"«Королева поп-музыки»",hint:"singer",hintr:"певица",ctx:"Media and celebrity culture influenced how artists shaped image and identity",ctxr:"Медиа и культура знаменитостей влияли на образ и самовыражение артистов",fact:"She is the best-selling female recording artist of all time according to Guinness World Records",factr:"Она является самой продаваемой женщиной-исполнителем всех времён по данным Книги рекордов Гиннесса",cat:"music"},
  {n:"Whitney Houston",nr:"Уитни Хьюстон",b:1963,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Performed “I Will Always Love You”",cluer:"Исполнила «I Will Always Love You»",hint:"singer",hintr:"певица",ctx:"The global music industry expanded, reaching audiences worldwide",ctxr:"Музыкальная индустрия становилась глобальной и охватывала аудиторию по всему миру",fact:"Her recording of I Will Always Love You is one of the best-selling singles by a female artist",factr:"Её запись «I Will Always Love You» является одной из самых продаваемых песен среди женских исполнителей",cat:"music"},
  {n:"Bob Marley",nr:"Боб Марли",b:1945,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Pioneer of reggae",cluer:"Один из создателей регги",hint:"singer",hintr:"певец",ctx:"Political struggle and calls for unity were reflected in music",ctxr:"Политическая борьба и стремление к единству находили отражение в музыке",fact:"He was given a state funeral in Jamaica in 1981",factr:"В 1981 году ему устроили государственные похороны на Ямайке",cat:"music"},
  {n:"Elton John",nr:"Элтон Джон",b:1947,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Performed “Rocket Man”",cluer:"Исполнил «Rocket Man»",hint:"singer and songwriter",hintr:"певец и автор песен",ctx:"Pop music grew into a major global industry with strong stage performance culture",ctxr:"Поп-музыка становилась крупной индустрией с развитой сценической культурой",fact:"He has been sober since 1990",factr:"Он ведёт трезвый образ жизни с 1990 года",cat:"music"},
  {n:"Celine Dion",nr:"Селин Дион",b:1968,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Performed “My Heart Will Go On”",cluer:"Исполнила «My Heart Will Go On»",hint:"singer",hintr:"певица",ctx:"Global media allowed music to reach audiences across borders more easily",ctxr:"Глобальные медиа позволяли музыке легче распространяться между странами",fact:"Her album Falling into You won the Grammy Award for Album of the Year in 1997",factr:"Её альбом «Falling into You» получил премию «Грэмми» как альбом года в 1997 году",cat:"music"},
  {n:"Shakira",nr:"Шакира",b:1977,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Performed “Hips Don’t Lie”",cluer:"Исполнила «Hips Don’t Lie»",hint:"singer",hintr:"певица",ctx:"Globalization encouraged the blending of musical styles from different cultures",ctxr:"Глобализация способствовала смешению музыкальных стилей разных культур",fact:"She speaks multiple languages, including Spanish and English, and has achieved international success as a singer",factr:"Она владеет несколькими языками, включая испанский и английский, и добилась международного успеха как певица",cat:"music"},
  {n:"Bob Dylan",nr:"Боб Дилан",b:1941,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Nobel Prize in Literature laureate",cluer:"Лауреат Нобелевской премии по литературе",hint:"singer and songwriter",hintr:"певец и автор песен",ctx:"Social movements influenced music as a way to express ideas and challenge norms",ctxr:"Социальные движения влияли на музыку как способ выражения идей",fact:"He was awarded the Nobel Prize in Literature in 2016",factr:"В 2016 году он получил Нобелевскую премию по литературе",cat:"music"},
  {n:"Aretha Franklin",nr:"Арета Франклин",b:1942,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"The “Queen of Soul”",cluer:"«Королева соула»",hint:"singer",hintr:"певица",ctx:"Civil rights movements shaped music connected with identity and equality",ctxr:"Движения за гражданские права влияли на музыку, связанную с равенством",fact:"She was the first woman inducted into the Rock and Roll Hall of Fame in 1987",factr:"В 1987 году она стала первой женщиной, включённой в Зал славы рок-н-ролла",cat:"music"},
  {n:"Ravi Shankar",nr:"Рави Шанкар",b:1920,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Master of the sitar",cluer:"Мастер игры на ситаре",hint:"sitar player and composer",hintr:"исполнитель на ситаре и композитор",ctx:"Interest in global culture connected musical traditions from different regions",ctxr:"Интерес к мировой культуре соединял музыкальные традиции разных регионов",fact:"He played a major role in popularizing the sitar in Western music and taught George Harrison to play it",factr:"Он сыграл важную роль в популяризации ситара на Западе и обучал Джорджа Харрисона игре на нём",cat:"music"},
  {n:"Umm Kulthum",nr:"Умм Кульсум",b:1904,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Icon of Arabic music",cluer:"Икона арабской музыки",hint:"singer",hintr:"певица",ctx:"Mass media like radio helped unite audiences through shared musical experience",ctxr:"Массовые медиа, такие как радио, объединяли аудиторию через музыку",fact:"Her concerts were known for their long duration and drew very large audiences",factr:"Её концерты славились большой продолжительностью и собирали огромную аудиторию",cat:"music"},
  {n:"Fela Kuti",nr:"Фела Кути",b:1938,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Creator of Afrobeat",cluer:"Создатель афробита",hint:"musician and activist",hintr:"музыкант и активист",ctx:"Political change and social issues were expressed through music and performance",ctxr:"Политические перемены и социальные проблемы выражались через музыку",fact:"He was frequently arrested by Nigerian authorities due to his political activism",factr:"Его неоднократно арестовывали власти Нигерии из-за его политической активности",cat:"music"},
  {n:"Konstantin Stanislavski",nr:"Константин Станиславский",b:1863,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Created acting system",cluer:"Создал систему Станиславского",hint:"theatre director",hintr:"театральный режиссёр",ctx:"Theater developed more realistic approaches, focusing on psychology and authentic performance",ctxr:"Театр развивался в сторону реализма, уделяя внимание психологии и достоверной игре",fact:"He developed the Stanislavski system, a method of actor training that influenced modern acting",factr:"Он разработал систему Станиславского — метод актёрской подготовки, повлиявший на современный театр",cat:"performing_arts"},
  {n:"Charlie Chaplin",nr:"Чарли Чаплин",b:1889,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Star of silent films",cluer:"Звезда немого кино",hint:"actor and filmmaker",hintr:"актёр и режиссёр",ctx:"Early cinema grew into a global form of entertainment, with silent films understood across cultures",ctxr:"Раннее кино становилось мировым развлечением, а немые фильмы были понятны разным культурам",fact:"He became one of the most recognizable film stars in the world through his iconic screen persona “the Tramp”",factr:"Он стал одним из самых узнаваемых актёров немого кино благодаря своему образу Бродяги",cat:"performing_arts"},
  {n:"Buster Keaton",nr:"Бастер Китон",b:1895,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Star of silent films",cluer:"Звезда немого кино",hint:"actor and filmmaker",hintr:"актёр и режиссёр",ctx:"Cinema experimented with visual storytelling and physical comedy",ctxr:"Кино экспериментировало с визуальным повествованием и физической комедией",fact:"He performed all his own stunts without ever smiling on screen",factr:"Он исполнял все трюки сам, ни разу не улыбнувшись на экране",cat:"performing_arts"},
  {n:"Sergei Eisenstein",nr:"Сергей Эйзенштейн",b:1898,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of film montage",cluer:"Пионер монтажа",hint:"film director",hintr:"режиссёр",ctx:"Film evolved as a powerful medium for storytelling and influence, especially during political change",ctxr:"Кино развивалось как мощное средство повествования и влияния, особенно в периоды перемен",fact:"He pioneered montage theory in film, especially in Battleship Potemkin",factr:"Он разработал теорию монтажа в кино, в частности в фильме «Броненосец Потёмкин»",cat:"performing_arts"},
  {n:"Walt Disney",nr:"Уолт Дисней",b:1901,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Created Mickey Mouse",cluer:"Создал Микки Мауса",hint:"animator and producer",hintr:"художник-мультипликатор и продюсер",ctx:"Animation expanded rapidly, creating new forms of storytelling for wide audiences",ctxr:"Анимация быстро развивалась, создавая новые формы повествования для широкой аудитории",fact:"He co-founded the Walt Disney Company and created one of the most influential entertainment empires in history",factr:"Он стал сооснователем компании Disney и создал одну из самых влиятельных развлекательных компаний в мире",cat:"performing_arts"},
  {n:"Orson Welles",nr:"Орсон Уэллс",b:1915,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “Citizen Kane”",cluer:"Снял «Гражданина Кейна»",hint:"actor and director",hintr:"актёр и режиссёр",ctx:"Cinema explored new narrative and visual techniques, expanding creative possibilities",ctxr:"Кино осваивало новые способы повествования и визуальные приёмы",fact:"He directed Citizen Kane at age 25, a film widely regarded as one of the greatest in cinema history",factr:"Он снял «Гражданина Кейна» в 25 лет — фильм, который часто называют одним из величайших в истории кино",cat:"performing_arts"},
  {n:"Laurence Olivier",nr:"Лоренс Оливье",b:1907,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Performed Shakespeare roles",cluer:"Играл роли Шекспира",hint:"actor",hintr:"актёр",ctx:"Theater and film reinterpreted classical works for modern audiences",ctxr:"Театр и кино переосмысливали классические произведения для современной аудитории",fact:"He was one of the leading actors of the 20th century, especially known for his work in theatre and film",factr:"Он был одним из ведущих актёров XX века, особенно известным своими работами в театре и кино",cat:"performing_arts"},
  {n:"Akira Kurosawa",nr:"Акира Куросава",b:1910,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “Seven Samurai”",cluer:"Снял «Семь самураев»",hint:"film director",hintr:"режиссёр",ctx:"Post-war Japan redefined its identity, and cinema presented human stories to a global audience",ctxr:"Послевоенная Япония переосмысливала свою идентичность, а кино рассказывало человеческие истории миру",fact:"His film Seven Samurai directly inspired The Magnificent Seven and influenced many later filmmakers",factr:"Его фильм «Семь самураев» напрямую вдохновил «Великолепную семёрку» и оказал влияние на многих последующих режиссёров",cat:"performing_arts"},
  {n:"Ingmar Bergman",nr:"Ингмар Бергман",b:1918,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “The Seventh Seal”",cluer:"Снял «Седьмую печать»",hint:"film director",hintr:"режиссёр",ctx:"Cinema explored philosophical questions about faith, meaning and human experience",ctxr:"Кино обращалось к философским вопросам веры, смысла и человеческого опыта",fact:"He directed 62 films and wrote over 170 stage plays",factr:"Он снял 62 фильма и написал более 170 театральных пьес",cat:"performing_arts"},
  {n:"Federico Fellini",nr:"Федерико Феллини",b:1920,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “La Dolce Vita”",cluer:"Снял «Сладкую жизнь»",hint:"film director",hintr:"режиссёр",ctx:"Post-war Europe inspired films that blended reality with imagination and personal vision",ctxr:"Послевоенная Европа вдохновляла кино, соединяющее реальность и воображение",fact:"He never learned to drive and was famously chauffeured everywhere",factr:"Он так и не научился водить машину и повсюду ездил с личным шофёром",cat:"performing_arts"},
  {n:"Marilyn Monroe",nr:"Мэрилин Монро",b:1926,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “Some Like It Hot”",cluer:"Снялась в «В джазе только девушки»",hint:"actress",hintr:"актриса",ctx:"Hollywood shaped global ideas of fame, beauty and celebrity culture",ctxr:"Голливуд формировал представления о славе, красоте и культуре знаменитостей",fact:"She was born as Norma Jeane Mortenson, later also known as Norma Jeane Baker",factr:"Она родилась под именем Норма Джин Мортенсон и позже также была известна как Норма Джин Бейкер",cat:"performing_arts"},
  {n:"Audrey Hepburn",nr:"Одри Хепберн",b:1929,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “Breakfast at Tiffany’s”",cluer:"Снялась в «Завтрак у Тиффани»",hint:"actress",hintr:"актриса",ctx:"Post-war culture influenced ideals of elegance and modern style",ctxr:"Послевоенная культура влияла на представления об элегантности и стиле",fact:"She won an Oscar, Emmy, Grammy and Tony — one of only 16 EGOT winners",factr:"В детстве она пережила нацистскую оккупацию Нидерландов",cat:"performing_arts"},
  {n:"Alfred Hitchcock",nr:"Альфред Хичкок",b:1899,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Master of suspense films",cluer:"Мастер триллеров",hint:"film director",hintr:"режиссёр",ctx:"Cinema developed new ways to explore suspense, fear and psychology",ctxr:"Кино развивало новые способы передачи напряжения и психологических состояний",fact:"He never won an Academy Award for Best Director despite five nominations",factr:"Несмотря на пять номинаций, он так и не получил премию «Оскар» за режиссуру",cat:"performing_arts"},
  {n:"Stanley Kubrick",nr:"Стэнли Кубрик",b:1928,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “2001: A Space Odyssey”",cluer:"Снял «Космическая одиссея 2001 года»",hint:"film director",hintr:"режиссёр",ctx:"Technological and social change influenced films exploring complex ideas about humanity",ctxr:"Технологические и социальные изменения влияли на кино, исследующее сложные темы",fact:"He was known for his meticulous filmmaking style and often required many takes to achieve the desired result",factr:"Он был известен своей педантичностью и нередко требовал множество дублей для достижения нужного результата",cat:"performing_arts"},
  {n:"Sophia Loren",nr:"Софи Лорен",b:1934,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Academy Award winner",cluer:"Лауреат премии «Оскар»",hint:"actress",hintr:"актриса",ctx:"European cinema gained global recognition, reflecting both everyday life and drama",ctxr:"Европейское кино получало мировое признание, отражая повседневность и драму",fact:"She won the Academy Award for Best Actress for Two Women in 1962 — the first win ever for a performance in a foreign language film",factr:"В 1962 году она получила «Оскар» за лучшую женскую роль в фильме «Чочара» — первая победа за роль на иностранном языке",cat:"performing_arts"},
  {n:"Marlon Brando",nr:"Марлон Брандо",b:1924,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “The Godfather”",cluer:"Снялся в «Крёстном отце»",hint:"actor",hintr:"актёр",ctx:"Acting styles shifted toward realism and emotional intensity",ctxr:"Актёрская игра смещалась в сторону реализма и эмоциональной глубины",fact:"He famously improvised many of his lines in The Godfather",factr:"Многие свои реплики в «Крёстном отце» он придумывал прямо на площадке",cat:"performing_arts"},
  {n:"Robert De Niro",nr:"Роберт Де Ниро",b:1943,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “Taxi Driver”",cluer:"Снялся в «Таксисте»",hint:"actor",hintr:"актёр",ctx:"Modern cinema focused on complex characters and social themes",ctxr:"Современное кино сосредоточилось на сложных персонажах и социальных темах",fact:"He gained 60 pounds for his role as Jake LaMotta in Raging Bull — considered one of the most extreme physical transformations in film history",factr:"Ради роли Джейка ЛаМотта в «Бешеном быке» он набрал 27 килограммов — один из самых радикальных физических перевоплощений в истории кино",cat:"performing_arts"},
  {n:"Al Pacino",nr:"Аль Пачино",b:1940,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “Scarface”",cluer:"Снялся в «Лице со шрамом»",hint:"actor",hintr:"актёр",ctx:"Films explored themes of power, morality and ambition",ctxr:"Фильмы исследовали темы власти, морали и амбиций",fact:"He was considered for the role of Han Solo in Star Wars — he turned it down",factr:"Ему предлагали роль Хана Соло в «Звёздных войнах» — он отказался",cat:"performing_arts"},
  {n:"Jack Nicholson",nr:"Джек Николсон",b:1937,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “The Shining”",cluer:"Снялся в «Сиянии»",hint:"actor",hintr:"актёр",ctx:"Cinema embraced unconventional characters and bold performances",ctxr:"Кино обращалось к нестандартным персонажам и выразительной игре",fact:"He was raised believing his grandmother was his mother and his mother was his sister — he only discovered the truth when he was 37",factr:"До 37 лет он не знал, что его «мать» на самом деле была бабушкой, а «сестра» — матерью",cat:"performing_arts"},
  {n:"Clint Eastwood",nr:"Клинт Иствуд",b:1930,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Star of Western films",cluer:"Звезда вестернов",hint:"actor and director",hintr:"актёр и режиссёр",ctx:"Film storytelling evolved toward more nuanced and modern narratives",ctxr:"Кино переходило к более сложным и современным историям",fact:"He served as mayor of Carmel-by-the-Sea, California from 1986 to 1988",factr:"С 1986 по 1988 год он был мэром Кармел-бай-зе-Си в Калифорнии",cat:"performing_arts"},
  {n:"Steven Spielberg",nr:"Стивен Спилберг",b:1946,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “Jurassic Park”",cluer:"Снял «Парк юрского периода»",hint:"film director",hintr:"режиссёр",ctx:"Blockbuster films became central to global entertainment",ctxr:"Блокбастеры становились важной частью мировых развлечений",fact:"He was rejected by USC film school twice before becoming Hollywood's most successful director",factr:"Дважды получив отказ из USC, он всё равно стал самым кассовым режиссёром Голливуда",cat:"performing_arts"},
  {n:"Martin Scorsese",nr:"Мартин Скорсезе",b:1942,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “Goodfellas”",cluer:"Снял «Славные парни»",hint:"film director",hintr:"режиссёр",ctx:"Urban life and personal stories became key themes in cinema",ctxr:"Городская жизнь и личные истории становились важными темами кино",fact:"He was turned down by a seminary when he wanted to become a priest — he went to film school instead",factr:"В юности он хотел стать священником, но получил отказ в семинарии — и поступил в школу кино",cat:"performing_arts"},
  {n:"James Cameron",nr:"Джеймс Кэмерон",b:1954,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Directed “Titanic”",cluer:"Снял «Титаник»",hint:"film director",hintr:"режиссёр",ctx:"Advances in technology enabled new visual possibilities in filmmaking",ctxr:"Технологии открывали новые визуальные возможности в кино",fact:"He directed both Titanic and Avatar, two of the highest-grossing films in history",factr:"Он снял фильмы «Титаник» и «Аватар», одни из самых кассовых в истории кино",cat:"performing_arts"},
  {n:"Arnold Schwarzenegger",nr:"Арнольд Шварценеггер",b:1947,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Starred in “Terminator”",cluer:"Снялся в «Терминаторе»",hint:"actor",hintr:"актёр",ctx:"Action films gained popularity and shaped global entertainment culture",ctxr:"Боевики становились популярными и влияли на массовую культуру",fact:"He won the Mr. Olympia bodybuilding title seven times before becoming a Hollywood star and politician",factr:"Он семь раз выигрывал титул «Мистер Олимпия», прежде чем стать кинозвездой и политиком",cat:"performing_arts"},
  {n:"Sylvester Stallone",nr:"Сильвестр Сталлоне",b:1946,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Created “Rocky”",cluer:"Создал «Рокки»",hint:"actor",hintr:"актёр",ctx:"Stories of struggle and perseverance resonated with wide audiences",ctxr:"Истории борьбы и упорства находили отклик у широкой аудитории",fact:"He wrote the screenplay for Rocky in just a few days and insisted on starring in the film himself",factr:"Он написал сценарий «Рокки» за несколько дней и настоял на том, чтобы сыграть главную роль",cat:"performing_arts"},
  {n:"Jackie Chan",nr:"Джеки Чан",b:1954,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Star of martial arts films",cluer:"Звезда боевиков",hint:"actor and martial artist",hintr:"актёр и мастер боевых искусств",ctx:"Action cinema combined martial arts with humor and creative choreography",ctxr:"Боевики сочетали боевые искусства с юмором и оригинальной хореографией",fact:"He has broken his nose, both cheekbones, his skull, both hands and fingers, his sternum, his knee, and his ankle — all while performing his own stunts",factr:"Он ломал нос, оба скула, череп, обе руки и пальцы, грудину, колено и лодыжку — всё во время исполнения собственных трюков",cat:"performing_arts"},
  {n:"Bruce Lee",nr:"Брюс Ли",b:1940,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Star of kung fu films",cluer:"Звезда фильмов о кунг-фу",hint:"martial artist and actor",hintr:"мастер боевых искусств и актёр",ctx:"Interest in martial arts and Eastern philosophy influenced global culture",ctxr:"Интерес к боевым искусствам и восточной философии влиял на мировую культуру",fact:"He was renowned for his speed, strength, and influence on martial arts and cinema",factr:"Он прославился своей скоростью, силой и огромным влиянием на боевые искусства и кино",cat:"performing_arts"},
  {n:"Tom Cruise",nr:"Том Круз",b:1962,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Starred in “Mission: Impossible”",cluer:"Снялся в «Миссия невыполнима»",hint:"actor",hintr:"актёр",ctx:"Modern cinema emphasized spectacle and large-scale productions",ctxr:"Современное кино делало акцент на зрелищности и масштабных проектах",fact:"He performed many of his own stunts, including hanging from the side of an airplane during filming",factr:"Он самостоятельно выполняет многие трюки, включая сцену с полётом на внешней стороне самолёта",cat:"performing_arts"},
  {n:"Leonardo DiCaprio",nr:"Леонардо ДиКаприо",b:1974,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Starred in “Titanic”",cluer:"Снялся в «Титанике»",hint:"actor",hintr:"актёр",ctx:"Films increasingly addressed global themes such as identity, power and environment",ctxr:"Фильмы всё чаще затрагивали глобальные темы — личность, власть и окружающую среду",fact:"He won his first Academy Award for Best Actor for The Revenant in 2016 after multiple nominations",factr:"Он получил свой первый «Оскар» за лучшую мужскую роль в 2016 году за фильм «Выживший» после нескольких номинаций",cat:"performing_arts"},
  {n:"Anna Pavlova",nr:"Анна Павлова",b:1881,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Performed “The Dying Swan”",cluer:"Исполнила «Умирающий лебедь»",hint:"ballerina",hintr:"балерина",ctx:"Ballet spread internationally, bringing classical dance to new audiences",ctxr:"Балет распространялся по миру, привлекая новую аудиторию",fact:"She founded her own ballet company and toured the world, helping to popularize ballet internationally",factr:"Она создала собственную балетную труппу и гастролировала по всему миру, популяризируя балет",cat:"performing_arts"},
  {n:"Rudolf Nureyev",nr:"Рудольф Нуреев",b:1938,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Star of world ballet",cluer:"Звезда мирового балета",hint:"ballet dancer",hintr:"артист балета",ctx:"Cultural exchange influenced ballet, expanding its expressive possibilities",ctxr:"Культурный обмен влиял на балет, расширяя его выразительность",fact:"He defected from the Soviet Union in 1961 while on tour in Paris, becoming an international ballet star",factr:"Он бежал из СССР в 1961 году во время гастролей в Париже и стал мировой звездой балета",cat:"performing_arts"},
  {n:"Hayao Miyazaki",nr:"Хаяо Миядзаки",b:1941,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Directed “Spirited Away”",cluer:"Снял «Унесённые призраками»",hint:"film director and animator",hintr:"режиссёр и аниматор",ctx:"Animation developed into a major storytelling form combining imagination and real-world themes",ctxr:"Анимация развивалась как важная форма повествования, соединяя фантазию и реальность",fact:"He co-founded Studio Ghibli, which produced internationally acclaimed animated films",factr:"Он стал сооснователем Studio Ghibli, создавшей всемирно признанные анимационные фильмы",cat:"performing_arts"},
  {n:"Confucius",nr:"Конфуций",b:-551,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Founder of Confucianism",cluer:"Основатель конфуцианства",hint:"philosopher and teacher",hintr:"философ и учитель",ctx:"In a time of political instability, thinkers developed ideas about ethics, society and proper conduct",ctxr:"В период политической нестабильности мыслители формировали идеи об этике и устройстве общества",fact:"He traveled across different states of China seeking rulers who would adopt his philosophical ideas",factr:"Он путешествовал по различным княжествам Китая в поисках правителей, готовых принять его философские идеи",cat:"philosophy_thought"},
  {n:"Laozi",nr:"Лао-цзы",b:-604,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Founder of Taoism",cluer:"Основатель даосизма",hint:"philosopher",hintr:"философ",ctx:"Philosophy explored harmony with nature and simple ways of living",ctxr:"Философия обращалась к гармонии с природой и простоте жизни",fact:"According to tradition, he is regarded as the author of the Tao Te Ching and a foundational figure of Daoism",factr:"Согласно традиции, он считается автором «Дао дэ цзин» и одной из ключевых фигур даосизма",cat:"philosophy_thought"},
  {n:"Socrates",nr:"Сократ",b:-470,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Teacher of Plato",cluer:"Учитель Платона",hint:"philosopher",hintr:"философ",ctx:"Public debate in Athens encouraged questioning about truth, knowledge and how to live",ctxr:"Общественные дискуссии в Афинах побуждали размышлять об истине, знании и жизни",fact:"He did not leave any written works, and most accounts of his life and philosophy come from other authors such as his students",factr:"Он не оставил письменных трудов, и сведения о нём дошли через других авторов, в том числе его учеников",cat:"philosophy_thought"},
  {n:"Plato",nr:"Платон",b:-428,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “The Republic”",cluer:"Автор «Государства»",hint:"philosopher",hintr:"философ",ctx:"Philosophy examined ideal forms and the structure of society and knowledge",ctxr:"Философия исследовала идеальные формы и устройство общества и знания",fact:"He was a student of Socrates and the teacher of Aristotle, playing a central role in Western philosophy",factr:"Он был учеником Сократа и учителем Аристотеля, сыграв ключевую роль в развитии западной философии",cat:"philosophy_thought"},
  {n:"Aristotle",nr:"Аристотель",b:-384,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Teacher of Alexander the Great",cluer:"Учитель Александра Македонского",hint:"philosopher",hintr:"философ",ctx:"Knowledge expanded across disciplines, with systematic study of nature, logic and human behavior",ctxr:"Знания расширялись в разных областях, включая системное изучение природы, логики и человека",fact:"He was the personal tutor of Alexander the Great",factr:"Он был личным наставником Александра Македонского",cat:"philosophy_thought"},
  {n:"Buddha",nr:"Будда",b:-563,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Founder of Buddhism",cluer:"Основатель буддизма",hint:"spiritual teacher",hintr:"духовный учитель",ctx:"Teachings offered paths to understanding suffering and achieving inner balance",ctxr:"Учения предлагали пути понимания страдания и достижения внутреннего равновесия",fact:"He attained enlightenment while meditating under the Bodhi tree, becoming the Buddha",factr:"Он достиг просветления во время медитации под деревом Бодхи и стал Буддой",cat:"philosophy_thought"},
  {n:"Sun Tzu",nr:"Сунь-цзы",b:-544,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “The Art of War”",cluer:"Автор «Искусства войны»",hint:"military strategist",hintr:"военный стратег",ctx:"Ongoing conflicts made strategy and planning essential for power and survival",ctxr:"Постоянные конфликты делали стратегию важной для выживания и власти",fact:"He is traditionally credited as the author of The Art of War, a classic treatise on military strategy",factr:"Ему традиционно приписывается авторство «Искусства войны» — классического труда по военной стратегии",cat:"philosophy_thought"},
  {n:"Saint Augustine",nr:"Аврелий Августин",b:354,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “Confessions”",cluer:"Автор «Исповеди»",hint:"theologian and philosopher",hintr:"теолог и философ",ctx:"Religious thought shaped views on life, morality and human nature in a changing world",ctxr:"Религиозная мысль формировала взгляды на жизнь, мораль и природу человека",fact:"His work Confessions is one of the earliest autobiographical texts in Western literature",factr:"Его труд «Исповедь» считается одним из первых автобиографических произведений в западной литературе",cat:"philosophy_thought"},
  {n:"Thomas Aquinas",nr:"Фома Аквинский",b:1225,note:"",noter:"",era:"High Middle Ages:Late Middle Ages",erar:"Высокое Средневековье:Позднее Средневековье",boundary:1300,clue:"Author of “Summa Theologica”",cluer:"Автор «Суммы теологии»",hint:"theologian and philosopher",hintr:"теолог и философ",ctx:"Scholars worked to connect religious belief with reason and philosophical inquiry",ctxr:"Учёные стремились соединить веру с разумом и философией",fact:"He was so large and quiet that his fellow students called him 'the dumb ox' — his teacher Albertus Magnus predicted the ox would one day fill the world with his bellowing",factr:"Из-за крупного телосложения и молчаливости сокурсники прозвали его «немым быком» — его учитель Альберт Великий предсказал, что этот бык однажды потрясёт весь мир своим рёвом",cat:"philosophy_thought"},
  {n:"Niccolò Machiavelli",nr:"Никколо Макиавелли",b:1469,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Author of “The Prince”",cluer:"Автор «Государя»",hint:"political philosopher",hintr:"политический философ",ctx:"Political struggles led to analysis of power and practical governance",ctxr:"Политическая борьба побуждала анализировать власть и управление",fact:"His book The Prince became one of the most influential works on political power",factr:"Его книга «Государь» стала одним из самых влиятельных трудов о политической власти",cat:"philosophy_thought"},
  {n:"René Descartes",nr:"Рене Декарт",b:1596,note:"",noter:"",era:"Baroque:Renaissance",erar:"Барокко:Ренессанс",boundary:1600,clue:"Proposed “I think, therefore I am”",cluer:"Сформулировал «мыслю, следовательно существую»",hint:"philosopher",hintr:"философ",ctx:"Philosophy and science questioned established ideas in search of certainty",ctxr:"Философия и наука ставили под сомнение устоявшиеся знания в поиске уверенности",fact:"He valued solitary reflection and is known to have spent long periods in private thought",factr:"Он ценил уединённые размышления и, по свидетельствам источников, проводил много времени в одиночестве, обдумывая свои идеи",cat:"philosophy_thought"},
  {n:"John Locke",nr:"Джон Локк",b:1632,note:"",noter:"",era:"Baroque:Enlightenment",erar:"Барокко:Просвещение",boundary:1750,clue:"Theorist of liberalism",cluer:"Теоретик либерализма",hint:"philosopher",hintr:"философ",ctx:"New ideas about rights and government influenced views on society and freedom",ctxr:"Новые идеи о правах и государстве влияли на представления о свободе",fact:"His ideas about natural rights and government influenced later political thought, including developments in the United States",factr:"Его идеи о естественных правах и государстве оказали влияние на последующее развитие политической мысли, в том числе в США",cat:"philosophy_thought"},
  {n:"Immanuel Kant",nr:"Иммануил Кант",b:1724,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Author of “Critique of Pure Reason”",cluer:"Автор «Критики чистого разума»",hint:"philosopher",hintr:"философ",ctx:"Enlightenment thought emphasized reason and examined limits of knowledge and morality",ctxr:"Идеи Просвещения подчёркивали роль разума и исследовали границы знания",fact:"He was known for his highly regular daily routine and disciplined lifestyle",factr:"Он был известен строгим распорядком дня и дисциплинированным образом жизни",cat:"philosophy_thought"},
  {n:"Georg Wilhelm Friedrich Hegel",nr:"Георг Вильгельм Фридрих Гегель",b:1770,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Founder of dialectics",cluer:"Создатель диалектики",hint:"philosopher",hintr:"философ",ctx:"Philosophy considered history as a dynamic process of change and development",ctxr:"Философия рассматривала историю как процесс развития и изменений",fact:"His philosophical writing is often considered complex and difficult to interpret",factr:"Его философские тексты часто считаются сложными и трудными для понимания",cat:"philosophy_thought"},
  {n:"Arthur Schopenhauer",nr:"Артур Шопенгауэр",b:1788,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Author of “The World as Will and Representation”",cluer:"Автор «Мир как воля и представление»",hint:"philosopher",hintr:"философ",ctx:"Philosophy explored human desire, suffering and the nature of will",ctxr:"Философия исследовала желания человека и природу страдания",fact:"He is known for his deeply pessimistic philosophy about human nature and existence",factr:"Он известен своей философией пессимизма, в которой подчёркивал страдание и иррациональность человеческой природы",cat:"philosophy_thought"},
  {n:"Karl Marx",nr:"Карл Маркс",b:1818,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Capital”",cluer:"Автор «Капитала»",hint:"philosopher and economist",hintr:"философ и экономист",ctx:"Industrial society led to analysis of labor, class and economic systems",ctxr:"Индустриальное общество побуждало анализировать труд, классы и экономику",fact:"He lived for many years in London and often experienced financial difficulties",factr:"Он много лет жил в Лондоне и нередко испытывал серьёзные финансовые трудности",cat:"philosophy_thought"},
  {n:"Friedrich Nietzsche",nr:"Фридрих Ницше",b:1844,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Author of “Thus Spoke Zarathustra”",cluer:"Автор «Так говорил Заратустра»",hint:"philosopher",hintr:"философ",ctx:"Traditional values were questioned, with focus on individuality and meaning",ctxr:"Традиционные ценности подвергались сомнению, внимание уделялось личности и смыслу",fact:"He collapsed on a street in Turin and never recovered his sanity",factr:"Он упал на улице в Турине и больше так и не восстановил рассудок",cat:"philosophy_thought"},
  {n:"Sigmund Freud",nr:"Зигмунд Фрейд",b:1856,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founder of psychoanalysis",cluer:"Основатель психоанализа",hint:"neurologist and psychoanalyst",hintr:"невролог и основатель психоанализа",ctx:"Interest grew in the unconscious mind and psychological processes",ctxr:"Интерес к подсознанию и психическим процессам усиливался",fact:"He was known to be a heavy cigar smoker throughout much of his life",factr:"Он на протяжении значительной части жизни был заядлым курильщиком сигар",cat:"philosophy_thought"},
  {n:"Carl Jung",nr:"Карл Юнг",b:1875,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founder of analytical psychology",cluer:"Основатель аналитической психологии",hint:"psychiatrist and psychoanalyst",hintr:"психиатр и психоаналитик",ctx:"Psychology explored symbols, archetypes and the inner world of the mind",ctxr:"Психология изучала символы, архетипы и внутренний мир",fact:"He broke with his mentor Sigmund Freud over disagreements about the unconscious — their split was famously bitter",factr:"Он разорвал отношения со своим наставником Зигмундом Фрейдом из-за разногласий относительно бессознательного",cat:"philosophy_thought"},
  {n:"Jean-Paul Sartre",nr:"Жан-Поль Сартр",b:1905,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Leader of existentialism",cluer:"Представитель экзистенциализма",hint:"philosopher",hintr:"философ",ctx:"After major conflicts, philosophy focused on freedom, responsibility and existence",ctxr:"После крупных конфликтов философия сосредоточилась на свободе и ответственности",fact:"He refused the Nobel Prize in Literature in 1964, stating that a writer should not allow himself to be turned into an institution",factr:"В 1964 году он отказался от Нобелевской премии по литературе, заявив, что писатель не должен превращаться в институт",cat:"philosophy_thought"},
  {n:"Simone de Beauvoir",nr:"Симона де Бовуар",b:1908,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Author of “The Second Sex”",cluer:"Автор «Второго пола»",hint:"philosopher and writer",hintr:"философ и писатель",ctx:"Debates about equality and identity influenced philosophical and social thought",ctxr:"Дискуссии о равенстве и идентичности влияли на философию и общество",fact:"Her book The Second Sex, published in 1949, became one of the founding texts of modern feminism",factr:"Её книга «Второй пол», опубликованная в 1949 году, стала одним из основополагающих текстов современного феминизма",cat:"philosophy_thought"},
  {n:"Michel Foucault",nr:"Мишель Фуко",b:1926,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Author of “Discipline and Punish”",cluer:"Автор «Надзирать и наказывать»",hint:"philosopher",hintr:"философ",ctx:"Modern institutions were examined critically, focusing on power and knowledge",ctxr:"Современные институты подвергались критическому анализу, особенно в вопросах власти",fact:"He described his work as a way of exploring and transforming his own thinking",factr:"Он рассматривал свои работы как способ исследования и изменения собственного мышления",cat:"philosophy_thought"},
  {n:"Noam Chomsky",nr:"Ноам Хомский",b:1928,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Founder of generative grammar",cluer:"Создатель генеративной грамматики",hint:"linguist",hintr:"лингвист",ctx:"Global communication and media influenced debates about language and power",ctxr:"Глобальная коммуникация и медиа влияли на дискуссии о языке и власти",fact:"He is one of the most cited scholars of modern times and also known for his political activism",factr:"Он является одним из самых цитируемых учёных современности и известен своей политической активностью",cat:"philosophy_thought"},
  {n:"Alexander the Great",nr:"Александр Великий",b:-356,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Created vast empire",cluer:"Создал огромную империю",hint:"king and conqueror",hintr:"царь и полководец",ctx:"Large empires expanded rapidly, connecting regions through conquest and exchange",ctxr:"Крупные империи быстро расширялись, соединяя регионы через завоевания и обмен",fact:"He won a series of major battles that led to the creation of one of the largest empires of the ancient world",factr:"Он одержал ряд крупных побед, создав одну из крупнейших империй древнего мира",cat:"politics"},
  {n:"Julius Caesar",nr:"Юлий Цезарь",b:-100,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Dictator of Rome",cluer:"Диктатор Рима",hint:"general and statesman",hintr:"полководец и государственный деятель",ctx:"Internal conflict transformed the Roman Republic and shifted political power",ctxr:"Внутренние конфликты меняли Римскую республику и распределение власти",fact:"He introduced the Julian calendar, which later became the basis for the modern Western calendar",factr:"Он ввёл юлианский календарь, который впоследствии стал основой современного западного календаря",cat:"politics"},
  {n:"Augustus (Octavian)",nr:"Октавиан Август",b:-63,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"First Roman emperor",cluer:"Первый император Рима",hint:"emperor",hintr:"римский император",ctx:"A period of relative stability supported the development of a lasting empire",ctxr:"Период относительной стабильности способствовал укреплению империи",fact:"He became the first Roman emperor after the fall of the Roman Republic",factr:"Он стал первым римским императором после падения Римской республики",cat:"politics"},
  {n:"Qin Shi Huang",nr:"Цинь Шихуан",b:-259,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"First emperor of China",cluer:"Первый император Китая",hint:"emperor",hintr:"император",ctx:"Political unification brought centralized rule and large state projects",ctxr:"Объединение страны привело к централизованной власти и масштабным проектам",fact:"He was the first emperor to unify China and began construction of the Great Wall",factr:"Он стал первым императором, объединившим Китай, и начал строительство Великой китайской стены",cat:"politics"},
  {n:"Genghis Khan",nr:"Чингисхан",b:1162,note:"",noter:"",era:"High Middle Ages:Early Middle Ages",erar:"Высокое Средневековье:Раннее Средневековье",boundary:1000,clue:"Founder of Mongol Empire",cluer:"Основатель Монгольской империи",hint:"conqueror",hintr:"завоеватель",ctx:"Nomadic groups united, forming one of the largest empires in history",ctxr:"Кочевые народы объединялись, создавая одну из крупнейших империй",fact:"At its peak his empire was the largest contiguous land empire in history",factr:"В период расцвета его империя была крупнейшей сухопутной империей в истории",cat:"politics"},
  {n:"Charlemagne",nr:"Карл Великий",b:747,note:"",noter:"",era:"Early Middle Ages:High Middle Ages",erar:"Раннее Средневековье:Высокое Средневековье",boundary:1000,clue:"Crowned emperor in 800",cluer:"Короновался императором в 800 году",hint:"emperor",hintr:"император",ctx:"New political structures formed in Europe after earlier empires declined",ctxr:"После упадка прежних империй в Европе формировались новые государства",fact:"He promoted education and learning, though his own writing skills were limited",factr:"Он способствовал развитию образования, хотя сам владел письмом ограниченно",cat:"politics"},
  {n:"Joan of Arc",nr:"Жанна д’Арк",b:1412,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Led French army",cluer:"Возглавила французскую армию",hint:"military leader",hintr:"военный лидер",ctx:"War and religion shaped conflicts and identities in medieval Europe",ctxr:"Война и религия определяли конфликты и идентичность в Средневековой Европе",fact:"She was executed at age 19 and later canonized as a saint by the Catholic Church",factr:"Она была казнена в 19 лет и позднее канонизирована католической церковью",cat:"politics"},
  {n:"Henry VIII",nr:"Генрих VIII",b:1491,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Founded Anglican Church",cluer:"Создал англиканскую церковь",hint:"king",hintr:"король",ctx:"Religious authority was challenged, changing relations between church and state",ctxr:"Религиозная власть оспаривалась, меняя отношения между церковью и государством",fact:"He was a talented musician and composer in his youth",factr:"В молодости он был талантливым музыкантом и композитором",cat:"politics"},
  {n:"Elizabeth I",nr:"Елизавета I",b:1533,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Queen of England",cluer:"Королева Англии",hint:"queen",hintr:"королева",ctx:"Political stability and exploration strengthened national identity",ctxr:"Политическая стабильность и исследования укрепляли национальную идентичность",fact:"Her reign is known as the Elizabethan Era, a period of cultural flourishing in England",factr:"Её правление известно как Елизаветинская эпоха — период культурного расцвета в Англии",cat:"politics"},
  {n:"Napoleon Bonaparte",nr:"Наполеон Бонапарт",b:1769,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Emperor of France",cluer:"Император Франции",hint:"general and emperor",hintr:"полководец и император",ctx:"Revolutionary ideas spread, reshaping borders and systems of power",ctxr:"Революционные идеи распространялись, меняя границы и власть",fact:"He was of about average height for a man of his time",factr:"По меркам своей эпохи он был примерно среднего роста",cat:"politics"},
  {n:"George Washington",nr:"Джордж Вашингтон",b:1732,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"First US president",cluer:"Первый президент США",hint:"president",hintr:"президент",ctx:"New political systems based on independence and self-governance emerged",ctxr:"Появлялись новые системы управления, основанные на независимости",fact:"He was the only US president unanimously elected by the Electoral College",factr:"Он единственный президент США, единогласно избранный коллегией выборщиков",cat:"politics"},
  {n:"Abraham Lincoln",nr:"Авраам Линкольн",b:1809,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Abolished slavery in US",cluer:"Отменил рабство в США",hint:"president",hintr:"президент",ctx:"Conflict tested national unity and raised questions about rights and equality",ctxr:"Конфликт проверял единство страны и поднимал вопросы прав и равенства",fact:"He is the only US president to have held a patent — for a device to lift boats",factr:"Он единственный президент США, имевший патент — на устройство для подъёма судов на мелководье",cat:"politics"},
  {n:"Otto von Bismarck",nr:"Отто фон Бисмарк",b:1815,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Unified Germany",cluer:"Объединил Германию",hint:"statesman",hintr:"государственный деятель",ctx:"Diplomacy and strategy contributed to the formation of nation-states",ctxr:"Дипломатия и стратегия способствовали созданию национальных государств",fact:"He unified the German states into one nation in 1871",factr:"В 1871 году он объединил германские государства в единую нацию",cat:"politics"},
  {n:"Vladimir Lenin",nr:"Владимир Ленин",b:1870,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Led Bolshevik Revolution",cluer:"Возглавил большевистскую революцию",hint:"revolutionary leader",hintr:"революционный лидер",ctx:"Revolutionary movements replaced old political systems with new ideological structures",ctxr:"Революционные движения сменяли прежние политические системы новыми идеологиями",fact:"He led the Bolshevik Revolution in 1917 and became the first head of the Soviet state",factr:"Он возглавил Октябрьскую революцию 1917 года и стал первым руководителем советского государства",cat:"politics"},
  {n:"Joseph Stalin",nr:"Иосиф Сталин",b:1878,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of Soviet Union",cluer:"Руководитель СССР",hint:"political leader",hintr:"политический лидер",ctx:"Centralized control and rapid industrialization transformed the Soviet state",ctxr:"Централизованное управление и индустриализация меняли советское государство",fact:"He ruled the Soviet Union from the mid-1920s until his death in 1953",factr:"Он руководил Советским Союзом с середины 1920-х годов до своей смерти в 1953 году",cat:"politics"},
  {n:"Adolf Hitler",nr:"Адольф Гитлер",b:1889,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of Nazi Germany",cluer:"Лидер нацистской Германии",hint:"dictator",hintr:"диктатор",ctx:"Extremist ideology and expansionist policies led to global conflict and destruction",ctxr:"Радикальная идеология и экспансия привели к мировой войне и разрушениям",fact:"He became Chancellor of Germany in 1933 and established a totalitarian regime",factr:"Он стал канцлером Германии в 1933 году и установил тоталитарный режим",cat:"politics"},
  {n:"Winston Churchill",nr:"Уинстон Черчилль",b:1874,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"British prime minister in WWII",cluer:"Премьер-министр Великобритании во время Второй мировой войны",hint:"prime minister",hintr:"премьер-министр",ctx:"Leadership during wartime became crucial in shaping national resilience",ctxr:"Лидерство во время войны играло важную роль в устойчивости страны",fact:"He won the Nobel Prize in Literature in 1953",factr:"В 1953 году он получил Нобелевскую премию по литературе",cat:"politics"},
  {n:"Franklin D. Roosevelt",nr:"Франклин Д. Рузвельт",b:1882,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"US president during WWII",cluer:"Президент США во время Второй мировой войны",hint:"president",hintr:"президент",ctx:"Economic crisis and war increased the role of government in society",ctxr:"Экономический кризис и война усиливали роль государства в обществе",fact:"He was the only US president elected four times",factr:"Он был единственным президентом США, избранным четыре раза",cat:"politics"},
  {n:"Mao Zedong",nr:"Мао Цзэдун",b:1893,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of communist China",cluer:"Лидер коммунистического Китая",hint:"political leader",hintr:"политический лидер",ctx:"Revolution led to major political and social transformation in China",ctxr:"Революция привела к крупным политическим и социальным изменениям в Китае",fact:"He was known for public swimming events, including a widely publicized swim in the Yangtze River later in life",factr:"Он был известен публичными заплывами, включая широко освещённый заплыв через Янцзы в поздние годы",cat:"politics"},
  {n:"Mahatma Gandhi",nr:"Махатма Ганди",b:1869,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Leader of Indian independence",cluer:"Лидер независимости Индии",hint:"political and spiritual leader",hintr:"политический и духовный лидер",ctx:"Movements for independence used nonviolent resistance to achieve political change",ctxr:"Движения за независимость использовали ненасильственное сопротивление",fact:"He was nominated for the Nobel Peace Prize five times but never won",factr:"Он был номинирован на Нобелевскую премию мира пять раз, но так её и не получил",cat:"politics"},
  {n:"Nelson Mandela",nr:"Нельсон Мандела",b:1918,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Ended apartheid in South Africa",cluer:"Покончил с апартеидом в ЮАР",hint:"political leader",hintr:"политический лидер",ctx:"Struggle against institutionalized inequality led to major political change",ctxr:"Борьба с системным неравенством привела к политическим изменениям",fact:"He spent 27 years in prison before becoming president of South Africa",factr:"Он провёл 27 лет в заключении, прежде чем стать президентом ЮАР",cat:"politics"},
  {n:"John F. Kennedy",nr:"Джон Ф. Кеннеди",b:1917,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"US president in 1960s",cluer:"Президент США 1960-х",hint:"president",hintr:"президент",ctx:"Cold War tensions and technological competition shaped global politics",ctxr:"Холодная война и технологическое соперничество влияли на мировую политику",fact:"He was the youngest person elected President of the United States",factr:"Он стал самым молодым человеком, избранным президентом США",cat:"politics"},
  {n:"Margaret Thatcher",nr:"Маргарет Тэтчер",b:1925,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"The “Iron Lady”",cluer:"«Железная леди»",hint:"prime minister",hintr:"премьер-министр",ctx:"Economic policy shifted toward market-oriented reforms",ctxr:"Экономическая политика смещалась в сторону рыночных реформ",fact:"She was the first female Prime Minister of the United Kingdom",factr:"Она была первой женщиной — премьер-министром Великобритании",cat:"politics"},
  {n:"Ronald Reagan",nr:"Рональд Рейган",b:1911,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Former actor, US president",cluer:"Бывший актёр, президент США",hint:"president",hintr:"президент",ctx:"Political changes reflected the later stages of Cold War tensions",ctxr:"Политические изменения отражали поздний этап холодной войны",fact:"He was a Hollywood actor before becoming the 40th President of the United States",factr:"Он был голливудским актёром до того, как стал 40-м президентом США",cat:"politics"},
  {n:"Deng Xiaoping",nr:"Дэн Сяопин",b:1904,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Launched economic reforms",cluer:"Запустил экономические реформы",hint:"political leader",hintr:"политический лидер",ctx:"Economic reforms opened the country to global markets and development",ctxr:"Экономические реформы открывали страну для мировых рынков",fact:"He was purged more than once during political campaigns before later becoming China’s paramount leader",factr:"Он подвергался политическим репрессиям более одного раза, прежде чем стать фактическим лидером Китая",cat:"politics"},
  {n:"Martin Luther King Jr.",nr:"Мартин Лютер Кинг",b:1929,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Led civil rights movement",cluer:"Возглавил движение за гражданские права",hint:"civil rights leader",hintr:"лидер движения за гражданские права",ctx:"Civil rights movements challenged inequality and demanded equal rights",ctxr:"Движения за гражданские права боролись с неравенством и требовали равенства",fact:"He delivered his “I Have a Dream” speech during the 1963 March on Washington to a crowd of hundreds of thousands",factr:"Он произнёс речь «У меня есть мечта» во время Марша на Вашингтон в 1963 году перед аудиторией в сотни тысяч человек",cat:"politics"},
  {n:"Princess Diana",nr:"Принцесса Диана",b:1961,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Humanitarian figure",cluer:"Гуманитарный деятель",hint:"princess and humanitarian",hintr:"принцесса и гуманитарный деятель",ctx:"Media attention changed the public role of well-known figures",ctxr:"Медиа меняли роль публичных личностей",fact:"She helped change public attitudes toward HIV/AIDS by publicly shaking hands with patients at a time of widespread stigma",factr:"Она повлияла на отношение к ВИЧ/СПИДу, публично пожимая руки пациентам в период сильной стигматизации",cat:"politics"},
  {n:"Cleopatra",nr:"Клеопатра",b:-69,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Queen of ancient Egypt",cluer:"Царица Древнего Египта",hint:"queen",hintr:"царица",ctx:"Regional power struggles influenced alliances and the future of Egypt",ctxr:"Борьба за власть в регионе влияла на союзы и будущее Египта",fact:"She was one of the few rulers of her dynasty to learn the Egyptian language",factr:"Она была одной из немногих правителей своей династии, владевших египетским языком",cat:"politics"},
  {n:"Suleiman the Magnificent",nr:"Сулейман Великолепный",b:1494,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Expanded Ottoman Empire",cluer:"Расширил Османскую империю",hint:"sultan",hintr:"султан",ctx:"A powerful empire expanded its influence across regions and cultures",ctxr:"Могущественная империя расширяла влияние на разные регионы",fact:"He oversaw the peak of the Ottoman Empire’s political and military power during his reign",factr:"При нём Османская империя достигла пика политического и военного могущества",cat:"politics"},
  {n:"Louis XIV",nr:"Людовик XIV",b:1638,note:"",noter:"",era:"Baroque:Enlightenment",erar:"Барокко:Просвещение",boundary:1750,clue:"The “Sun King”",cluer:"«Король-солнце»",hint:"king",hintr:"король",ctx:"Centralized monarchy shaped politics, culture and court life",ctxr:"Централизованная монархия влияла на политику и культуру",fact:"He built the Palace of Versailles and reigned for 72 years — the longest of any major monarch",factr:"Он построил Версальский дворец и правил 72 года — дольше любого другого крупного монарха",cat:"politics"},
  {n:"Queen Victoria",nr:"Королева Виктория",b:1819,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Queen of the United Kingdom",cluer:"Королева Великобритании",hint:"queen",hintr:"королева",ctx:"Industrial growth and empire expansion influenced global society",ctxr:"Промышленный рост и расширение империи влияли на мировой порядок",fact:"She reigned for over 60 years, the longest of any British monarch at the time",factr:"Она правила более 60 лет — дольше любого британского монарха на тот момент",cat:"politics"},
  {n:"Marie Antoinette",nr:"Мария-Антуанетта",b:1755,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Queen of France",cluer:"Королева Франции",hint:"queen",hintr:"королева",ctx:"Social tensions increased before major political upheaval",ctxr:"Социальное напряжение усиливалось перед крупными переменами",fact:"She never actually said 'Let them eat cake'",factr:"Она никогда не произносила фразу «Пусть едят пирожные»",cat:"politics"},
  {n:"Akbar",nr:"Акбар",b:1542,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Mughal emperor of India",cluer:"Император Великих Моголов",hint:"emperor",hintr:"император",ctx:"Large empires integrated diverse cultures and populations",ctxr:"Крупные империи объединяли разные культуры и народы",fact:"He promoted religious tolerance and abolished the jizya tax on non-Muslims in his empire",factr:"Он проводил политику религиозной терпимости и отменил налог джизья для немусульман",cat:"politics"},
  {n:"Mansa Musa",nr:"Манса Муса",b:1280,note:"",noter:"",era:"High Middle Ages:Late Middle Ages",erar:"Высокое Средневековье:Позднее Средневековье",boundary:1300,clue:"Ruler of Mali Empire",cluer:"Правитель Мали",hint:"ruler",hintr:"правитель",ctx:"Trade networks brought wealth and cultural exchange across regions",ctxr:"Торговые сети приносили богатство и культурный обмен",fact:"He is widely regarded as one of the richest individuals in history and was known for his lavish pilgrimage to Mecca",factr:"Он считается одним из самых богатых людей в истории и прославился своим роскошным паломничеством в Мекку",cat:"politics"},
  {n:"Desmond Tutu",nr:"Десмонд Туту",b:1931,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Anti-apartheid activist",cluer:"Борец с апартеидом",hint:"archbishop and human rights activist",hintr:"архиепископ и правозащитник",ctx:"Global focus on human rights influenced movements for justice and equality",ctxr:"Внимание к правам человека влияло на движения за справедливость",fact:"He helped popularize the term “Rainbow Nation” to describe post-apartheid South Africa",factr:"Он способствовал популяризации термина «Радужная нация» для описания Южной Африки после апартеида",cat:"politics"},
  {n:"Jesus Christ",nr:"Иисус Христос",b:-4,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Central figure of Christianity",cluer:"Центральная фигура христианства",hint:"religious leader",hintr:"религиозный лидер",ctx:"Religious teachings spread and shaped beliefs across societies for centuries",ctxr:"Религиозные учения распространялись и влияли на верования на протяжении веков",fact:"His teachings form the foundation of Christianity, one of the world's largest religions",factr:"Его учение лежит в основе христианства — одной из крупнейших религий мира",cat:"religion"},
  {n:"Muhammad",nr:"Мухаммед",b:570,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Early Middle Ages:Ancient",erar:"Раннее Средневековье:Античность",boundary:500,clue:"Founder of Islam",cluer:"Основатель ислама",hint:"prophet",hintr:"пророк",ctx:"A new religious community formed, bringing social and cultural change",ctxr:"Формировалось новое религиозное сообщество, меняя общество и культуру",fact:"He is regarded as the final prophet in Islam and received the Quran according to Islamic tradition",factr:"Он считается последним пророком в исламе и, согласно традиции, получил откровение Корана",cat:"religion"},
  {n:"Moses",nr:"Моисей",b:-1300,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Led Exodus from Egypt",cluer:"Вывел евреев из Египта",hint:"prophet",hintr:"пророк",ctx:"Religious traditions helped shape laws and collective identity",ctxr:"Религиозные традиции формировали законы и общую идентичность",fact:"He is traditionally credited with leading the Israelites out of Egypt in the Exodus",factr:"Ему традиционно приписывается вывод израильтян из Египта во время Исхода",cat:"religion"},
  {n:"Abraham",nr:"Авраам",b:-1800,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Biblical patriarch",cluer:"Библейский патриарх",hint:"patriarch",hintr:"патриарх",ctx:"Early belief systems laid foundations for major religious traditions",ctxr:"Ранние верования закладывали основы крупных религий",fact:"He is a central figure in Judaism, Christianity, and Islam",factr:"Он является ключевой фигурой в иудаизме, христианстве и исламе",cat:"religion"},
  {n:"Krishna",nr:"Кришна",b:-3200,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Central figure of Bhagavad Gita",cluer:"Герой «Бхагавад-гиты»",hint:"deity",hintr:"божество",ctx:"Spiritual traditions influenced cultural and philosophical life",ctxr:"Духовные традиции влияли на культуру и философию",fact:"He is a major deity in Hinduism and a central figure in the Bhagavad Gita",factr:"Он является одним из главных божеств индуизма и центральной фигурой «Бхагавад-гиты»",cat:"religion"},
  {n:"Zoroaster",nr:"Заратустра",b:-1000,note:"approximate date; exact year is uncertain or debated",noter:"приблизительная дата; точный год неизвестен или является предметом споров",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Founder of Zoroastrianism",cluer:"Основатель зороастризма",hint:"prophet",hintr:"пророк",ctx:"Ideas about morality and dualism influenced later religious thought",ctxr:"Представления о добре и зле влияли на последующие религии",fact:"He founded Zoroastrianism, one of the world’s oldest known monotheistic religions",factr:"Он основал зороастризм — одну из древнейших известных монотеистических религий",cat:"religion"},
  {n:"Guru Nanak",nr:"Гуру Нанак",b:1469,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Founder of Sikhism",cluer:"Основатель сикхизма",hint:"religious leader",hintr:"религиозный лидер",ctx:"New religious movements brought together different traditions",ctxr:"Новые религиозные движения объединяли различные традиции",fact:"According to Sikh tradition, he had a profound spiritual experience that became central to the founding of Sikhism",factr:"Согласно сикхской традиции, он пережил духовный опыт, который стал важным для возникновения сикхизма",cat:"religion"},
  {n:"Martin Luther",nr:"Мартин Лютер",b:1483,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Leader of Reformation",cluer:"Лидер Реформации",hint:"theologian",hintr:"теолог",ctx:"Religious reform movements changed the structure of the church",ctxr:"Реформационные движения меняли устройство церкви",fact:"In 1517, he published his Ninety-five Theses, challenging certain practices of the Catholic Church",factr:"В 1517 году он опубликовал свои 95 тезисов, критикуя некоторые практики католической церкви",cat:"religion"},
  {n:"Dalai Lama (14th)",nr:"Далай-лама XIV",b:1935,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Leader of Tibetan Buddhism",cluer:"Лидер тибетского буддизма",hint:"religious leader",hintr:"религиозный лидер",ctx:"Global discussions included topics of culture, identity and spiritual leadership",ctxr:"Глобальные обсуждения затрагивали культуру, идентичность и духовное лидерство",fact:"He was recognized as the reincarnation of the previous Dalai Lama at age 2",factr:"В возрасте 2 лет он был признан реинкарнацией предыдущего Далай-ламы",cat:"religion"},
  {n:"Mother Teresa",nr:"Мать Тереза",b:1910,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Nobel Peace Prize laureate",cluer:"Лауреат Нобелевской премии мира",hint:"nun and missionary",hintr:"монахиня и миссионер",ctx:"Humanitarian efforts focused on helping people in need",ctxr:"Гуманитарная деятельность была направлена на помощь нуждающимся",fact:"She founded the Missionaries of Charity which operates in over 130 countries",factr:"Она основала Орден миссионерок милосердия, действующий более чем в 130 странах",cat:"religion"},
  {n:"Pope John Paul II",nr:"Папа Иоанн Павел II",b:1920,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Head of Catholic Church",cluer:"Глава католической церкви",hint:"pope",hintr:"папа римский",ctx:"Religious leadership reached global audiences through modern communication",ctxr:"Религиозное лидерство обращалось к мировой аудитории через современные средства связи",fact:"He was the first non-Italian pope in 455 years",factr:"Он стал первым не итальянским папой за 455 лет",cat:"religion"},
  {n:"Rumi",nr:"Руми",b:1207,note:"",noter:"",era:"High Middle Ages:Late Middle Ages",erar:"Высокое Средневековье:Позднее Средневековье",boundary:1300,clue:"Author of mystical poetry",cluer:"Автор мистической поэзии",hint:"poet",hintr:"поэт",ctx:"Poetry expressed themes of spirituality, love and connection",ctxr:"Поэзия выражала духовность, любовь и связь",fact:"His poetry has become widely popular internationally, especially in the United States",factr:"Его поэзия получила широкую популярность во всём мире, особенно в США",cat:"religion"},
  {n:"Florence Nightingale",nr:"Флоренс Найтингейл",b:1820,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founder of modern nursing",cluer:"Основательница сестринского дела",hint:"nurse and reformer",hintr:"медсестра и реформатор здравоохранения",ctx:"Healthcare became more organized, improving patient care",ctxr:"Медицина становилась более организованной, улучшая уход за пациентами",fact:"She is considered the founder of modern nursing",factr:"Она считается основательницей современного сестринского дела",cat:"religion"},
  {n:"Pythagoras",nr:"Пифагор",b:-570,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Formulated Pythagorean theorem",cluer:"Сформулировал теорему Пифагора",hint:"mathematician",hintr:"математик",ctx:"Early thinkers explored mathematical relationships and patterns in nature",ctxr:"Ранние мыслители изучали математические закономерности в природе",fact:"He founded a philosophical and religious community that placed great importance on numbers and harmony",factr:"Он основал философско-религиозное сообщество, придававшее большое значение числам и гармонии",cat:"science"},
  {n:"Archimedes",nr:"Архимед",b:-287,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Discovered buoyancy principle",cluer:"Открыл закон Архимеда",hint:"mathematician",hintr:"математик",ctx:"Advances in science and engineering addressed practical problems",ctxr:"Развитие науки и инженерии помогало решать практические задачи",fact:"He discovered important principles of mathematics and physics, including the law of buoyancy",factr:"Он открыл важные законы математики и физики, включая закон плавучести",cat:"science"},
  {n:"Euclid",nr:"Евклид",b:-300,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"Author of “Elements”",cluer:"Автор «Начал»",hint:"mathematician",hintr:"математик",ctx:"Mathematics was organized into systems that structured knowledge",ctxr:"Математика систематизировалась, формируя основу знаний",fact:"His book Elements, written around 300 BC, was used as a mathematics textbook for over 2,000 years",factr:"Его книга «Начала», написанная около 300 года до н.э., использовалась как учебник математики более 2000 лет",cat:"science"},
  {n:"Ibn Sina (Avicenna)",nr:"Ибн Сина (Авиценна)",b:980,note:"",noter:"",era:"Early Middle Ages:High Middle Ages",erar:"Раннее Средневековье:Высокое Средневековье",boundary:1000,clue:"Author of “Canon of Medicine”",cluer:"Автор «Канона врачебной науки»",hint:"physician and philosopher",hintr:"врач и философ",ctx:"Scientific and medical knowledge expanded and was preserved and developed",ctxr:"Научные и медицинские знания сохранялись и развивались",fact:"His medical encyclopedia The Canon of Medicine was a standard textbook in European universities for 600 years",factr:"Его медицинская энциклопедия «Канон врачебной науки» была стандартным учебником в европейских университетах на протяжении 600 лет",cat:"science"},
  {n:"Nicolaus Copernicus",nr:"Николай Коперник",b:1473,note:"",noter:"",era:"Renaissance:Late Middle Ages",erar:"Ренессанс:Позднее Средневековье",boundary:1400,clue:"Proposed heliocentric model",cluer:"Предложил гелиоцентрическую систему",hint:"astronomer",hintr:"астроном",ctx:"New ideas about the universe challenged established views",ctxr:"Новые представления о Вселенной ставили под сомнение прежние взгляды",fact:"He proposed a heliocentric model in which the Earth orbits the Sun",factr:"Он предложил гелиоцентрическую модель, согласно которой Земля вращается вокруг Солнца",cat:"science"},
  {n:"Galileo Galilei",nr:"Галилео Галилей",b:1564,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Improved telescope observations",cluer:"Усовершенствовал телескопические наблюдения",hint:"astronomer and physicist",hintr:"астроном и физик",ctx:"Observation and experiment changed understanding of the natural world",ctxr:"Наблюдения и эксперименты меняли понимание природы",fact:"He improved the telescope and used it to make important astronomical observations supporting heliocentrism",factr:"Он усовершенствовал телескоп и использовал его для астрономических наблюдений в поддержку гелиоцентризма",cat:"science"},
  {n:"Johannes Kepler",nr:"Иоганн Кеплер",b:1571,note:"",noter:"",era:"Renaissance:Baroque",erar:"Ренессанс:Барокко",boundary:1600,clue:"Formulated planetary motion laws",cluer:"Сформулировал законы движения планет",hint:"astronomer",hintr:"астроном",ctx:"Mathematical laws helped explain planetary motion",ctxr:"Математические законы объясняли движение планет",fact:"He calculated the exact laws of planetary motion while his mother was on trial for witchcraft",factr:"Он вычислял точные законы движения планет, пока его мать находилась под судом по обвинению в колдовстве",cat:"science"},
  {n:"Isaac Newton",nr:"Исаак Ньютон",b:1643,note:"",noter:"",era:"Baroque:Enlightenment",erar:"Барокко:Просвещение",boundary:1750,clue:"Discovered universal gravitation",cluer:"Открыл закон всемирного тяготения",hint:"physicist and mathematician",hintr:"физик и математик",ctx:"Scientific principles described motion and natural laws",ctxr:"Научные принципы описывали движение и законы природы",fact:"He independently developed calculus and made foundational contributions to physics and mathematics",factr:"Он независимо разработал математический анализ и сделал фундаментальный вклад в физику и математику",cat:"science"},
