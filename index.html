останции", "c": "literature"}, {"n": "John Steinbeck", "nr": "Джон Стейнбек", "b": 1902, "h": "novelist", "hr": "романист", "f": "He travelled across America with his dog Charley to research Travels with Charley — published the year before he won the Nobel Prize", "fr": "Он объездил всю Америку вместе со своей собакой Чарли, собирая материал для книги — опубликованной за год до его Нобелевской премии", "c": "literature"}, {"n": "Gabriel García Márquez", "nr": "Габриэль Гарсиа Маркес", "b": 1927, "h": "novelist", "hr": "романист", "f": "He kept the manuscript of One Hundred Years of Solitude hidden for six months fearing it was too strange", "fr": "Закончив «Сто лет одиночества», он шесть месяцев прятал рукопись, опасаясь, что она слишком странная", "c": "literature"}, {"n": "Jorge Luis Borges", "nr": "Хорхе Луис Борхес", "b": 1899, "h": "novelist and poet", "hr": "романист и поэт", "f": "He was nearly blind for the last 30 years of his life yet continued writing", "fr": "Последние 30 лет жизни он почти не видел, однако продолжал писать", "c": "literature"}, {"n": "Pablo Neruda", "nr": "Пабло Неруда", "b": 1904, "h": "poet", "hr": "поэт", "f": "He adopted his pen name to hide his writing from his father", "fr": "Он взял псевдоним, чтобы скрыть своё творчество от отца", "c": "literature"}, {"n": "Mario Vargas Llosa", "nr": "Марио Варгас Льоса", "b": 1936, "h": "novelist", "hr": "романист", "f": "He punched Gabriel García Márquez in the face in 1976 — the two former friends did not speak for decades", "fr": "В 1976 году он ударил Габриэля Гарсиа Маркеса кулаком в лицо — бывшие друзья не разговаривали друг с другом несколько десятилетий", "c": "literature"}, {"n": "Rabindranath Tagore", "nr": "Рабиндранат Тагор", "b": 1861, "h": "novelist and poet", "hr": "поэт и романист", "f": "He was the first non-European to win the Nobel Prize in Literature", "fr": "Он стал первым неевропейцем, получившим Нобелевскую премию по литературе", "c": "literature"}, {"n": "Murasaki Shikibu", "nr": "Мурасаки Сикибу", "b": 973, "h": "novelist", "hr": "романист", "f": "Her novel The Tale of Genji, written around 1000 AD, is widely considered the world's first novel", "fr": "Её роман «Повесть о Гэндзи», написанный около 1000 года н.э., широко считается первым романом в мире", "c": "literature"}, {"n": "Lu Xun", "nr": "Лу Синь", "b": 1881, "h": "novelist", "hr": "романист и прозаик", "f": "He abandoned a career in medicine after seeing a slide of an execution and deciding literature could save China better than medicine", "fr": "Он отказался от карьеры врача, увидев слайд с изображением казни, и решил, что литература может спасти Китай лучше медицины", "c": "literature"}, {"n": "Naguib Mahfouz", "nr": "Нагиб Махфуз", "b": 1911, "h": "novelist", "hr": "романист", "f": "He was stabbed in the neck by an Islamic extremist in 1994 at age 82 and survived, though with permanent nerve damage", "fr": "В 1994 году исламский экстремист нанёс ему удар ножом в шею — 82-летний писатель выжил, но получил постоянное повреждение нервов", "c": "literature"}, {"n": "Chinua Achebe", "nr": "Чинуа Ачебе", "b": 1930, "h": "novelist", "hr": "романист", "f": "His novel Things Fall Apart has sold over 20 million copies and been translated into more than 57 languages", "fr": "Его роман «Всё рассыпается» разошёлся тиражом более 20 миллионов экземпляров и переведён на более чем 57 языков", "c": "literature"}, {"n": "Alexander Pushkin", "nr": "Александр Пушкин", "b": 1799, "h": "novelist and poet", "hr": "поэт и романист", "f": "He was killed in a duel at age 37 — defending the honour of his wife against a French officer", "fr": "Он был убит на дуэли в 37 лет — защищая честь жены от французского офицера", "c": "literature"}, {"n": "Anna Akhmatova", "nr": "Анна Ахматова", "b": 1889, "h": "poet", "hr": "поэт", "f": "During Stalin's purges her son was imprisoned — she stood in prison queues for 17 months and wrote her secret poem Requiem from memory", "fr": "Во время сталинских репрессий её сын был заключён в тюрьму — она стояла в тюремных очередях 17 месяцев и записала тайную поэму «Реквием» по памяти", "c": "literature"}, {"n": "Vladimir Mayakovsky", "nr": "Владимир Маяковский", "b": 1893, "h": "poet", "hr": "поэт", "f": "He shot himself at age 36 — Stalin later declared him the greatest poet of the Soviet era", "fr": "Он застрелился в 36 лет — впоследствии Сталин объявил его величайшим поэтом советской эпохи", "c": "literature"}, {"n": "Hans Christian Andersen", "nr": "Ханс Кристиан Андерсен", "b": 1805, "h": "novelist", "hr": "романист и сказочник", "f": "He was so afraid of being buried alive that he left notes saying he was only sleeping", "fr": "Он так боялся быть похороненным заживо, что оставлял записки с объяснением, что просто спит", "c": "literature"}, {"n": "Lewis Carroll", "nr": "Льюис Кэрролл", "b": 1832, "h": "novelist", "hr": "романист", "f": "His real name was Charles Dodgson — he was a mathematics lecturer at Oxford who invented Alice's Adventures in Wonderland for a real girl named Alice Liddell", "fr": "Его настоящее имя — Чарльз Доджсон; он был лектором по математике в Оксфорде и придумал «Алису в Стране чудес» для реальной девочки по имени Алиса Лиддел", "c": "literature"}, {"n": "Jules Verne", "nr": "Жюль Верн", "b": 1828, "h": "novelist", "hr": "романист", "f": "He predicted the Moon landing, submarines and the internet in his novels", "fr": "В своих романах он предсказал высадку на Луну, подводные лодки и интернет", "c": "literature"}, {"n": "George Orwell", "nr": "Джордж Оруэлл", "b": 1903, "h": "novelist", "hr": "романист", "f": "He wrote 1984 while seriously ill with tuberculosis", "fr": "Он написал роман «1984», будучи тяжелобольным туберкулёзом", "c": "literature"}, {"n": "Albert Camus", "nr": "Альбер Камю", "b": 1913, "h": "novelist and philosopher", "hr": "романист и философ", "f": "He died in a car accident at age 46 — an unused train ticket was found in his coat pocket", "fr": "Он погиб в автокатастрофе в 46 лет — в кармане его пальто нашли неиспользованный железнодорожный билет", "c": "literature"}, {"n": "Jean-Paul Sartre", "nr": "Жан-Поль Сартр", "b": 1905, "h": "novelist and philosopher", "hr": "романист и философ", "f": "He refused the Nobel Prize in Literature in 1964 — the first person ever to voluntarily decline it", "fr": "В 1964 году он отказался от Нобелевской премии по литературе — первый человек, добровольно отвергший её", "c": "literature"}, {"n": "Virgil", "nr": "Вергилий", "b": -70, "h": "poet", "hr": "поэт", "f": "He spent the last 11 years of his life writing the Aeneid and asked on his deathbed for it to be burned — his friends refused", "fr": "Он провёл последние 11 лет жизни, создавая «Энеиду», и перед смертью попросил сжечь её — друзья отказались", "c": "literature"}, {"n": "Ovid", "nr": "Овидий", "b": -43, "h": "poet", "hr": "поэт", "f": "He was banished to the Black Sea coast by Emperor Augustus and never allowed to return to Rome — the reason remains unknown", "fr": "Император Август выслал его на берег Чёрного моря, и он так никогда и не был помилован — причины до сих пор неизвестны", "c": "literature"}, {"n": "Li Bai", "nr": "Ли Бо", "b": 701, "h": "poet", "hr": "поэт", "f": "Legend says he drowned trying to embrace the reflection of the Moon in water while drunk — though historians consider this a romantic myth", "fr": "По легенде, он утонул, пытаясь обнять отражение луны в воде, будучи пьяным — историки считают это романтическим мифом", "c": "literature"}, {"n": "Hafez", "nr": "Хафиз", "b": 1315, "h": "poet", "hr": "поэт", "f": "His poetry is so revered in Iran that his book is kept in many homes alongside the Quran and used for divination", "fr": "Его стихи так почитаются в Иране, что его книгу хранят во многих домах рядом с Кораном и используют для гаданий", "c": "literature"}, {"n": "Mikhail Bulgakov", "nr": "Михаил Булгаков", "b": 1891, "h": "novelist", "hr": "романист", "f": "The Master and Margarita was kept hidden for 26 years after his death — Stalin had read his work and inexplicably spared his life", "fr": "«Мастер и Маргарита» пролежала скрытой 26 лет после его смерти — Сталин читал его произведения и по непонятным причинам пощадил его", "c": "literature"}, {"n": "Ivan Turgenev", "nr": "Иван Тургенев", "b": 1818, "h": "novelist", "hr": "романист", "f": "His novel Fathers and Sons introduced the word 'nihilism' into common usage", "fr": "В его романе «Отцы и дети» слово «нигилизм» впервые вошло в широкое употребление", "c": "literature"}, {"n": "Hermann Hesse", "nr": "Герман Гессе", "b": 1877, "h": "novelist", "hr": "романист", "f": "He won the Nobel Prize in Literature in 1946 — his novel Siddhartha sold millions of copies in the 1960s counterculture", "fr": "В 1946 году он получил Нобелевскую премию по литературе — его роман «Сиддхартха» разошёлся миллионными тиражами в эпоху контркультуры 1960-х", "c": "literature"}, {"n": "Samuel Beckett", "nr": "Сэмюэл Беккет", "b": 1906, "h": "playwright and novelist", "hr": "драматург и романист", "f": "He drove French Resistance hero André Rousseau to safety during World War II and was awarded the Croix de Guerre", "fr": "Во время Второй мировой войны он вывез на машине героя французского Сопротивления Андре Руссо в безопасное место и был награждён Военным крестом", "c": "literature"}, {"n": "Simone de Beauvoir", "nr": "Симона де Бовуар", "b": 1908, "h": "novelist and philosopher", "hr": "романист и философ", "f": "Her book The Second Sex, published in 1949, became one of the founding texts of modern feminism", "fr": "Её книга «Второй пол», опубликованная в 1949 году, стала одним из основополагающих текстов современного феминизма", "c": "literature"}, {"n": "Umberto Eco", "nr": "Умберто Эко", "b": 1932, "h": "novelist", "hr": "романист", "f": "He had a private library of over 30,000 books — he called unread books 'anti-library' and considered them more valuable than read ones", "fr": "У него была личная библиотека из более чем 30 000 книг — непрочитанные книги он называл «антибиблиотекой» и считал их ценнее прочитанных", "c": "literature"}, {"n": "J.K. Rowling", "nr": "Дж. К. Роулинг", "b": 1965, "h": "novelist", "hr": "романист", "f": "She wrote the first Harry Potter book as a single mother on welfare", "fr": "Первую книгу о Гарри Поттере она написала в статусе матери-одиночки, живя на пособие", "c": "literature"}, {"n": "Stephen King", "nr": "Стивен Кинг", "b": 1947, "h": "novelist", "hr": "романист", "f": "He wrote his first novel Carrie while working as a janitor", "fr": "Свой первый роман «Кэрри» он написал, работая уборщиком", "c": "literature"}, {"n": "Haruki Murakami", "nr": "Харуки Мураками", "b": 1949, "h": "novelist", "hr": "романист", "f": "He ran a jazz bar before becoming a novelist", "fr": "До того как стать писателем, он владел джаз-баром", "c": "literature"}, {"n": "Isabel Allende", "nr": "Исабель Альенде", "b": 1942, "h": "novelist", "hr": "романист", "f": "She began writing The House of the Spirits on January 8, 1981 — she has started every book on that date ever since as a ritual", "fr": "«Дом духов» она начала писать 8 января 1981 года — с тех пор она начинает каждую новую книгу именно в этот день как ритуал", "c": "literature"}, {"n": "Salman Rushdie", "nr": "Салман Рушди", "b": 1947, "h": "novelist", "hr": "романист", "f": "After the Ayatollah Khomeini issued a fatwa calling for his death over The Satanic Verses, he lived in hiding for nearly a decade", "fr": "После того как аятолла Хомейни издал фетву с призывом убить его за роман «Сатанинские стихи», он почти десять лет провёл в укрытии", "c": "literature"}, {"n": "Giovanni Boccaccio", "nr": "Джованни Боккаччо", "b": 1313, "h": "novelist and poet", "hr": "романист и поэт", "f": "His Decameron, written during the Black Death of 1348, contains 100 tales told by ten characters sheltering from the plague", "fr": "Его «Декамерон», написанный во время чумы 1348 года, содержит 100 историй, которые рассказывают десять персонажей, укрывшихся от эпидемии", "c": "literature"}, {"n": "Jonathan Swift", "nr": "Джонатан Свифт", "b": 1667, "h": "novelist", "hr": "романист и сатирик", "f": "His satirical essay A Modest Proposal — suggesting the Irish eat their babies — is considered one of the greatest works of political satire ever written", "fr": "Его сатирическое эссе «Скромное предложение» — о том, что ирландцам следует есть своих детей — считается одним из величайших образцов политической сатиры", "c": "literature"}, {"n": "Voltaire", "nr": "Вольтер", "b": 1694, "h": "novelist and philosopher", "hr": "романист и философ", "f": "He was imprisoned in the Bastille twice and exiled from France — he wrote Candide in just three days", "fr": "Он дважды сидел в Бастилии и был выслан из Франции — «Кандида» он написал всего за три дня", "c": "literature"}, {"n": "Stendhal", "nr": "Стендаль", "b": 1783, "h": "novelist", "hr": "романист", "f": "He coined the term 'Stendhal syndrome' — a psychosomatic condition of dizziness caused by exposure to great art — though the term came later", "fr": "Он дал имя «синдрому Стендаля» — психосоматическому состоянию головокружения от соприкосновения с великим искусством — хотя сам термин появился позже", "c": "literature"}, {"n": "Jack London", "nr": "Джек Лондон", "b": 1876, "h": "novelist", "hr": "романист", "f": "He was the first American author to earn one million dollars from writing", "fr": "Он стал первым американским писателем, заработавшим миллион долларов литературным трудом", "c": "literature"}, {"n": "Arthur Conan Doyle", "nr": "Артур Конан Дойл", "b": 1859, "h": "novelist", "hr": "романист", "f": "He tried to kill off Sherlock Holmes in 1893 — public outrage forced him to bring the character back", "fr": "В 1893 году он попытался убить Шерлока Холмса — общественное возмущение вынудило его воскресить персонажа", "c": "literature"}, {"n": "Agatha Christie", "nr": "Агата Кристи", "b": 1890, "h": "novelist", "hr": "романист", "f": "She is the best-selling fiction writer of all time", "fr": "Она является самым продаваемым автором художественной литературы всех времён", "c": "literature"}, {"n": "Socrates", "nr": "Сократ", "b": -470, "h": "philosopher", "hr": "философ", "f": "He never wrote anything — all we know of him comes from his students", "fr": "Он никогда ничего не писал — всё, что мы о нём знаем, дошло до нас от его учеников", "c": "philosophy"}, {"n": "Plato", "nr": "Платон", "b": -428, "h": "philosopher", "hr": "философ", "f": "His real name was Aristocles — Plato was a nickname meaning 'broad'", "fr": "Его настоящее имя — Аристокл; Платон — прозвище, означающее «широкоплечий»", "c": "philosophy"}, {"n": "Aristotle", "nr": "Аристотель", "b": -384, "h": "philosopher and scientist", "hr": "философ и учёный", "f": "He was the personal tutor of Alexander the Great", "fr": "Он был личным наставником Александра Македонского", "c": "philosophy"}, {"n": "Epicurus", "nr": "Эпикур", "b": -341, "h": "philosopher", "hr": "философ", "f": "Despite being associated with pleasure, he lived simply on bread, water and cheese — he taught that simple pleasures bring the greatest happiness", "fr": "Несмотря на ассоциацию с удовольствием, он жил скромно — питался хлебом, водой и сыром — и учил, что простые удовольствия приносят наибольшее счастье", "c": "philosophy"}, {"n": "Marcus Aurelius", "nr": "Марк Аврелий", "b": 121, "h": "philosopher and emperor", "hr": "философ и император", "f": "His Meditations was written as a private journal, never intended for publication", "fr": "Его «Размышления» писались как личный дневник и никогда не предназначались для публикации", "c": "philosophy"}, {"n": "Seneca", "nr": "Сенека", "b": -4, "h": "philosopher and writer", "hr": "философ и писатель", "f": "He preached poverty and simplicity while being one of the wealthiest men in Rome — a hypocrisy his critics never let him forget", "fr": "Он проповедовал бедность и простоту, будучи одним из богатейших людей Рима — лицемерие, которого ему не прощали критики", "c": "philosophy"}, {"n": "Thomas Aquinas", "nr": "Фома Аквинский", "b": 1225, "h": "philosopher and theologian", "hr": "философ и богослов", "f": "He was so large and quiet that his fellow students called him 'the dumb ox' — his teacher Albertus Magnus predicted the ox would one day fill the world with his bellowing", "fr": "Из-за крупного телосложения и молчаливости сокурсники прозвали его «немым быком» — его учитель Альберт Великий предсказал, что этот бык однажды потрясёт весь мир своим рёвом", "c": "philosophy"}, {"n": "Francis Bacon", "nr": "Фрэнсис Бэкон", "b": 1561, "h": "philosopher and scientist", "hr": "философ и учёный", "f": "He died after stuffing a chicken with snow to test whether cold could preserve meat — he caught pneumonia in the experiment", "fr": "Он умер от пневмонии, набив курицу снегом на морозе — проверяя, способен ли холод сохранять мясо", "c": "philosophy"}, {"n": "Immanuel Kant", "nr": "Иммануил Кант", "b": 1724, "h": "philosopher", "hr": "философ", "f": "He was so punctual that locals allegedly set their clocks by his daily walks", "fr": "Он был настолько пунктуален, что местные жители якобы сверяли часы по его ежедневным прогулкам", "c": "philosophy"}, {"n": "Friedrich Nietzsche", "nr": "Фридрих Ницше", "b": 1844, "h": "philosopher and writer", "hr": "философ и писатель", "f": "He collapsed on a street in Turin and never recovered his sanity", "fr": "Он упал на улице в Турине и больше так и не восстановил рассудок", "c": "philosophy"}, {"n": "John Locke", "nr": "Джон Локк", "b": 1632, "h": "philosopher", "hr": "философ", "f": "His ideas about natural rights and government by consent directly inspired the American Declaration of Independence", "fr": "Его идеи о естественных правах и власти по согласию народа непосредственно вдохновили американскую Декларацию независимости", "c": "philosophy"}, {"n": "David Hume", "nr": "Дэвид Юм", "b": 1711, "h": "philosopher", "hr": "философ", "f": "He was so cheerful and sociable that his friends nicknamed him 'Le Bon David' — unusual for a philosopher who argued we can know almost nothing with certainty", "fr": "Он был настолько жизнерадостен и общителен, что друзья называли его «Le Bon David» — необычно для философа, утверждавшего, что мы почти ничего не можем знать наверняка", "c": "philosophy"}, {"n": "Baruch Spinoza", "nr": "Барух Спиноза", "b": 1632, "h": "philosopher", "hr": "философ", "f": "He was excommunicated from the Jewish community in Amsterdam at age 23 — the reasons remain unknown but the ban was unusually severe", "fr": "В 23 года его отлучили от еврейской общины Амстердама — причины по сей день неизвестны, но приговор был необычайно суров", "c": "philosophy"}, {"n": "Arthur Schopenhauer", "nr": "Артур Шопенгауэр", "b": 1788, "h": "philosopher", "hr": "философ", "f": "He was so pessimistic about human nature that he kept pistols by his bed and gold coins sewn into his clothing in case he needed to flee", "fr": "Он был настолько пессимистичен насчёт человеческой природы, что держал у кровати пистолеты и зашивал золотые монеты в одежду на случай бегства", "c": "philosophy"}, {"n": "Georg Wilhelm Friedrich Hegel", "nr": "Георг Вильгельм Фридрих Гегель", "b": 1770, "h": "philosopher", "hr": "философ", "f": "His prose was so notoriously difficult that Bertrand Russell said he set it out with such obscurity that people thought it must be profound", "fr": "Его проза была настолько печально известна своей сложностью, что Бертран Рассел говорил: он выражал мысли с такой туманностью, что люди принимали это за глубину", "c": "philosophy"}, {"n": "Karl Marx", "nr": "Карл Маркс", "b": 1818, "h": "philosopher and economist", "hr": "философ и экономист", "f": "He spent most of his adult life in poverty in London", "fr": "Большую часть взрослой жизни он провёл в нищете в Лондоне", "c": "philosophy"}, {"n": "Friedrich Engels", "nr": "Фридрих Энгельс", "b": 1820, "h": "philosopher and economist", "hr": "философ и экономист", "f": "He financially supported Marx for decades, working in his family's Manchester cotton factory — without Engels, Marx could not have written Das Kapital", "fr": "Он десятилетиями финансово поддерживал Маркса, работая на фабрике своего отца в Манчестере — без Энгельса Маркс не смог бы написать «Капитал»", "c": "philosophy"}, {"n": "Bertrand Russell", "nr": "Бертран Рассел", "b": 1872, "h": "philosopher and mathematician", "hr": "философ и математик", "f": "He was imprisoned for six months in 1918 for writing a pacifist article opposing World War I — he used the time to write Introduction to Mathematical Philosophy", "fr": "В 1918 году его посадили в тюрьму на шесть месяцев за пацифистскую статью против Первой мировой войны — в заключении он написал «Введение в математическую философию»", "c": "philosophy"}, {"n": "Ludwig Wittgenstein", "nr": "Людвиг Витгенштейн", "b": 1889, "h": "philosopher", "hr": "философ", "f": "He attended the same school as Adolf Hitler as a child — they were the same age and briefly overlapped", "fr": "В детстве он учился в одной школе с Адольфом Гитлером — они были ровесниками и недолго пересекались", "c": "philosophy"}, {"n": "Martin Heidegger", "nr": "Мартин Хайдеггер", "b": 1889, "h": "philosopher", "hr": "философ", "f": "He joined the Nazi Party in 1933 and served as rector of Freiburg University — he never publicly apologized after the war", "fr": "В 1933 году он вступил в нацистскую партию и занял пост ректора Фрайбургского университета — после войны он так и не принёс публичных извинений", "c": "philosophy"}, {"n": "Michel Foucault", "nr": "Мишель Фуко", "b": 1926, "h": "philosopher and historian", "hr": "философ и историк", "f": "He described his own books as 'experience books' that changed him completely — he said he wrote them to stop being who he was", "fr": "Он называл свои книги «книгами-опытами», полностью менявшими его самого — он говорил, что пишет их, чтобы перестать быть тем, кем был", "c": "philosophy"}, {"n": "Noam Chomsky", "nr": "Ноам Хомский", "b": 1928, "h": "philosopher and linguist", "hr": "философ и лингвист", "f": "He is both the most cited living academic and one of the most prominent political dissidents — an unusual combination", "fr": "Он одновременно является наиболее цитируемым из ныне живущих учёных и одним из самых известных политических диссидентов — редкое сочетание", "c": "philosophy"}, {"n": "Confucius", "nr": "Конфуций", "b": -551, "h": "philosopher and teacher", "hr": "философ и учитель", "f": "He wandered China for 13 years trying to find a ruler willing to adopt his ideas", "fr": "Он 13 лет странствовал по Китаю в поисках правителя, готового принять его идеи", "c": "philosophy"}, {"n": "Laozi", "nr": "Лао-цзы", "b": -601, "h": "philosopher", "hr": "философ", "f": "According to legend he was born already old — with white hair — having spent 80 years in his mother's womb", "fr": "По легенде, он родился уже стариком — с седыми волосами — проведя 80 лет в утробе матери", "c": "philosophy"}, {"n": "John Stuart Mill", "nr": "Джон Стюарт Милль", "b": 1806, "h": "philosopher and economist", "hr": "философ и экономист", "f": "He could read ancient Greek at age 3 and by age 8 had read all of Herodotus — his father gave him an extraordinarily intensive education", "fr": "В три года он читал по-древнегречески, а к восьми годам прочитал всего Геродота — отец дал ему исключительно интенсивное образование", "c": "philosophy"}, {"n": "Jeremy Bentham", "nr": "Джереми Бентам", "b": 1748, "h": "philosopher", "hr": "философ", "f": "He requested that his body be preserved after death — his 'auto-icon' still sits in a cabinet at University College London", "fr": "После смерти он завещал сохранить своё тело — его «авто-икона» до сих пор сидит в шкафу в Университетском колледже Лондона", "c": "philosophy"}, {"n": "Thomas Hobbes", "nr": "Томас Гоббс", "b": 1588, "h": "philosopher", "hr": "философ", "f": "He was so afraid of the dark that he always slept with a light and refused to be left alone at night", "fr": "Он так боялся темноты, что всегда спал при свете и отказывался оставаться в одиночестве ночью", "c": "philosophy"}, {"n": "Jean-Jacques Rousseau", "nr": "Жан-Жак Руссо", "b": 1712, "h": "philosopher and writer", "hr": "философ и писатель", "f": "He abandoned all five of his children to an orphanage", "fr": "Он бросил всех пятерых своих детей в приют", "c": "philosophy"}, {"n": "Diogenes", "nr": "Диоген", "b": -412, "h": "philosopher", "hr": "философ", "f": "He allegedly lived in a large ceramic jar in Athens", "fr": "По легенде, он жил в большом глиняном сосуде в Афинах", "c": "philosophy"}, {"n": "Søren Kierkegaard", "nr": "Сёрен Кьеркегор", "b": 1813, "h": "philosopher and writer", "hr": "философ и писатель", "f": "He broke off his engagement to his beloved Regine Olsen — it tortured him for the rest of his life and inspired much of his writing", "fr": "Он разорвал помолвку с любимой Региной Ольсен — это терзало его всю оставшуюся жизнь и вдохновило многие его произведения", "c": "philosophy"}, {"n": "Hannah Arendt", "nr": "Ханна Арендт", "b": 1906, "h": "philosopher and political theorist", "hr": "философ и политический теоретик", "f": "She coined the phrase 'the banality of evil' while covering the trial of Nazi war criminal Adolf Eichmann in Jerusalem in 1961", "fr": "Она ввела в оборот понятие «банальность зла», освещая в 1961 году процесс над нацистским преступником Адольфом Эйхманом в Иерусалиме", "c": "philosophy"}, {"n": "Martin Luther", "nr": "Мартин Лютер", "b": 1483, "h": "religious reformer", "hr": "религиозный реформатор", "f": "He nailed his 95 Theses to a church door in 1517, sparking the Reformation", "fr": "В 1517 году он прибил свои 95 тезисов к двери церкви, положив начало Реформации", "c": "religion"}, {"n": "John Calvin", "nr": "Жан Кальвин", "b": 1509, "h": "religious reformer", "hr": "религиозный реформатор", "f": "He established a strict theocratic government in Geneva where dancing, gambling and even bright clothing were banned", "fr": "Он установил в Женеве строгое теократическое правление, где были запрещены танцы, азартные игры и даже яркая одежда", "c": "religion"}, {"n": "Francis of Assisi", "nr": "Франциск Ассизский", "b": 1181, "h": "saint and friar", "hr": "святой и монах", "f": "He is the patron saint of animals and ecology", "fr": "Он является небесным покровителем животных и экологии", "c": "religion"}, {"n": "Thomas More", "nr": "Томас Мор", "b": 1478, "h": "saint and statesman", "hr": "святой и государственный деятель", "f": "He was beheaded for refusing to acknowledge Henry VIII as the head of the Church of England — canonized as a saint 400 years later", "fr": "Он был обезглавлен за отказ признать Генриха VIII главой Церкви Англии — спустя 400 лет его канонизировали", "c": "religion"}, {"n": "Joan of Arc", "nr": "Жанна д'Арк", "b": 1412, "h": "saint and military leader", "hr": "святая и военачальник", "f": "She was burned at the stake at age 19 and canonized as a saint 500 years later", "fr": "Она была сожжена на костре в 19 лет и канонизирована как святая спустя 500 лет", "c": "politics"}, {"n": "Pope John Paul II", "nr": "Папа Иоанн Павел II", "b": 1920, "h": "pope", "hr": "папа римский", "f": "He was the first non-Italian pope in 455 years", "fr": "Он стал первым не итальянским папой за 455 лет", "c": "religion"}, {"n": "Pope Francis", "nr": "Папа Франциск", "b": 1936, "h": "pope", "hr": "папа римский", "f": "He is the first pope from the Americas, the first Jesuit pope, and the first to take the name Francis", "fr": "Он первый папа из Америки, первый папа-иезуит и первый, принявший имя Франциск", "c": "religion"}, {"n": "Dalai Lama (14th)", "nr": "Далай-лама XIV", "b": 1935, "h": "Buddhist spiritual leader", "hr": "духовный лидер буддистов", "f": "He was recognized as the reincarnation of the previous Dalai Lama at age 2", "fr": "В возрасте 2 лет он был признан реинкарнацией предыдущего Далай-ламы", "c": "religion"}, {"n": "Swami Vivekananda", "nr": "Свами Вивекананда", "b": 1863, "h": "Hindu philosopher and monk", "hr": "индуистский философ и монах", "f": "His 1893 speech at the Parliament of World Religions in Chicago beginning 'Sisters and brothers of America' received a two-minute standing ovation", "fr": "Его речь на Парламенте мировых религий в Чикаго в 1893 году, начавшаяся словами «Сёстры и братья Америки», была встречена двухминутными аплодисментами стоя", "c": "religion"}, {"n": "Guru Nanak", "nr": "Гуру Нанак", "b": 1469, "h": "founder of Sikhism", "hr": "основатель сикхизма", "f": "He disappeared for three days in a river and returned saying 'There is no Hindu, there is no Muslim' — the founding moment of Sikhism", "fr": "Он исчез в реке на три дня и вернулся со словами «Нет ни индуса, ни мусульманина» — это стало основополагающим моментом сикхизма", "c": "religion"}, {"n": "Augustine of Hippo", "nr": "Августин Блаженный", "b": 354, "h": "theologian and philosopher", "hr": "богослов и философ", "f": "He is one of the most influential Christian theologians in history", "fr": "Он один из наиболее влиятельных христианских богословов в истории", "c": "religion"}, {"n": "Mother Teresa", "nr": "Мать Тереза", "b": 1910, "h": "saint and humanitarian", "hr": "святая и гуманист", "f": "She founded the Missionaries of Charity which operates in over 130 countries", "fr": "Она основала Орден миссионерок милосердия, действующий более чем в 130 странах", "c": "religion"}, {"n": "Desmond Tutu", "nr": "Десмонд Туту", "b": 1931, "h": "activist and statesman", "hr": "архиепископ и активист", "f": "He coined the phrase 'Rainbow Nation' to describe post-apartheid South Africa", "fr": "Он придумал термин «Радужная нация» для описания постапартеидной Южной Африки", "c": "religion"}, {"n": "Pope Benedict XVI", "nr": "Папа Бенедикт XVI", "b": 1927, "h": "pope", "hr": "папа римский", "f": "He was the first pope to resign in nearly 600 years — he stepped down in 2013 citing declining health", "fr": "Он стал первым папой за почти 600 лет, добровольно отрёкшимся от престола — в 2013 году он ушёл в отставку, сославшись на ухудшение здоровья", "c": "religion"}, {"n": "Ignatius of Loyola", "nr": "Игнатий Лойола", "b": 1491, "h": "saint and founder of the Jesuits", "hr": "святой и основатель иезуитов", "f": "He founded the Jesuits after being wounded in battle — he read religious books during his recovery because there was nothing else available", "fr": "Он основал иезуитов после того, как был ранен в бою — в период выздоровления он читал религиозные книги, потому что других не было", "c": "religion"}, {"n": "John Wesley", "nr": "Джон Уэсли", "b": 1703, "h": "theologian and founder of Methodism", "hr": "богослов и основатель методизма", "f": "He rode over 250,000 miles on horseback to preach throughout Britain — the equivalent of circling the Earth ten times", "fr": "Он проехал верхом более 250 000 миль, проповедуя по всей Британии — это десять кругов вокруг Земли", "c": "religion"}, {"n": "William Booth", "nr": "Уильям Бут", "b": 1829, "h": "founder of the Salvation Army", "hr": "основатель Армии спасения", "f": "He founded the Salvation Army in London's East End in 1865 to help the poor — it now operates in over 130 countries", "fr": "Он основал Армию спасения в лондонском Ист-Энде в 1865 году — сейчас она действует в более чем 130 странах", "c": "religion"}, {"n": "Yuri Gagarin", "nr": "Юрий Гагарин", "b": 1934, "h": "astronaut", "hr": "космонавт", "f": "His flight lasted just 108 minutes but changed history", "fr": "Его полёт длился всего 108 минут, но вошёл в историю", "c": "exploration"}, {"n": "Neil Armstrong", "nr": "Нил Армстронг", "b": 1930, "h": "astronaut", "hr": "космонавт", "f": "He carried a piece of the Wright Brothers' original aircraft to the Moon", "fr": "Он взял на Луну кусочек оригинального самолёта братьев Райт", "c": "exploration"}, {"n": "Steve Jobs", "nr": "Стив Джобс", "b": 1955, "h": "inventor", "hr": "предприниматель и изобретатель", "f": "He co-founded Apple in a garage at age 21", "fr": "Он стал сооснователем Apple в гараже в возрасте 21 года", "c": "business"}, {"n": "Cleopatra", "nr": "Клеопатра", "b": -69, "h": "monarch", "hr": "монарх", "f": "She was the first ruler of her dynasty to learn the Egyptian language", "fr": "Она была первой правительницей своей династии, выучившей египетский язык", "c": "politics"}, {"n": "Queen Victoria", "nr": "Королева Виктория", "b": 1819, "h": "monarch", "hr": "монарх", "f": "She reigned for 63 years — the longest of any British monarch at the time", "fr": "Она правила 63 года — дольше, чем любой британский монарх до неё", "c": "politics"}, {"n": "Queen Elizabeth II", "nr": "Королева Елизавета II", "b": 1926, "h": "monarch", "hr": "монарх", "f": "She was the longest-reigning British monarch in history", "fr": "Она является самым долгоправящим британским монархом в истории", "c": "politics"}, {"n": "Catherine the Great", "nr": "Екатерина Великая", "b": 1729, "h": "monarch", "hr": "монарх", "f": "She expanded Russia's territory more than any other ruler in history", "fr": "Она расширила территорию России больше, чем любой другой правитель в истории", "c": "politics"}, {"n": "Peter the Great", "nr": "Пётр Великий", "b": 1672, "h": "monarch", "hr": "монарх", "f": "He personally cut the beards of Russian noblemen to modernize the country", "fr": "Он лично отрезал бороды русским боярам, чтобы модернизировать страну", "c": "politics"}, {"n": "Charlemagne", "nr": "Карл Великий", "b": 742, "h": "monarch and military leader", "hr": "монарх и военачальник", "f": "He could not write but learned to read Latin and Greek", "fr": "Он не умел писать, но научился читать по-латыни и по-гречески", "c": "politics"}, {"n": "Genghis Khan", "nr": "Чингисхан", "b": 1162, "h": "monarch and military leader", "hr": "монарх и военачальник", "f": "At its peak his empire was the largest contiguous land empire in history", "fr": "В период расцвета его империя была крупнейшей сухопутной империей в истории", "c": "politics"}, {"n": "Alexander the Great", "nr": "Александр Македонский", "b": -356, "h": "monarch and military leader", "hr": "военачальник и монарх", "f": "He never lost a single battle in his military career", "fr": "За всю военную карьеру он не проиграл ни одного сражения", "c": "politics"}, {"n": "Julius Caesar", "nr": "Юлий Цезарь", "b": -100, "h": "general and statesman", "hr": "полководец и государственный деятель", "f": "He introduced the Julian calendar which is the basis of our modern calendar", "fr": "Он ввёл юлианский календарь, ставший основой нашего современного календаря", "c": "politics"}, {"n": "Napoleon Bonaparte", "nr": "Наполеон Бонапарт", "b": 1769, "h": "monarch and military leader", "hr": "военачальник и монарх", "f": "He was actually of average height for his time — about 5 foot 7", "fr": "По меркам своего времени он был среднего роста — около 170 сантиметров", "c": "politics"}, {"n": "Henry VIII", "nr": "Генрих VIII", "b": 1491, "h": "monarch", "hr": "монарх", "f": "He was a talented musician and composer in his youth", "fr": "В молодости он был талантливым музыкантом и композитором", "c": "politics"}, {"n": "Louis XIV", "nr": "Людовик XIV", "b": 1638, "h": "monarch", "hr": "монарх", "f": "He built the Palace of Versailles and reigned for 72 years — the longest of any major monarch", "fr": "Он построил Версальский дворец и правил 72 года — дольше любого другого крупного монарха", "c": "politics"}, {"n": "Attila the Hun", "nr": "Аттила", "b": 406, "h": "ruler and military leader", "hr": "военачальник", "f": "He died on his wedding night — possibly from a nosebleed", "fr": "По легенде, он умер в брачную ночь — предположительно от носового кровотечения", "c": "politics"}, {"n": "Saladin", "nr": "Саладин", "b": 1137, "h": "monarch and military leader", "hr": "военачальник и монарх", "f": "Despite being a fierce military opponent of the Crusaders, he was so admired for his chivalry and generosity that he became a legendary figure in medieval European literature", "fr": "Он был известен своим великодушием к побеждённым врагам даже во время Крестовых походов", "c": "politics"}, {"n": "Marie Antoinette", "nr": "Мария-Антуанетта", "b": 1755, "h": "monarch", "hr": "монарх", "f": "She never actually said 'Let them eat cake'", "fr": "Она никогда не произносила фразу «Пусть едят пирожные»", "c": "politics"}, {"n": "Anne Frank", "nr": "Анна Франк", "b": 1929, "h": "diarist", "hr": "дневниковый автор", "f": "Her diary has been translated into over 70 languages", "fr": "Её дневник переведён более чем на 70 языков", "c": "literature"}, {"n": "Henry Ford", "nr": "Генри Форд", "b": 1863, "h": "inventor", "hr": "предприниматель и изобретатель", "f": "He introduced the moving assembly line, revolutionizing manufacturing", "fr": "Он внедрил движущийся конвейер, совершив революцию в производстве", "c": "business"}, {"n": "John D. Rockefeller", "nr": "Джон Д. Рокфеллер", "b": 1839, "h": "entrepreneur and philanthropist", "hr": "предприниматель и филантроп", "f": "He became the world's first billionaire and donated over $500 million to charity — including founding the University of Chicago", "fr": "Он стал первым долларовым миллиардером в истории", "c": "business"}, {"n": "Andrew Carnegie", "nr": "Эндрю Карнеги", "b": 1835, "h": "entrepreneur and philanthropist", "hr": "предприниматель и филантроп", "f": "He started work in a factory at age 12 and became the richest man in the world — then gave away virtually his entire fortune, building over 2,500 libraries worldwide", "fr": "В зрелые годы он пожертвовал более 90% своего состояния на благотворительность", "c": "business"}, {"n": "Walt Disney", "nr": "Уолт Дисней", "b": 1901, "h": "animator and entrepreneur", "hr": "аниматор и предприниматель", "f": "He was afraid of mice despite his most famous character being one", "fr": "Он боялся мышей, хотя его самый знаменитый персонаж — мышь", "c": "performing_arts"}, {"n": "Abraham Lincoln", "nr": "Авраам Линкольн", "b": 1809, "h": "president", "hr": "президент", "f": "He is the only US president to have held a patent — for a device to lift boats", "fr": "Он единственный президент США, имевший патент — на устройство для подъёма судов на мелководье", "c": "politics"}, {"n": "Nelson Mandela", "nr": "Нельсон Мандела", "b": 1918, "h": "president and activist", "hr": "президент и активист", "f": "He spent 27 years in prison before becoming president of South Africa", "fr": "Он провёл 27 лет в заключении, прежде чем стать президентом ЮАР", "c": "politics"}, {"n": "Indira Gandhi", "nr": "Индира Ганди", "b": 1917, "h": "prime minister", "hr": "премьер-министр", "f": "She was the first and only female Prime Minister of India", "fr": "Она была единственной женщиной — премьер-министром Индии", "c": "politics"}, {"n": "Mahatma Gandhi", "nr": "Махатма Ганди", "b": 1869, "h": "activist and statesman", "hr": "активист и государственный деятель", "f": "He was nominated for the Nobel Peace Prize five times but never won", "fr": "Он был номинирован на Нобелевскую премию мира пять раз, но так её и не получил", "c": "politics"}, {"n": "Martin Luther King", "nr": "Мартин Лютер Кинг", "b": 1929, "h": "activist and statesman", "hr": "активист", "f": "He delivered his 'I Have a Dream' speech to over 250,000 people", "fr": "Свою речь «У меня есть мечта» он произнёс перед аудиторией более 250 000 человек", "c": "politics"}, {"n": "Winston Churchill", "nr": "Уинстон Черчилль", "b": 1874, "h": "prime minister", "hr": "премьер-министр", "f": "He won the Nobel Prize in Literature in 1953", "fr": "В 1953 году он получил Нобелевскую премию по литературе", "c": "politics"}, {"n": "Franklin D. Roosevelt", "nr": "Франклин Д. Рузвельт", "b": 1882, "h": "president", "hr": "президент", "f": "He was the only US president elected four times", "fr": "Он был единственным президентом США, избранным четыре раза", "c": "politics"}, {"n": "John F. Kennedy", "nr": "Джон Ф. Кеннеди", "b": 1917, "h": "president", "hr": "президент", "f": "He was the youngest person ever elected US president at age 43", "fr": "Он стал самым молодым избранным президентом США — в возрасте 43 лет", "c": "politics"}, {"n": "George Washington", "nr": "Джордж Вашингтон", "b": 1732, "h": "president", "hr": "президент", "f": "He was the only US president unanimously elected by the Electoral College", "fr": "Он единственный президент США, единогласно избранный коллегией выборщиков", "c": "politics"}, {"n": "Thomas Jefferson", "nr": "Томас Джефферсон", "b": 1743, "h": "president", "hr": "президент", "f": "He was a passionate inventor who designed an improved plow, a wheel cipher for coding messages, and his own version of the Bible", "fr": "Он был страстным изобретателем — разработал улучшенный плуг, шифровальное колесо и собственную версию Библии", "c": "politics"}, {"n": "Eleanor Roosevelt", "nr": "Элеонора Рузвельт", "b": 1884, "h": "activist and diplomat", "hr": "активист и дипломат", "f": "She transformed the role of First Lady into an active political position", "fr": "Она превратила роль первой леди в активную политическую позицию", "c": "politics"}, {"n": "Mikhail Gorbachev", "nr": "Михаил Горбачёв", "b": 1931, "h": "president", "hr": "президент", "f": "His policies of glasnost and perestroika led to the fall of the Soviet Union", "fr": "Его политика гласности и перестройки привела к распаду Советского Союза", "c": "politics"}, {"n": "Woodrow Wilson", "nr": "Вудро Вильсон", "b": 1856, "h": "president", "hr": "президент", "f": "He was the first US president to hold a PhD — in political science from Johns Hopkins University", "fr": "Он был первым президентом США с учёной степенью — доктором политологии Университета Джона Хопкинса", "c": "politics"}, {"n": "Charles de Gaulle", "nr": "Шарль де Голль", "b": 1890, "h": "president", "hr": "президент", "f": "He stood 6 feet 5 inches tall — his enormous height made him instantly recognisable and a difficult target to miss during assassination attempts", "fr": "Его рост составлял почти 2 метра — это делало его моментально узнаваемым и ьер-министром Индии и правил 17 лет — его письма дочери Индире стали знаменитыми книгами по всемирной истории", "c": "politics"}, {"n": "Ho Chi Minh", "nr": "Хо Ши Мин", "b": 1890, "h": "president", "hr": "президент", "f": "He lived under at least nine different aliases throughout his life — his most famous name Ho Chi Minh means 'He Who Enlightens'", "fr": "На протяжении жизни он жил не менее чем под девятью псевдонимами — его самое известное имя означает «Тот, кто просвещает»", "c": "politics"}, {"n": "Gamal Abdel Nasser", "nr": "Гамаль Абдель Насер", "b": 1918, "h": "president", "hr": "президент", "f": "His nationalisation of the Suez Canal in 1956 triggered a military crisis involving Britain, France and Israel", "fr": "Его национализация Суэцкого канала в 1956 году спровоцировала военный кризис с участием Великобритании, Франции и Израиля", "c": "politics"}, {"n": "Che Guevara", "nr": "Эрнесто Че Гевара", "b": 1928, "h": "revolutionary and guerrilla leader", "hr": "революционер", "f": "He was a qualified doctor who gave up medicine to become a revolutionary — his motorcycle journey across South America as a student changed his worldview completely", "fr": "Он был дипломированным врачом, отказавшимся от медицины ради революции — его путешествие по Южной Америке на мотоцикле полностью изменило его мировоззрение", "c": "politics"}, {"n": "Fidel Castro", "nr": "Фидель Кастро", "b": 1926, "h": "president", "hr": "президент", "f": "He survived an estimated 638 assassination attempts according to Cuban intelligence — more than any other world leader in history", "fr": "По данным кубинской разведки, он пережил около 638 покушений — больше, чем любой другой мировой лидер в истории", "c": "politics"}, {"n": "Pericles", "nr": "Перикл", "b": -495, "h": "statesman and orator", "hr": "государственный деятель и оратор", "f": "He oversaw the construction of the Parthenon in Athens", "fr": "Под его руководством был построен Парфенон в Афинах", "c": "politics"}, {"n": "Cicero", "nr": "Цицерон", "b": -106, "h": "statesman, orator and writer", "hr": "государственный деятель, оратор и писатель", "f": "His writings are still used to teach Latin today", "fr": "Его сочинения до сих пор используются для обучения латыни", "c": "politics"}, {"n": "Kemal Atatürk", "nr": "Кемаль Ататюрк", "b": 1881, "h": "president", "hr": "президент", "f": "He transformed Turkey into a secular republic and introduced the Latin alphabet", "fr": "Он преобразовал Турцию в светскую республику и ввёл латинский алфавит", "c": "politics"}, {"n": "José Martí", "nr": "Хосе Марти", "b": 1853, "h": "poet", "hr": "активист и поэт", "f": "He wrote his most famous poem Versos Sencillos which later became the lyrics to the song Guantanamera", "fr": "Он написал самое известное своё стихотворение «Стихи простые», которое впоследствии стало текстом песни «Гуантанамера»", "c": "politics"}, {"n": "Theodore Roosevelt", "nr": "Теодор Рузвельт", "b": 1858, "h": "president", "hr": "президент", "f": "He was the first US president to ride in an automobile and fly in an airplane", "fr": "Он стал первым президентом США, прокатившимся на автомобиле и полетевшим на самолёте", "c": "politics"}, {"n": "Queen Elizabeth I", "nr": "Королева Елизавета I", "b": 1533, "h": "monarch", "hr": "монарх", "f": "She reigned for 44 years and never married, earning the title 'The Virgin Queen'", "fr": "Она правила 44 года и так и не вышла замуж, получив прозвище «Королева-дева»", "c": "politics"}, {"n": "Frederick the Great", "nr": "Фридрих Великий", "b": 1712, "h": "monarch", "hr": "монарх", "f": "He played the flute and composed over 100 sonatas", "fr": "Он играл на флейте и сочинил более 100 сонат", "c": "politics"}, {"n": "Deng Xiaoping", "nr": "Дэн Сяопин", "b": 1904, "h": "political leader", "hr": "политический лидер", "f": "He was purged three times by the Communist Party before finally becoming China's paramount leader and transforming its economy", "fr": "Он трижды был исключён из Коммунистической партии, прежде чем стал верховным руководителем Китая и преобразовал его экономику", "c": "politics"}, {"n": "Christopher Columbus", "nr": "Христофор Колумб", "b": 1451, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He never realized he had reached a continent previously unknown to Europeans", "fr": "Он так и не осознал, что достиг континента, ранее неизвестного европейцам", "c": "exploration"}, {"n": "Ferdinand Magellan", "nr": "Фернан Магеллан", "b": 1480, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "His expedition was the first to circumnavigate the Earth, though he died before completing it", "fr": "Его экспедиция стала первой, обогнувшей земной шар, хотя сам он погиб до её завершения", "c": "exploration"}, {"n": "Marco Polo", "nr": "Марко Поло", "b": 1254, "h": "explorer and traveller", "hr": "путешественник и исследователь", "f": "He spent 17 years in China serving Kublai Khan", "fr": "Он провёл 17 лет в Китае на службе у Хубилай-хана", "c": "exploration"}, {"n": "Vasco da Gama", "nr": "Васко да Гама", "b": 1460, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He was the first European to reach India by sea", "fr": "Он стал первым европейцем, добравшимся до Индии морским путём", "c": "exploration"}, {"n": "Roald Amundsen", "nr": "Руаль Амундсен", "b": 1872, "h": "polar explorer", "hr": "полярный исследователь", "f": "He was the first person to reach the South Pole in 1911", "fr": "В 1911 году он первым достиг Южного полюса", "c": "exploration"}, {"n": "Ernest Shackleton", "nr": "Эрнест Шеклтон", "b": 1874, "h": "polar explorer", "hr": "полярный исследователь", "f": "When his ship Endurance was crushed by ice, he led all 28 crew members to safety — not a single life was lost in one of history's greatest survival stories", "fr": "Когда его корабль «Эндьюранс» был раздавлен льдами, он вывел всех 28 членов экипажа в безопасное место — никто не погиб в одной из величайших историй выживания", "c": "exploration"}, {"n": "James Cook", "nr": "Джеймс Кук", "b": 1728, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He mapped more of the Earth's surface than any explorer before him", "fr": "Он нанёс на карту больше земной поверхности, чем любой исследователь до него", "c": "exploration"}, {"n": "Francis Drake", "nr": "Фрэнсис Дрейк", "b": 1540, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He was the second person to circumnavigate the globe and the first to complete the journey as captain throughout the entire voyage", "fr": "Он стал вторым человеком, обогнувшим земной шар, и первым, кто прошёл весь маршрут в качестве капитана", "c": "exploration"}, {"n": "David Livingstone", "nr": "Дэвид Ливингстон", "b": 1813, "h": "explorer and missionary", "hr": "исследователь и миссионер", "f": "He was the first European to see Victoria Falls", "fr": "Он стал первым европейцем, увидевшим водопад Виктория", "c": "exploration"}, {"n": "Amerigo Vespucci", "nr": "Америго Веспуччи", "b": 1454, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "The Americas are named after him", "fr": "Американский континент назван в его честь", "c": "exploration"}, {"n": "Hernán Cortés", "nr": "Эрнан Кортес", "b": 1485, "h": "conquistador and explorer", "hr": "конкистадор и исследователь", "f": "He sank his own fleet of ships after landing in Mexico so his men could not retreat — forcing them to conquer or die", "fr": "После высадки в Мексике он намеренно потопил собственные корабли, чтобы солдаты не могли отступить — только победа или смерть", "c": "exploration"}, {"n": "Ibn Battuta", "nr": "Ибн Баттута", "b": 1304, "h": "explorer and traveller", "hr": "путешественник и исследователь", "f": "He travelled over 75,000 miles — more than any explorer before the modern age", "fr": "Он преодолел более 120 000 километров — больше, чем любой другой путешественник до наступления нового времени", "c": "exploration"}, {"n": "Zheng He", "nr": "Чжэн Хэ", "b": 1371, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He commanded a fleet of over 300 ships — the largest naval expedition in history", "fr": "Он командовал флотом из более чем 300 кораблей — крупнейшей военно-морской экспедицией в истории", "c": "exploration"}, {"n": "Robert Falcon Scott", "nr": "Роберт Фалькон Скотт", "b": 1868, "h": "polar explorer", "hr": "полярный исследователь", "f": "He reached the South Pole only to find Amundsen had beaten him by 34 days", "fr": "Он достиг Южного полюса, лишь чтобы обнаружить, что Амундсен опередил его на 34 дня", "c": "exploration"}, {"n": "Fridtjof Nansen", "nr": "Фритьоф Нансен", "b": 1861, "h": "polar explorer", "hr": "полярный исследователь", "f": "He later won the Nobel Peace Prize for his humanitarian work", "fr": "Впоследствии он получил Нобелевскую премию мира за гуманитарную деятельность", "c": "exploration"}, {"n": "Vitus Bering", "nr": "Витус Беринг", "b": 1681, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "He discovered Alaska while sailing for Russia — the Bering Strait between Russia and Alaska is named after him", "fr": "Он открыл Аляску, плавая на службе у России — Берингов пролив между Россией и Аляской назван в его честь", "c": "exploration"}, {"n": "Henry Hudson", "nr": "Генри Гудзон", "b": 1565, "h": "navigator and explorer", "hr": "мореплаватель и исследователь", "f": "His crew mutinied and set him adrift in a small boat in the Canadian bay that now bears his name — he was never seen again", "fr": "Его команда подняла мятеж и оставила его дрейфовать в маленькой лодке в канадском заливе, носящем теперь его имя — больше его никто не видел", "c": "exploration"}, {"n": "Pelé", "nr": "Пеле", "b": 1940, "h": "football player", "hr": "футболист", "f": "He is the only player to have won the FIFA World Cup three times", "fr": "Он единственный футболист, трижды выигравший чемпионат мира", "c": "sports"}, {"n": "Muhammad Ali", "nr": "Мухаммед Али", "b": 1942, "h": "boxer", "hr": "боксёр", "f": "He refused to be drafted into the Vietnam War, saying 'I ain't got no quarrel with them Viet Cong'", "fr": "Он отказался от призыва во Вьетнам, заявив: «У меня нет претензий к вьетконговцам»", "c": "sports"}, {"n": "Michael Jordan", "nr": "Майкл Джордан", "b": 1963, "h": "basketball player", "hr": "баскетболист", "f": "He was cut from his high school basketball team", "fr": "В школе его не взяли в баскетбольную команду", "c": "sports"}, {"n": "Roger Federer", "nr": "Роджер Федерер", "b": 1981, "h": "tennis player", "hr": "теннисист", "f": "He won 20 Grand Slam titles — a record at the time of his retirement", "fr": "Он выиграл 20 титулов Большого шлема — рекорд на момент его завершения карьеры", "c": "sports"}, {"n": "Usain Bolt", "nr": "Усэйн Болт", "b": 1986, "h": "sprinter", "hr": "спринтер", "f": "He set the 100m world record of 9.58 seconds in 2009 — still unbroken", "fr": "В 2009 году он установил мировой рекорд на 100 м — 9,58 секунды — который до сих пор не побит", "c": "sports"}, {"n": "David Beckham", "nr": "Дэвид Бекхэм", "b": 1975, "h": "football player", "hr": "футболист", "f": "He is the only English player to have scored in three different FIFA World Cups — all against South American teams", "fr": "Он единственный английский футболист, забивавший гол на трёх чемпионатах мира — всегда против южноамериканских сборных", "c": "sports"}, {"n": "Ayrton Senna", "nr": "Айртон Сенна", "b": 1960, "h": "Formula 1 driver", "hr": "гонщик Формулы-1", "f": "He won three Formula 1 World Championships in just six seasons", "fr": "Он выиграл три чемпионата мира «Формулы-1» всего за шесть сезонов", "c": "sports"}, {"n": "Babe Ruth", "nr": "Бейб Рут", "b": 1895, "h": "baseball player", "hr": "бейсболист", "f": "He hit 714 home runs — a record that stood for 39 years", "fr": "Он выбил 714 хоум-ранов — рекорд продержался 39 лет", "c": "sports"}, {"n": "Jesse Owens", "nr": "Джесси Оуэнс nr": "Альфред Хичкок", "b": 1899, "h": "film director", "hr": "кинорежиссёр", "f": "He never won an Academy Award for Best Director despite five nominations", "fr": "Несмотря на пять номинаций, он так и не получил премию «Оскар» за режиссуру", "c": "performing_arts"}, {"n": "Stanley Kubrick", "nr": "Стэнли Кубрик", "b": 1928, "h": "film director", "hr": "кинорежиссёр", "f": "He was so detail-obsessed he once demanded 127 takes of a single shot", "fr": "Одержимый деталями, он однажды потребовал 127 дублей для одной-единственной сцены", "c": "performing_arts"}, {"n": "Orson Welles", "nr": "Орсон Уэллс", "b": 1915, "h": "actor and film director", "hr": "актёр и кинорежиссёр", "f": "He directed Citizen Kane at age 25 — widely considered the greatest film ever made", "fr": "Он снял «Гражданина Кейна» в 25 лет — фильм, который широко считается величайшим в истории кино", "c": "performing_arts"}, {"n": "Akira Kurosawa", "nr": "Акира Куросава", "b": 1910, "h": "film director", "hr": "кинорежиссёр", "f": "His film Seven Samurai inspired The Magnificent Seven and Star Wars", "fr": "Его фильм «Семь самураев» вдохновил «Великолепную семёрку» и «Звёздные войны»", "c": "performing_arts"}, {"n": "Federico Fellini", "nr": "Федерико Феллини", "b": 1920, "h": "film director", "hr": "кинорежиссёр", "f": "He never learned to drive and was famously chauffeured everywhere", "fr": "Он так и не научился водить машину и повсюду ездил с личным шофёром", "c": "performing_arts"}, {"n": "Steven Spielberg", "nr": "Стивен Спилберг", "b": 1946, "h": "film director", "hr": "кинорежиссёр", "f": "He was rejected by USC film school twice before becoming Hollywood's most successful director", "fr": "Дважды получив отказ из USC, он всё равно стал самым кассовым режиссёром Голливуда", "c": "performing_arts"}, {"n": "Marlon Brando", "nr": "Марлон Брандо", "b": 1924, "h": "actor", "hr": "актёр", "f": "He famously improvised many of his lines in The Godfather", "fr": "Многие свои реплики в «Крёстном отце» о // --- DIFFICULTY SYSTEM ---
function getEra(year) {
  if (year < 1500) return 0;
  if (year < 1700) return 1;
  if (year < 1800) return 2;
  if (year < 1850) return 3;
  if (year < 1900) return 4;
  if (year < 1950) return 5;
  return 6;
}

function getPairScore(a, b) {
  const diff = Math.abs(a.b - b.b);
  if (diff === 0) return null; // exclude identical years
  const eraDiff = Math.abs(getEra(a.b) - getEra(b.b));
  const sameCategory = a.c === b.c;
  let score = 100 / (diff + 1);
  if (eraDiff === 0) score += 40;
  else if (eraDiff === 1) score += 20;
  if (sameCategory) score += 25;
  return score;
}

function getTargetScore(streak) {
  const level = Math.floor(streak / 10);
  if (level === 0) return 20;
  if (level === 1) return 40;
  if (level === 2) return 60;
  if (level === 3) return 80;
  return 100;
}

function getDifficulty(streak) {
  return Math.floor(streak / 10);
}

// --- STATE ---
let usedPairs = new Set();
let recentPersons = []; // last 15 persons seen
const RECENT_LIMIT = 40;
const SEEN_LIMIT = 150;

// Load seen persons from localStorage
let seenPersons = [];
try {
  const saved = localStorage.getItem('whosolder_seen');
  if (saved) seenPersons = JSON.parse(saved);
} catch(e) { seenPersons = []; }

function saveSeenPersons() {
  try { localStorage.setItem('whosolder_seen', JSON.stringify(seenPersons)); } catch(e) {}
}

function isRecentOrSeen(name) {
  return recentPersons.includes(name) || seenPersons.includes(name);
}

function addRecent(a, b) {
  recentPersons.push(a.n, b.n);
  if (recentPersons.length > RECENT_LIMIT) {
    recentPersons = recentPersons.slice(recentPersons.length - RECENT_LIMIT);
  }
  // also add to seenPersons
  seenPersons.push(a.n, b.n);
  if (seenPersons.length > SEEN_LIMIT) {
    seenPersons = seenPersons.slice(seenPersons.length - SEEN_LIMIT);
  }
  saveSeenPersons();
}

function pairKey(a, b) {
  const i = DB.indexOf(a), j = DB.indexOf(b);
  return i < j ? `${i}-${j}` : `${j}-${i}`;
}

let deck = [];
let deckPos = 0;

function buildDeck() {
  deck = [...DB].sort(() => Math.random() - 0.5);
  deckPos = 0;
}

function findPartner(person, targetScore) {
  const len = deck.length;
  let bestCandidate = null;
  let bestDiff = Infinity;

  // First pass: respect recentPersons + seenPersons
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (isRecentOrSeen(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Fallback: ignore seenPersons, respect recentPersons
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (recentPersons.includes(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Final fallback: any valid pair
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  return bestCandidate;
}

function getRandomPair() {
  if (deck.length === 0) buildDeck();
  const targetScore = getTargetScore(streak);
  const len = deck.length;

  for (let offset = 0; offset < len; offset++) {
    const idx = (deckPos + offset) % len;
    const person = deck[idx];
    if (isRecentOrSeen(person.n)) continue;
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = (idx + 1) % len;
      if (deckPos === 0) buildDeck();
      return [person, partner];
    }
  }
  // Full fallback: rebuild and try once more
  buildDeck();
  for (let i = 0; i < deck.length; i++) {
    const person = deck[i];
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = i + 1;
      return [person, partner];
    }
  }
  return [DB[0], DB[1]];
}

let lastCorrectPositions = []; // 'top' or 'bottom', last 3

function balancedOrder(a, b) {
  // Count recent correct positions
  const recentTop = lastCorrectPositions.filter(p => p === 'top').length;
  const recentBot = lastCorrectPositions.filter(p => p === 'bottom').length;

  // Older person (lower birth year) is the correct answer
  const olderIsA = a.b <= b.b;

  // If same side 3 times in a row, force the other side
  if (lastCorrectPositions.length >= 3) {
    const last3 = lastCorrectPositions.slice(-3);
    if (last3.every(p => p === 'top')) {
      // Force correct to bottom
      return olderIsA ? [b, a] : [a, b];
    }
    if (last3.every(p => p === 'bottom')) {
      // Force correct to top
      return olderIsA ? [a, b] : [b, a];
    }
  }

  // Otherwise random
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

function recordCorrectPosition(pair) {
  const [top, bottom] = pair;
  const correctIsTop = top.b <= bottom.b;
  lastCorrectPositions.push(correctIsTop ? 'top' : 'bottom');
  if (lastCorrectPositions.length > 6) lastCorrectPositions.shift();
}

function nextPair() {
  const [a, b] = getRandomPair();
  const ordered = balancedOrder(a, b);
  recordCorrectPosition(ordered);
  return ordered;
}

function formatYear(y) {
  if (y < 0) return lang === 'ru' ? `${Math.abs(y)} до н.э.` : `${Math.abs(y)} BC`;
  return `${y}`;
}

  scoreNumber.textContent = savedStreak;

  // countdown animation — streak resets here, not before
  let current = savedStreak;
  streak = savedStreak; // keep visible until countdown starts
  if (current > 0) {
    const stepMs = Math.min(80, 800 / savedStreak);
    const interval = setInterval(() => {
      current--;
      streak = current;
      scoreNumber.textContent = current;
      counterEl.textContent = current;
      if (current <= 0) {
        clearInterval(interval);
        streak = 0;
        counterEl.textContent = 0;
      }
    }, stepMs);
  } else {
    streak = 0;
    counterEl.textContent = 0;
  }

  const nextP = nextPair();
  renderPair(nextP, false, true); // silent — no year reveal yet

  setTimeout(() => {
    scoreOverlay.classList.add('hide');
    setTimeout(() => {
      scoreOverlay.classList.remove('visible', 'hide');
      // reveal years and restore cards now that overlay is gone
      document.getElementById('bottom-hint').style.visibility = '';
      cardTop.style.opacity = '';
      cardBottom.style.opacity = '';
      yearTop.style.visibility = '';
      yearBot.style.visibility = '';
      cardTop.classList.add('card-enter');
      cardBottom.classList.add('card-enter');
      setTimeout(() => {
        cardTop.classList.remove('card-enter');
        cardBottom.classList.remove('card-enter');
      }, 600);
    }, 400);
  }, 2200);
}

function handleTap(chosen) {
  if (locked) return;
  locked = true;

  const [a, b] = currentPair;
  const other = chosen === a ? b : a;

  // Determine older = smaller birth year
  const chosenIsOlder = chosen.b <= other.b;
  const chosenCard = chosen === a ? cardTop : cardBottom;
  const otherCard  = chosen === a ? cardBottom : cardTop;
  const chosenYear = chosen === a ? yearTop : yearBot;
  const otherYear  = chosen === a ? yearBot : yearTop;

  // Show years
  chosenYear.classList.add('visible');
  otherYear.classList.add('visible');

  if (chosenIsOlder) {
    chosenCard.classList.add('correct');
    otherCard.classList.add('dimmed');
    chosenYear.classList.add('year-correct');
    otherYear.classList.add('year-dimmed');
    streak++;
    updateCounter(false);
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => loadNextPair(), 1100);
  } else {
    chosenCard.classList.add('wrong');
    otherCard.classList.add('correct');
    chosenYear.classList.add('year-wrong');
    otherYear.classList.add('year-correct');

    savedStreak = streak;
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => {
      showFact(chosen);
    }, 1800);
  }
}

function loadNextPair() {
  const pair = nextPair();
  cardTop.classList.add('card-exit-up');
  cardBottom.classList.add('card-exit-down');
  setTimeout(() => {
    renderPair(pair, true);
  }, 300);
}

// Init
buildDeck();
renderPair(nextPair(), false);

const splash = document.getElementById('splash');
const splashSub = document.getElementById('splash-sub');
const langSelect = document.getElementById('lang-select');

// Splash → lang select
splash.addEventListener('click', () => {
  if (getComputedStyle(splashSub).opacity < 0.5) return;
  splash.classList.add('hide');
  setTimeout(() => {
    splash.remove();
    langSelect.classList.add('visible');
  }, 500);
});

// Lang select → game
function chooseLang(l) {
  langSelect.classList.add('hide');
  setLang(l);
  setTimeout(() => {
    langSelect.remove();
    document.getElementById('app').classList.add('ready');
  }, 400);
}

cardTop.addEventListener('click', () => handleTap(currentPair[0]));
cardBottom.addEventListener('click', () => handleTap(currentPair[1]));
</script>
