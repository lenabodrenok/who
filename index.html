<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Who's Older?</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F5F7;
    --surface: #E8E7E7;
    --border: rgba(30,26,26,0.08);
    --text-primary: #1E1A1A;
    --text-secondary: rgba(30,26,26,0.55);
    --text-hint: rgba(30,26,26,0.32);
    --green: #2A7A45;
    --red: #C0392B;
    --accent: rgba(30,26,26,0.04);
    --divider: rgba(30,26,26,0.12);
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #app.ready {
    opacity: 1;
  }

  /* HEADER */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 14px;
    padding-top: calc(env(safe-area-inset-top) + 18px);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  #title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  #counter-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  #lang-switcher {
    display: flex;
    gap: 2px;
    background: rgba(30,26,26,0.07);
    border-radius: 8px;
    padding: 3px;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--text-hint);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    letter-spacing: 0.05em;
    padding: 3px 7px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn.active {
    background: rgba(30,26,26,0.1);
    color: var(--text-secondary);
  }

  #counter {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    transition: color 0.4s ease;
    min-width: 18px;
    text-align: right;
  }

  #counter.bump {
    animation: counterBump 0.35s ease;
  }

  @keyframes counterBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--text-secondary); }
    100% { transform: scale(1); }
  }

  #counter.reset-anim {
    animation: counterReset 0.5s ease;
  }

  @keyframes counterReset {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* GAME AREA */
  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  /* CARDS */
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px 32px;
    cursor: pointer;
    position: relative;
    transition: background 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.03) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:active::before {
    opacity: 1;
  }

  .card.top {
    border-bottom: 1px solid var(--divider);
  }

  .card.correct {
    background: rgba(42, 122, 69, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.wrong {
    background: rgba(192, 57, 43, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.dimmed {
    opacity: 0.4;
    transition: opacity 0.3s ease;
  }

  .card-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    transition: transform 0.3s ease;
  }

  .person-name {
    font-family: 'PT Serif', serif;
    font-size: clamp(32px, 8.5vw, 48px);
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .person-hint {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .person-year {
    font-family: 'PT Serif', serif;
    font-size: clamp(40px, 11vw, 60px);
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.4s ease, color 0.3s ease;
    margin-top: 6px;
    letter-spacing: -0.02em;
  }

  .person-year.visible {
    opacity: 1;
  }

  .person-year.year-correct {
    color: var(--green);
  }

  .person-year.year-wrong {
    color: var(--red);
  }

  .person-year.year-dimmed {
    color: var(--text-hint);
  }

  #versus {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--divider);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    opacity: 1 !important;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    font-weight: 400;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: versusGlow 2.2s ease-in-out infinite;
  }

  #versus:hover {
    border-color: rgba(30,26,26,0.3);
  }

  @keyframes versusGlow {
    0%, 100% { box-shadow: 0 0 0px 0px rgba(30,26,26,0.0); border-color: rgba(30,26,26,0.12); }
    50% { box-shadow: 0 0 0px 5px rgba(30,26,26,0.07); border-color: rgba(30,26,26,0.28); }
  }

  #versus.clue-active {
    animation: none;
    border-color: rgba(30,26,26,0.35);
    box-shadow: 0 0 0px 4px rgba(30,26,26,0.06);
  }

  /* Clue overlays on cards */
  .clue-text {
    position: absolute;
    left: 0; right: 0;
    bottom: 0; top: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    text-align: center;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    background: rgba(245,245,247,0.93);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 0;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  .clue-text.visible {
    opacity: 1;
  }

  /* Year note (uncertain date) */
  .person-year-note {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.03em;
    margin-top: 2px;
    opacity: 0;
    transition: opacity 0.4s ease;
    text-align: center;
    min-height: 14px;
  }

  .person-year-note.visible {
    opacity: 1;
  }

  /* FUN FACT OVERLAY */
  #fact-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    background: rgba(245, 245, 247, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #fact-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  #fact-name {
    font-family: 'PT Serif', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-hint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  #fact-text {
    font-family: 'PT Serif', serif;
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.6;
    text-align: center;
    max-width: 340px;
  }

  #fact-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-hint);
    margin-top: 32px;
    animation: pulseDot 1.5s ease infinite;
  }

  #fact-tap-hint {
    margin-top: 36px;
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.4); }
  }

  /* LANGUAGE SELECT SCREEN */
  #lang-select {
    position: fixed;
    inset: 0;
    z-index: 190;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #lang-select.visible {
    opacity: 1;
    pointer-events: all;
  }

  #lang-select.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  #lang-select-title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .lang-select-btn {
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 200px;
    padding: 18px 0;
    border-radius: 12px;
    cursor: pointer;
    margin: 8px 0;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-select-btn:active {
    background: var(--surface);
  }

  /* SCORE SCREEN */
  #score-overlay {
    position: absolute;
    inset: 0;
    z-index: 110;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(245, 245, 247, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  #score-overlay.visible {
    opacity: 1;
  }

  #score-overlay.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  #score-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #score-number {
    font-family: 'PT Serif', serif;
    font-size: clamp(64px, 18vw, 96px);
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #splash-title {
    font-family: 'PT Serif', serif;
    font-size: clamp(52px, 13vw, 76px);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: splashTitleIn 1s ease 0.4s forwards;
  }

  #splash-line {
    width: 0;
    height: 1px;
    background: var(--divider);
    margin-top: 20px;
    animation: splashLineIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
  }

  #splash-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 20px;
    animation: splashSubIn 0.6s ease 2s forwards;
  }

  #splash.hide {
    animation: splashOut 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  @keyframes splashTitleIn {
    to { opacity: 1; }
  }

  @keyframes splashLineIn {
    to { width: 48px; }
  }

  @keyframes splashSubIn {
    to { opacity: 1; }
  }

  @keyframes splashOut {
    to { opacity: 0; }
  }
  .card-enter {
    animation: cardEnter 0.6s ease both;
  }

  .card.top.card-enter {
    animation-delay: 0s;
  }

  .card.bottom.card-enter {
    animation-delay: 0s;
  }

  @keyframes cardEnter {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .card-exit-up {
    animation: cardFadeOut 0.35s ease both;
  }

  .card-exit-down {
    animation: cardFadeOut 0.35s ease both;
  }

  @keyframes cardFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* BOTTOM HINT */
  #bottom-hint {
    padding: 12px 24px;
    padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
    text-align: center;
    flex-shrink: 0;
  }

  #bottom-hint span {
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card.disabled {
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="splash">
  <div id="splash-title">Who's Older?</div>
  <div id="splash-line"></div>
  <div id="splash-sub">Tap to continue</div>
</div>

<div id="lang-select">
  <div id="lang-select-title">Choose language</div>
  <button class="lang-select-btn" onclick="chooseLang('en')">English</button>
  <button class="lang-select-btn" onclick="chooseLang('ru')">Русский</button>
</div>

<div id="app">
  <div id="header">
    <div></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="lang-switcher">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
      </div>
      <div id="counter-wrap">
        <span id="counter">0</span>
      </div>
    </div>
  </div>

  <div id="game">
    <div class="card top" id="card-top">
      <div class="card-inner">
        <div class="person-name" id="name-top"></div>
        <div class="person-hint" id="hint-top"></div>
        <div class="person-year" id="year-top"></div>
        <div class="person-year-note" id="note-top"></div>
      </div>
      <div class="clue-text" id="clue-top"></div>
    </div>

    <div id="versus" title="Hint">💡</div>

    <div class="card bottom" id="card-bottom">
      <div class="card-inner">
        <div class="person-name" id="name-bottom"></div>
        <div class="person-hint" id="hint-bottom"></div>
        <div class="person-year" id="year-bottom"></div>
        <div class="person-year-note" id="note-bottom"></div>
      </div>
      <div class="clue-text" id="clue-bottom"></div>
    </div>

    <div id="fact-overlay">
      <div id="fact-name"></div>
      <div id="fact-text"></div>
      <div id="fact-dot"></div>
      <div id="fact-tap-hint">Tap to continue</div>
    </div>

    <div id="score-overlay">
      <div id="score-label">Your streak</div>
      <div id="score-number">0</div>
    </div>
  </div>

  <div id="bottom-hint"><span>Tap the one born first</span></div>
</div>

elping to establish it as a literary language","fr":"Он написал «Кентерберийские рассказы» на среднеанглийском языке, способствуя его становлению как литературного","cat":"literature"},{"n":"William Shakespeare","nr":"Уильям Шекспир","b":1564,"h":"playwright","hr":"драматург","cl":"English playwright, author of “Hamlet” and “Romeo and Juliet”","clr":"английский драматург, автор «Гамлета»","f":"He significantly influenced the English language, contributing many words and expressions still in use today","fr":"Он оказал огромное влияние на английский язык, введя множество слов и выражений, которые используются до сих пор","cat":"literature"},{"n":"Miguel de Cervantes","nr":"Мигель де Сервантес","b":1547,"h":"novelist","hr":"писатель","cl":"Spanish writer, author of “Don Quixote”","clr":"испанский писатель, автор «Дон Кихота»","f":"Don Quixote is widely regarded as one of the first major works of modern literature","fr":"«Дон Кихот» широко считается одним из первых значительных произведений современной литературы","cat":"literature"},{"n":"Johann Wolfgang von Goethe","nr":"Иоганн Вольфганг фон Гёте","b":1749,"h":"writer and poet","hr":"писатель и поэт","cl":"German writer, author of “Faust”","clr":"немецкий писатель, автор «Фауста»","f":"He began writing his masterpiece Faust at age 23 and completed it just before his death at 82 — it took nearly 60 years","fr":"Он начал писать «Фауста» в 23 года и завершил его незадолго до смерти в 82 — работа заняла почти 60 лет","cat":"literature"},{"n":"Jane Austen","nr":"Джейн Остин","b":1775,"h":"novelist","hr":"писатель","cl":"English novelist, author of “Pride and Prejudice”","clr":"английская писательница, автор «Гордости и предубеждения»","f":"She published all her novels anonymously during her lifetime","fr":"При жизни она публиковала все свои романы анонимно","cat":"literature"},{"n":"Victor Hugo","nr":"Виктор Гюго","b":1802,"h":"writer and poet","hr":"писатель и поэт","cl":"French writer, author of “Les Misérables”","clr":" omoted education and learning, though his own writing skills were limited","fr":"Он способствовал развитию образования, хотя сам владел письмом ограниченно","cat":"politics"},{"n":"Joan of Arc","nr":"Жанна д’Арк","b":1412,"h":"military leader","hr":"военный лидер","cl":"French heroine, led army in Hundred Years’ War","clr":"французская героиня, участница Столетней войны","f":"She was executed at age 19 and later canonized as a saint by the Catholic Church","fr":"Она была казнена в 19 лет и позднее канонизирована католической церковью","cat":"politics"},{"n":"Henry VIII","nr":"Генрих VIII","b":1491,"h":"king","hr":"король","cl":"king of England, founder of Anglican Church","clr":"король Англии, создал англиканскую церковь","f":"He was a talented musician and composer in his youth","fr":"В молодости он был талантливым музыкантом и композитором","cat":"politics"},{"n":"Elizabeth I","nr":"Елизавета I","b":1533,"h":"queen","hr":"королева","cl":"queen of England, ruled during golden age","clr":"королева Англии, эпоха расцвета","f":"Her reign is known as the Elizabethan Era, a period of cultural flourishing in England","fr":"Её правление известно как Елизаветинская эпоха — период культурного расцвета в Англии","cat":"politics"},{"n":"Napoleon Bonaparte","nr":"Наполеон Бонапарт","b":1769,"h":"general and emperor","hr":"полководец и император","cl":"French emperor, conqueror of Europe","clr":"французский император, завоеватель Европы","f":"He was of about average height for a man of his time","fr":"По меркам своей эпохи он был примерно среднего роста","cat":"politics"},{"n":"George Washington","nr":"Джордж Вашингтон","b":1732,"h":"president","hr":"президент","cl":"first president of the United States","clr":"первый президент США","f":"He was the only US president unanimously elected by the Electoral College","fr":"Он единственный президент США, единогласно избранный коллегией выборщиков","cat":"politics"},{"n":"Abraham Lincoln","nr":"Авраам Линкольн","b":1809,"h":"president" function getEra(year) {
  if (year < 1500) return 0;
  if (year < 1700) return 1;
  if (year < 1800) return 2;
  if (year < 1850) return 3;
  if (year < 1900) return 4;
  if (year < 1950) return 5;
  return 6;
}

function getPairScore(a, b) {
  const diff = Math.abs(a.b - b.b);
  if (diff === 0) return null; // exclude identical years
  const eraDiff = Math.abs(getEra(a.b) - getEra(b.b));
  const sameCategory = a.cat === b.cat;
  let score = 100 / (diff + 1);
  if (eraDiff === 0) score += 40;
  else if (eraDiff === 1) score += 20;
  if (sameCategory) score += 25;
  return score;
}

function getTargetScore(streak) {
  const level = Math.floor(streak / 10);
  if (level === 0) return 20;
  if (level === 1) return 40;
  if (level === 2) return 60;
  if (level === 3) return 80;
  return 100;
}

function getDifficulty(streak) {
  return Math.floor(streak / 10);
}

// --- STATE ---
let usedPairs = new Set();
let recentPersons = []; // last 15 persons seen
const RECENT_LIMIT = 40;
const SEEN_LIMIT = 150;

// Load seen persons from localStorage
let seenPersons = [];
try {
  const saved = localStorage.getItem('whosolder_seen');
  if (saved) seenPersons = JSON.parse(saved);
} catch(e) { seenPersons = []; }

function saveSeenPersons() {
  try { localStorage.setItem('whosolder_seen', JSON.stringify(seenPersons)); } catch(e) {}
}

function isRecentOrSeen(name) {
  return recentPersons.includes(name) || seenPersons.includes(name);
}

function addRecent(a, b) {
  recentPersons.push(a.n, b.n);
  if (recentPersons.length > RECENT_LIMIT) {
    recentPersons = recentPersons.slice(recentPersons.length - RECENT_LIMIT);
  }
  // also add to seenPersons
  seenPersons.push(a.n, b.n);
  if (seenPersons.length > SEEN_LIMIT) {
    seenPersons = seenPersons.slice(seenPersons.length - SEEN_LIMIT);
  }
  saveSeenPersons();
}

function pairKey(a, b) {
  const i = DB.indexOf(a), j = DB.indexOf(b);
  return i < j ? `${i}-${j}` : `${j}-${i}`;
}

let deck = [];
let deckPos = 0;

function buildDeck() {
  deck = [...DB].sort(() => Math.random() - 0.5);
  deckPos = 0;
}

function getMinEraDiff(streak) {
  const level = Math.floor(streak / 10);
  if (level === 0) return 3;
  if (level === 1) return 2;
  if (level === 2) return 1;
  return 0;
}

function findPartner(person, targetScore) {
  const len = deck.length;
  const minEra = getMinEraDiff(streak);
  let bestCandidate = null;
  let bestDiff = Infinity;

  // First pass: respect recentPersons + seenPersons + minEraDiff
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (isRecentOrSeen(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    if (Math.abs(getEra(person.b) - getEra(candidate.b)) < minEra) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Fallback: ignore seenPersons, respect recentPersons + minEraDiff
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (recentPersons.includes(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    if (Math.abs(getEra(person.b) - getEra(candidate.b)) < minEra) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Final fallback: ignore all restrictions except diff > 0
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  return bestCandidate;
}

function getRandomPair() {
  if (deck.length === 0) buildDeck();
  const targetScore = getTargetScore(streak);
  const len = deck.length;

  for (let offset = 0; offset < len; offset++) {
    const idx = (deckPos + offset) % len;
    const person = deck[idx];
    if (isRecentOrSeen(person.n)) continue;
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = (idx + 1) % len;
      if (deckPos === 0) buildDeck();
      return [person, partner];
    }
  }
  // Full fallback: rebuild and try once more
  buildDeck();
  for (let i = 0; i < deck.length; i++) {
    const person = deck[i];
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = i + 1;
      return [person, partner];
    }
  }
  return [DB[0], DB[1]];
}

let lastCorrectPositions = []; // 'top' or 'bottom', last 3

function balancedOrder(a, b) {
  // Count recent correct positions
  const recentTop = lastCorrectPositions.filter(p => p === 'top').length;
  const recentBot = lastCorrectPositions.filter(p => p === 'bottom').length;

  // Older person (lower birth year) is the correct answer
  const olderIsA = a.b <= b.b;

  // If same side 3 times in a row, force the other side
  if (lastCorrectPositions.length >= 3) {
    const last3 = lastCorrectPositions.slice(-3);
    if (last3.every(p => p === 'top')) {
      // Force correct to bottom
      return olderIsA ? [b, a] : [a, b];
    }
    if (last3.every(p => p === 'bottom')) {
      // Force correct to top
      return olderIsA ? [a, b] : [b, a];
    }
  }

  // Otherwise random
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

function recordCorrectPosition(pair) {
  const [top, bottom] = pair;
  const correctIsTop = top.b <= bottom.b;
  lastCorrectPositions.push(correctIsTop ? 'top' : 'bottom');
  if (lastCorrectPositions.length > 6) lastCorrectPositions.shift();
}

function nextPair() {
  const [a, b] = getRandomPair();
  const ordered = balancedOrder(a, b);
  recordCorrectPosition(ordered);
  return ordered;
}

function formatYear(y, hasNote) {
  const prefix = hasNote ? '~' : '';
  if (y < 0) return lang === 'ru' ? `${prefix}${Math.abs(y)} до н.э.` : `${prefix}${Math.abs(y)} BC`;
  return `${prefix}${y}`;
}

const counterEl  = document.getElementById('counter');
const factOverlay = document.getElementById('fact-overlay');
const factName   = document.getElementById('fact-name');
const factText   = document.getElementById('fact-text');
const noteTop    = document.getElementById('note-top');
const noteBot    = document.getElementById('note-bottom');
const clueTop    = document.getElementById('clue-top');
const clueBot    = document.getElementById('clue-bottom');
const versusBtn  = document.getElementById('versus');
let clueTimer    = null;

// Helper: close clues
function dismissClues() {
  if (clueTimer) { clearTimeout(clueTimer); clueTimer = null; }
  clueTop.classList.remove('visible');
  clueBot.classList.remove('visible');
  versusBtn.classList.remove('clue-active');
}

// Clue button
versusBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const alreadyOpen = clueTop.classList.contains('visible');
  dismissClues();
  if (alreadyOpen) return; // toggle off on second tap
  clueTop.classList.add('visible');
  clueBot.classList.add('visible');
  versusBtn.classList.add('clue-active');
  clueTimer = setTimeout(() => {
    dismissClues();
  }, 3000);
});

// Tap anywhere to dismiss clues early
document.addEventListener('click', (e) => {
  if (clueTop.classList.contains('visible') && e.target !== versusBtn) {
    dismissClues();
  }
});

function renderPair(pair, animate, silent = false) {
  const [a, b] = pair;
  currentPair = pair;

  yearTop.className = 'person-year';
  yearBot.className = 'person-year';
  yearTop.textContent = '';
  yearBot.textContent = '';

  nameTop.textContent = getName(a);
  hintTop.textContent = getHint(a);
  nameBot.textContent = getName(b);
  hintBot.textContent = getHint(b);

  // Set clue texts
  clueTop.textContent  = getClue(a);
  clueBot.textContent  = getClue(b);
  clueTop.classList.remove('visible');
  clueBot.classList.remove('visible');
  versusBtn.classList.remove('clue-active');
  if (clueTimer) { clearTimeout(clueTimer); clueTimer = null; }

  // Note texts — shown alongside year
  noteTop.textContent = getNote(a);
  noteBot.textContent = getNote(b);
  noteTop.classList.remove('visible');
  noteBot.classList.remove('visible');

  cardTop.className = 'card top';
  cardBottom.className = 'card bottom';

  yearTop.style.visibility = 'hidden';
  yearBot.style.visibility = 'hidden';
  yearTop.textContent = formatYear(a.b, !!a.note);
  yearBot.textContent = formatYear(b.b, !!b.note);

  if (!silent) {
    setTimeout(() => {
      yearTop.style.visibility = '';
      yearBot.style.visibility = '';
    }, 550);
  }

  if (animate) {
    cardTop.classList.add('card-enter');
    cardBottom.classList.add('card-enter');
    setTimeout(() => {
      cardTop.classList.remove('card-enter');
      cardBottom.classList.remove('card-enter');
    }, 600);
  }

  locked = false;
}

function updateCounter(reset) {
  counterEl.textContent = streak;
  counterEl.classList.remove('bump', 'reset-anim');
  void counterEl.offsetWidth;
  if (reset) {
    counterEl.classList.add('reset-anim');
  } else {
    counterEl.classList.add('bump');
  }
}

let savedStreak = 0;

function showFact(person) {
  currentFactPerson = person;
  factName.textContent = getName(person).toUpperCase();
  factText.textContent = getFact(person);
  factOverlay.classList.add('visible');
  document.getElementById('bottom-hint').style.visibility = 'hidden';
}

factOverlay.addEventListener('click', () => {
  if (!factOverlay.classList.contains('visible')) return;
  factOverlay.classList.remove('visible');
  document.getElementById('bottom-hint').style.visibility = '';
  // show score screen before loading next pair
  showScore();
});

function showScore() {
  const scoreOverlay = document.getElementById('score-overlay');
  const scoreNumber = document.getElementById('score-number');

  // Clear and hide old cards immediately
  cardTop.className = 'card top';
  cardBottom.className = 'card bottom';
  yearTop.className = 'person-year';
  yearBot.className = 'person-year';
  cardTop.style.opacity = '0';
  cardBottom.style.opacity = '0';

  scoreNumber.textContent = savedStreak;
  scoreOverlay.classList.remove('hide');
  scoreOverlay.classList.add('visible');
  document.getElementById('bottom-hint').style.visibility = 'hidden';

  // countdown animation — streak resets here, not before
  let current = savedStreak;
  streak = savedStreak; // keep visible until countdown starts
  if (current > 0) {
    const stepMs = Math.min(80, 800 / savedStreak);
    const interval = setInterval(() => {
      current--;
      streak = current;
      scoreNumber.textContent = current;
      counterEl.textContent = current;
      if (current <= 0) {
        clearInterval(interval);
        streak = 0;
        counterEl.textContent = 0;
      }
    }, stepMs);
  } else {
    streak = 0;
    counterEl.textContent = 0;
  }

  const nextP = nextPair();
  renderPair(nextP, false, true); // silent — no year reveal yet

  setTimeout(() => {
    scoreOverlay.classList.add('hide');
    setTimeout(() => {
      scoreOverlay.classList.remove('visible', 'hide');
      // reveal years and restore cards now that overlay is gone
      document.getElementById('bottom-hint').style.visibility = '';
      cardTop.style.opacity = '';
      cardBottom.style.opacity = '';
      yearTop.style.visibility = '';
      yearBot.style.visibility = '';
      cardTop.classList.add('card-enter');
      cardBottom.classList.add('card-enter');
      setTimeout(() => {
        cardTop.classList.remove('card-enter');
        cardBottom.classList.remove('card-enter');
      }, 600);
    }, 400);
  }, 2200);
}

function handleTap(chosen) {
  if (locked) return;
  locked = true;

  const [a, b] = currentPair;
  const other = chosen === a ? b : a;

  // Determine older = smaller birth year
  const chosenIsOlder = chosen.b <= other.b;
  const chosenCard = chosen === a ? cardTop : cardBottom;
  const otherCard  = chosen === a ? cardBottom : cardTop;
  const chosenYear = chosen === a ? yearTop : yearBot;
  const otherYear  = chosen === a ? yearBot : yearTop;

  // Show years
  chosenYear.classList.add('visible');
  otherYear.classList.add('visible');

  // Show approximate-date notes alongside years
  const chosenNote = chosen === a ? noteTop : noteBot;
  const otherNote  = chosen === a ? noteBot : noteTop;
  if (chosenNote.textContent) chosenNote.classList.add('visible');
  if (otherNote.textContent)  otherNote.classList.add('visible');

  if (chosenIsOlder) {
    chosenCard.classList.add('correct');
    otherCard.classList.add('dimmed');
    chosenYear.classList.add('year-correct');
    otherYear.classList.add('year-dimmed');
    streak++;
    updateCounter(false);
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => loadNextPair(), 1100);
  } else {
    chosenCard.classList.add('wrong');
    otherCard.classList.add('correct');
    chosenYear.classList.add('year-wrong');
    otherYear.classList.add('year-correct');

    savedStreak = streak;
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => {
      showFact(chosen);
    }, 1800);
  }
}

function loadNextPair() {
  const pair = nextPair();
  cardTop.classList.add('card-exit-up');
  cardBottom.classList.add('card-exit-down');
  setTimeout(() => {
    renderPair(pair, true);
  }, 300);
}

// Init
buildDeck();
renderPair(nextPair(), false);

const splash = document.getElementById('splash');
const splashSub = document.getElementById('splash-sub');
const langSelect = document.getElementById('lang-select');

// Splash → lang select
splash.addEventListener('click', () => {
  if (getComputedStyle(splashSub).opacity < 0.5) return;
  splash.classList.add('hide');
  setTimeout(() => {
    splash.remove();
    langSelect.classList.add('visible');
  }, 500);
});

// Lang select → game
function chooseLang(l) {
  langSelect.classList.add('hide');
  setLang(l);
  setTimeout(() => {
    langSelect.remove();
    document.getElementById('app').classList.add('ready');
  }, 400);
}

cardTop.addEventListener('click', () => handleTap(currentPair[0]));
cardBottom.addEventListener('click', () => handleTap(currentPair[1]));
</script>
</body>
</html>
