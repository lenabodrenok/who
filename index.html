  {n:"Gottfried Wilhelm Leibniz",nr:"Готфрид Вильгельм Лейбниц",b:1646,note:"",noter:"",era:"Baroque:Enlightenment",erar:"Барокко:Просвещение",boundary:1750,clue:"Co-invented calculus",cluer:"Соизобрёл математический анализ",hint:"mathematician and philosopher",hintr:"математик и философ",ctx:"New mathematical approaches supported advances in science and philosophy",ctxr:"Новые математические подходы способствовали развитию науки и философии",fact:"He and Newton invented calculus independently — their dispute over priority became one of the most bitter in scientific history",factr:"Он и Ньютон изобрели математический анализ независимо — их спор о приоритете стал одним из самых острых в истории науки",cat:"science"},
  {n:"Antoine Lavoisier",nr:"Антуан Лавуазье",b:1743,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Founder of modern chemistry",cluer:"Основатель современной химии",hint:"chemist",hintr:"химик",ctx:"Chemistry developed into a systematic science of elements and reactions",ctxr:"Химия становилась системной наукой о веществах и реакциях",fact:"He was executed during the French Revolution",factr:"Он был казнён во время Французской революции",cat:"science"},
  {n:"James Watt",nr:"Джеймс Уатт",b:1736,note:"",noter:"",era:"Enlightenment:Industrial Age",erar:"Просвещение:Индустриальная эпоха",boundary:1800,clue:"Improved steam engine",cluer:"Усовершенствовал паровую машину",hint:"engineer and inventor",hintr:"инженер и изобретатель",ctx:"Steam power contributed to industrial growth and technological change",ctxr:"Паровые машины способствовали промышленному росту",fact:"The unit of power — the watt — is named in his honour",factr:"Единица мощности «ватт» названа в его честь",cat:"science"},
  {n:"Michael Faraday",nr:"Майкл Фарадей",b:1791,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Discovered electromagnetic induction",cluer:"Открыл электромагнитную индукцию",hint:"physicist and chemist",hintr:"физик и химик",ctx:"Research into electricity led to new technologies and applications",ctxr:"Исследования электричества открывали путь новым технологиям",fact:"He had almost no formal education and taught himself science from books while working as a bookbinder's apprentice",factr:"Он почти не получал формального образования и занимался самообучением по книгам, работая подмастерьем переплётчика",cat:"science"},
  {n:"Charles Darwin",nr:"Чарльз Дарвин",b:1809,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Proposed theory of evolution",cluer:"Предложил теорию эволюции",hint:"naturalist",hintr:"натуралист",ctx:"Scientific study of life introduced ideas about evolution",ctxr:"Научное изучение жизни привело к идеям эволюции",fact:"He spent 8 years studying barnacles before publishing On the Origin of Species",factr:"Он провёл 8 лет, изучая усоногих раков, прежде чем опубликовать «Происхождение видов»",cat:"science"},
  {n:"Gregor Mendel",nr:"Грегор Мендель",b:1822,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Founder of genetics",cluer:"Основатель генетики",hint:"geneticist",hintr:"генетик",ctx:"Patterns of inheritance were studied, forming the basis of genetics",ctxr:"Изучение наследственности заложило основы генетики",fact:"He was a monk who conducted his famous genetics experiments on pea plants in a monastery garden",factr:"Он был монахом, проводившим свои знаменитые опыты по генетике на горохе в монастырском саду",cat:"science"},
  {n:"Louis Pasteur",nr:"Луи Пастер",b:1822,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Founder of microbiology",cluer:"Основатель микробиологии",hint:"chemist and microbiologist",hintr:"химик и микробиолог",ctx:"Scientific discoveries improved understanding of disease and prevention",ctxr:"Научные открытия улучшали понимание болезней и их профилактику",fact:"He developed the first vaccine for rabies",factr:"Он разработал первую вакцину от бешенства",cat:"science"},
  {n:"Dmitri Mendeleev",nr:"Дмитрий Менделеев",b:1834,note:"",noter:"",era:"Industrial Age:Enlightenment",erar:"Индустриальная эпоха:Просвещение",boundary:1800,clue:"Created periodic table",cluer:"Создал таблицу элементов",hint:"chemist",hintr:"химик",ctx:"Elements were organized into systems that clarified chemical relationships",ctxr:"Элементы систематизировались, проясняя химические связи",fact:"He predicted the existence of elements not yet discovered when he created the periodic table",factr:"Создавая периодическую таблицу, он предсказал существование элементов, ещё не открытых в то время",cat:"science"},
  {n:"Nikola Tesla",nr:"Никола Тесла",b:1856,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of electrical engineering",cluer:"Пионер электротехники",hint:"inventor and engineer",hintr:"изобретатель и инженер",ctx:"Electrical innovation contributed to modern energy systems",ctxr:"Развитие электричества способствовало современным энергетическим системам",fact:"He claimed to have invented a 'death ray' weapon",factr:"Он утверждал, что изобрёл «луч смерти»",cat:"science"},
  {n:"Thomas Edison",nr:"Томас Эдисон",b:1847,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Developed light bulb",cluer:"Разработал лампу накаливания",hint:"inventor",hintr:"изобретатель",ctx:"Technological innovation influenced everyday life and industry",ctxr:"Технологические изобретения влияли на повседневную жизнь и промышленность",fact:"He held 1,093 patents in the United States during his lifetime",factr:"За свою жизнь он получил 1093 патента в США",cat:"science"},
  {n:"Marie Curie",nr:"Мария Кюри",b:1867,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Researched radioactivity",cluer:"Исследовала радиоактивность",hint:"physicist and chemist",hintr:"физик и химик",ctx:"Research into radiation opened new areas of scientific study",ctxr:"Исследования радиации открывали новые направления науки",fact:"She was the first woman to win a Nobel Prize and the only person to win in two different sciences",factr:"Она была первой женщиной, получившей Нобелевскую премию, и единственным человеком, получившим её в двух разных науках",cat:"science"},
  {n:"Albert Einstein",nr:"Альберт Эйнштейн",b:1879,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Proposed theory of relativity",cluer:"Предложил теорию относительности",hint:"physicist",hintr:"физик",ctx:"New theories changed understanding of space, time and physics",ctxr:"Новые теории меняли представление о пространстве и времени",fact:"He showed signs of delayed speech in early childhood, though details of its extent are debated",factr:"В детстве у него наблюдалась задержка речи, однако её степень в источниках описывается по-разному",cat:"science"},
  {n:"Max Planck",nr:"Макс Планк",b:1858,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Founder of quantum theory",cluer:"Основатель квантовой теории",hint:"physicist",hintr:"физик",ctx:"Emerging theories challenged classical physics and led to quantum science",ctxr:"Новые теории ставили под сомнение классическую физику",fact:"He was also an accomplished musician who played several instruments",factr:"Он был также талантливым музыкантом и играл на нескольких инструментах",cat:"science"},
  {n:"Niels Bohr",nr:"Нильс Бор",b:1885,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Developed atomic model",cluer:"Разработал модель атома",hint:"physicist",hintr:"физик",ctx:"Study of atomic structure reshaped understanding of matter",ctxr:"Изучение атома меняло понимание материи",fact:"During World War II, gold Nobel Prize medals were dissolved in acid in his institute to prevent them from being seized by the Nazis",factr:"Во время Второй мировой войны в его институте растворили в кислоте золотые нобелевские медали, чтобы они не достались нацистам",cat:"science"},
  {n:"Erwin Schrödinger",nr:"Эрвин Шрёдингер",b:1887,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Formulated wave equation",cluer:"Сформулировал волновое уравнение",hint:"physicist",hintr:"физик",ctx:"Quantum theory explored the behavior of matter at small scales",ctxr:"Квантовая теория изучала поведение материи на малых масштабах",fact:"His famous thought experiment about a cat in a box is one of the most cited in physics",factr:"Его знаменитый мысленный эксперимент с котом — один из самых цитируемых в физике",cat:"science"},
  {n:"Werner Heisenberg",nr:"Вернер Гейзенберг",b:1901,note:"",noter:"",era:"Modern:Industrial Age",erar:"Модерн:Индустриальная эпоха",boundary:1900,clue:"Formulated uncertainty principle",cluer:"Сформулировал принцип неопределённости",hint:"physicist",hintr:"физик",ctx:"Scientific work examined limits of measurement and certainty",ctxr:"Научные исследования изучали пределы точности и измерений",fact:"He formulated the uncertainty principle, a fundamental concept in quantum mechanics",factr:"Он сформулировал принцип неопределённости — один из ключевых принципов квантовой механики",cat:"science"},
  {n:"Alan Turing",nr:"Алан Тьюринг",b:1912,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Pioneer of computer science",cluer:"Пионер информатики",hint:"mathematician and computer scientist",hintr:"математик и информатик",ctx:"Early computing developed alongside wartime technological needs",ctxr:"Развитие вычислительной техники ускорялось во время войны",fact:"He played a key role in breaking the German Enigma code during World War II",factr:"Он сыграл ключевую роль во взломе немецкого шифра «Энигма» во время Второй мировой войны",cat:"science"},
  {n:"Rosalind Franklin",nr:"Розалинд Франклин",b:1920,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Researched DNA structure",cluer:"Исследовала структуру ДНК",hint:"chemist and crystallographer",hintr:"химик и кристаллограф",ctx:"Research into molecular structure contributed to advances in biology",ctxr:"Исследования молекулярной структуры способствовали развитию биологии",fact:"Her X-ray diffraction work was crucial to understanding the structure of DNA",factr:"Её рентгеноструктурные исследования сыграли ключевую роль в понимании структуры ДНК",cat:"science"},
  {n:"Stephen Hawking",nr:"Стивен Хокинг",b:1942,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Researched black holes",cluer:"Исследовал чёрные дыры",hint:"physicist",hintr:"физик",ctx:"Modern physics explored black holes and the origins of the universe",ctxr:"Современная физика изучала чёрные дыры и происхождение Вселенной",fact:"He was diagnosed with ALS at 21 and given two years to live — he survived 55 more",factr:"Ему поставили диагноз БАС в 21 год и дали два года жизни — он прожил ещё 55 лет",cat:"science"},
  {n:"Carl Sagan",nr:"Карл Саган",b:1934,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Popularized science",cluer:"Популяризировал науку",hint:"astronomer and science communicator",hintr:"астроном и популяризатор науки",ctx:"Science communication helped bring knowledge about space to a wider audience",ctxr:"Популяризация науки делала знания о космосе доступными",fact:"He co-created and hosted the television series Cosmos, which reached a very large global audience",factr:"Он стал соавтором и ведущим телесериала «Космос», который посмотрела огромная аудитория по всему миру",cat:"science"},
  {n:"Tim Berners-Lee",nr:"Тим Бернерс-Ли",b:1955,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Invented World Wide Web",cluer:"Создал Всемирную паутину",hint:"computer scientist",hintr:"информатик",ctx:"The internet developed as a system for sharing information globally",ctxr:"Интернет развивался как система глобального обмена информацией",fact:"He invented the World Wide Web in 1989 and chose not to patent it, making it freely available to everyone",factr:"Он изобрёл Всемирную паутину в 1989 году и отказался патентовать её, сделав бесплатной для всех",cat:"science"},
  {n:"Hippocrates",nr:"Гиппократ",b:-460,note:"",noter:"",era:"Ancient:Early Middle Ages",erar:"Античность:Раннее Средневековье",boundary:500,clue:"The “Father of Medicine”",cluer:"«Отец медицины»",hint:"physician",hintr:"врач",ctx:"Medicine began to seek natural explanations for illness",ctxr:"Медицина стремилась объяснять болезни естественными причинами",fact:"The Hippocratic Oath taken by doctors is named after him",factr:"Клятва Гиппократа, которую произносят врачи, названа в его честь",cat:"science"},
  {n:"Jesse Owens",nr:"Джесси Оуэнс",b:1913,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Olympic sprint champion",cluer:"Олимпийский чемпион в беге",hint:"sprinter and long jumper",hintr:"спринтер и прыгун в длину",ctx:"International sports events reflected political tensions before World War II",ctxr:"Международные спортивные события отражали политическую напряжённость перед Второй мировой войной",fact:"He won four gold medals at the 1936 Berlin Olympics under Hitler's watch",factr:"Он выиграл четыре золотые медали на Олимпиаде 1936 года в Берлине на глазах у Гитлера",cat:"sport"},
  {n:"Babe Ruth",nr:"Бейб Рут",b:1895,note:"",noter:"",era:"Industrial Age:Modern",erar:"Индустриальная эпоха:Модерн",boundary:1900,clue:"Baseball legend",cluer:"Легенда бейсбола",hint:"baseball player",hintr:"бейсболист",ctx:"Mass media helped turn athletes into widely recognized public figures",ctxr:"Массовые медиа делали спортсменов широко известными",fact:"He hit 714 home runs — a record that stood for 39 years",factr:"Он выбил 714 хоум-ранов — рекорд продержался 39 лет",cat:"sport"},
  {n:"Muhammad Ali",nr:"Мухаммад Али",b:1942,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Heavyweight boxing champion",cluer:"Чемпион мира в тяжёлом весе",hint:"boxer",hintr:"боксёр",ctx:"Athletes increasingly spoke on social and political issues beyond sport",ctxr:"Спортсмены всё чаще высказывались по социальным и политическим вопросам",fact:"He refused to be drafted into the Vietnam War, saying 'I ain't got no quarrel with them Viet Cong'",factr:"Он отказался от призыва во Вьетнам, заявив: «У меня нет претензий к вьетконговцам»",cat:"sport"},
  {n:"Pelé",nr:"Пеле",b:1940,note:"",noter:"",era:"Modern:Contemporary",erar:"Модерн:Современность",boundary:1950,clue:"Football World Cup winner",cluer:"Чемпион мира по футболу",hint:"footballer",hintr:"футболист",ctx:"Global media expanded the popularity of football worldwide",ctxr:"Глобальные медиа способствовали распространению футбола по всему миру",fact:"He is the only player to have won the FIFA World Cup three times",factr:"Он единственный футболист, трижды выигравший чемпионат мира",cat:"sport"},
  {n:"Diego Maradona",nr:"Диего Марадона",b:1960,note:"",noter:"",era:"Contemporary:Modern",erar:"Современность:Модерн",boundary:1950,clue:"Football World Cup winner",cluer:"Чемпион мира по футболу",hint:"footballer",hintr:"футболист",ctx:"Sport became closely tied to national identity and public emotion",ctxr:"Спорт был тесно связан с национальной идентичностью и эмоциями",fact:"He scored the famous “Hand of God” goal against England in the 1986 World Cup",factr:"Он забил знаменитый гол «рукой Бога» в матче против Англии на чемпионате мира 1986 года",cat:"sport"},

function getEra(year) {
  if (year < -1500) return 0;  // mythological/prehistoric
  if (year < -500)  return 1;  // ancient world
  if (year < 500)   return 2;  // classical antiquity
  if (year < 1000)  return 3;  // early middle ages
  if (year < 1300)  return 4;  // high middle ages
  if (year < 1500)  return 5;  // late middle ages
  if (year < 1650)  return 6;  // renaissance
  if (year < 1800)  return 7;  // baroque / enlightenment
  if (year < 1900)  return 8;  // 19th century
  if (year < 1950)  return 9;  // early modern
  return 10;                   // contemporary
}

function getPairScore(a, b) {
  const diff = Math.abs(a.b - b.b);
  if (diff === 0) return null; // exclude identical years
  const eraDiff = Math.abs(getEra(a.b) - getEra(b.b));
  const sameCategory = a.cat === b.cat;
  let score = 100 / (diff + 1);
  if (eraDiff === 0) score += 40;
  else if (eraDiff === 1) score += 20;
  if (sameCategory) score += 25;
  return score;
}

function getTargetScore(streak) {
  const level = Math.floor(streak / 10);
  if (level === 0) return 20;
  if (level === 1) return 40;
  if (level === 2) return 60;
  if (level === 3) return 80;
  return 100;
}

function getDifficulty(streak) {
  return Math.floor(streak / 10);
}

let usedPairs = new Set();
let recentPersons = []; // last 15 persons seen
const RECENT_LIMIT = 40;
const SEEN_LIMIT = 150;

// Load seen persons from localStorage
let seenPersons = [];
try {
  const saved = localStorage.getItem('whosolder_seen');
  if (saved) seenPersons = JSON.parse(saved);
} catch(e) { seenPersons = []; }

function saveSeenPersons() {
  try { localStorage.setItem('whosolder_seen', JSON.stringify(seenPersons)); } catch(e) {}
}

function isRecentOrSeen(name) {
  return recentPersons.includes(name) || seenPersons.includes(name);
}

function addRecent(a, b) {
  recentPersons.push(a.n, b.n);
  if (recentPersons.length > RECENT_LIMIT) {
    recentPersons = recentPersons.slice(recentPersons.length - RECENT_LIMIT);
  }
  // also add to seenPersons
  seenPersons.push(a.n, b.n);
  if (seenPersons.length > SEEN_LIMIT) {
    seenPersons = seenPersons.slice(seenPersons.length - SEEN_LIMIT);
  }
  saveSeenPersons();
}

function pairKey(a, b) {
  const i = DB.indexOf(a), j = DB.indexOf(b);
  return i < j ? `${i}-${j}` : `${j}-${i}`;
}

function getName(p) { return lang === 'ru' ? p.nr : p.n; }

let deck = [];
let deckPos = 0;

function buildDeck() {
  deck = [...DB].sort(() => Math.random() - 0.5);
  deckPos = 0;
}

function getMinEraDiff(streak) {
  const level = Math.floor(streak / 10);
  if (level === 0) return 3;
  if (level === 1) return 2;
  if (level === 2) return 1;
  return 0;
}

function findPartner(person, targetScore) {
  const len = deck.length;
  const minEra = getMinEraDiff(streak);
  let bestCandidate = null;
  let bestDiff = Infinity;

  // First pass: respect recentPersons + seenPersons + minEraDiff
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (isRecentOrSeen(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    if (Math.abs(getEra(person.b) - getEra(candidate.b)) < minEra) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Fallback: ignore seenPersons, respect recentPersons + minEraDiff
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (recentPersons.includes(candidate.n)) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    if (Math.abs(getEra(person.b) - getEra(candidate.b)) < minEra) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  if (bestCandidate) return bestCandidate;

  // Final fallback: ignore all restrictions except diff > 0
  bestDiff = Infinity; bestCandidate = null;
  for (let offset = 0; offset < len; offset++) {
    const candidate = deck[(deckPos + offset) % len];
    if (candidate.n === person.n) continue;
    if (usedPairs.has(pairKey(person, candidate))) continue;
    const score = getPairScore(person, candidate);
    if (score === null) continue;
    const diff = Math.abs(score - targetScore);
    if (diff < bestDiff) { bestDiff = diff; bestCandidate = candidate; }
  }
  return bestCandidate;
}

function getRandomPair() {
  if (deck.length === 0) buildDeck();
  const targetScore = getTargetScore(streak);
  const len = deck.length;

  for (let offset = 0; offset < len; offset++) {
    const idx = (deckPos + offset) % len;
    const person = deck[idx];
    if (isRecentOrSeen(person.n)) continue;
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = (idx + 1) % len;
      if (deckPos === 0) buildDeck();
      return [person, partner];
    }
  }
  // Full fallback: rebuild and try once more
  buildDeck();
  for (let i = 0; i < deck.length; i++) {
    const person = deck[i];
    const partner = findPartner(person, targetScore);
    if (partner) {
      deckPos = i + 1;
      return [person, partner];
    }
  }
  return [DB[0], DB[1]];
}

let lastCorrectPositions = []; // 'top' or 'bottom', last 3

function balancedOrder(a, b) {
  // Count recent correct positions
  const recentTop = lastCorrectPositions.filter(p => p === 'top').length;
  const recentBot = lastCorrectPositions.filter(p => p === 'bottom').length;

  // Older person (lower birth year) is the correct answer
  const olderIsA = a.b <= b.b;

  // If same side 3 times in a row, force the other side
  if (lastCorrectPositions.length >= 3) {
    const last3 = lastCorrectPositions.slice(-3);
    if (last3.every(p => p === 'top')) {
      // Force correct to bottom
      return olderIsA ? [b, a] : [a, b];
    }
    if (last3.every(p => p === 'bottom')) {
      // Force correct to top
      return olderIsA ? [a, b] : [b, a];
    }
  }

  // Otherwise random
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

function recordCorrectPosition(pair) {
  const [top, bottom] = pair;
  const correctIsTop = top.b <= bottom.b;
  lastCorrectPositions.push(correctIsTop ? 'top' : 'bottom');
  if (lastCorrectPositions.length > 6) lastCorrectPositions.shift();
}

function nextPair() {
  const [a, b] = getRandomPair();
  const ordered = balancedOrder(a, b);
  recordCorrectPosition(ordered);
  return ordered;
}

function formatYear(y, hasNote) {
  const prefix = hasNote ? '~' : '';
  if (y < 0) return lang === 'ru' ? `${prefix}${Math.abs(y)} до н.э.` : `${prefix}${Math.abs(y)} BC`;
  return `${prefix}${y}`;
}

  cardBottom.className = 'card bottom';

  yearTop.style.visibility = 'hidden';
  yearBot.style.visibility = 'hidden';
  yearTop.textContent = formatYear(a.b, !!a.note);
  yearBot.textContent = formatYear(b.b, !!b.note);

  if (!silent) {
    setTimeout(() => {
      yearTop.style.visibility = '';
      yearBot.style.visibility = '';
    }, 550);
  }

  if (animate) {
    cardTop.classList.add('card-enter');
    cardBottom.classList.add('card-enter');
    setTimeout(() => {
      cardTop.classList.remove('card-enter');
      cardBottom.classList.remove('card-enter');
    }, 600);
  }

  locked = false;
}

function updateCounter(reset) {
  counterEl.textContent = streak;
  counterEl.classList.remove('bump', 'reset-anim');
  void counterEl.offsetWidth;
  if (reset) {
    counterEl.classList.add('reset-anim');
  } else {
    counterEl.classList.add('bump');
  }
}

let savedStreak = 0;
let currentFactPerson = null;

function getCtx(p) { return lang === 'ru' ? (p.ctxr || p.ctx || '') : (p.ctx || ''); }

function formatBoundaryYear(y) {
  if (y < 0) return lang === 'ru' ? Math.abs(y) + ' до н.э.' : Math.abs(y) + ' BC';
  return String(y);
}

function showFact(person) {
  currentFactPerson = person;

  // Name and year
  document.getElementById('fact-name').textContent = getName(person);
  const prefix = person.note ? '~' : '';
  const yr = person.b;
  const yrStr = yr < 0
    ? (lang === 'ru' ? prefix + Math.abs(yr) + ' до н.э.' : prefix + Math.abs(yr) + ' BC')
    : prefix + yr;
  document.getElementById('fact-year').textContent = yrStr;

  // Approximate note
  const noteEl = document.getElementById('fact-note');
  if (person.note) {
    noteEl.textContent = lang === 'ru'
      ? '* приблизительная дата; точный год неизвестен или является предметом споров'
      : '* approximate date; exact year is uncertain or debated';
    noteEl.style.display = '';
  } else {
    noteEl.style.display = 'none';
  }

  // Timeline: era field is "EraA:EraB"
  // EraA = the era the person belongs to, EraB = the adjacent era
  // On the timeline: always show earlier era LEFT, later era RIGHT
  const eraRaw = lang === 'ru' ? (person.erar || person.era || '') : (person.era || '');
  const parts = eraRaw.split(':');
  const eraA = parts[0] ? parts[0].trim() : '';
  const eraB = parts[1] ? parts[1].trim() : '';
  const boundary = person.boundary || 0;
  // person.b < boundary → person in EraA which is the earlier era → left=EraA, right=EraB
  // person.b >= boundary → person in EraA which is the later era → left=EraB, right=EraA
  const personIsEarlier = person.b < boundary;
  const eraLeft  = personIsEarlier ? eraA : eraB;
  const eraRight = personIsEarlier ? eraB : eraA;
  document.getElementById('fact-era-left').textContent = eraLeft;
  document.getElementById('fact-era-right').textContent = eraRight;
  document.getElementById('fact-tl-boundary').textContent = formatBoundaryYear(boundary);

  // Highlight the side where the person lives
  document.getElementById('fact-tl-line-left').className  = 'fact-tl-line' + (personIsEarlier ? ' lit' : '');
  document.getElementById('fact-tl-line-right').className = 'fact-tl-line' + (!personIsEarlier ? ' lit' : '');

  // Context
  const ctxLabel = document.getElementById('fact-context-label');
  ctxLabel.textContent = lang === 'ru' ? 'Контекст' : 'Context';
  document.getElementById('fact-context-text').textContent = getCtx(person);

  // Fact text
  factText.textContent = getFact(person);

  // Tap hint
  document.getElementById('fact-tap-hint').textContent = UI[lang].tap;

  factOverlay.classList.add('visible');
  document.getElementById('bottom-hint').style.visibility = 'hidden';
}

factOverlay.addEventListener('click', () => {
  if (!factOverlay.classList.contains('visible')) return;
  factOverlay.classList.remove('visible');
  document.getElementById('bottom-hint').style.visibility = '';
  // show score screen before loading next pair
  showScore();
});

function showScore() {
  const scoreOverlay = document.getElementById('score-overlay');
  const scoreNumber = document.getElementById('score-number');

  // Clear and hide old cards immediately
  cardTop.className = 'card top';
  cardBottom.className = 'card bottom';
  yearTop.className = 'person-year';
  yearBot.className = 'person-year';
  cardTop.style.opacity = '0';
  cardBottom.style.opacity = '0';

  scoreNumber.textContent = savedStreak;
  scoreOverlay.classList.remove('hide');
  scoreOverlay.classList.add('visible');
  document.getElementById('bottom-hint').style.visibility = 'hidden';

  // countdown animation — streak resets here, not before
  let current = savedStreak;
  streak = savedStreak; // keep visible until countdown starts
  if (current > 0) {
    const stepMs = Math.min(80, 800 / savedStreak);
    const interval = setInterval(() => {
      current--;
      streak = current;
      scoreNumber.textContent = current;
      counterEl.textContent = current;
      if (current <= 0) {
        clearInterval(interval);
        streak = 0;
        counterEl.textContent = 0;
      }
    }, stepMs);
  } else {
    streak = 0;
    counterEl.textContent = 0;
  }

  const nextP = nextPair();
  renderPair(nextP, false, true); // silent — no year reveal yet

  setTimeout(() => {
    scoreOverlay.classList.add('hide');
    setTimeout(() => {
      scoreOverlay.classList.remove('visible', 'hide');
      // reveal years and restore cards now that overlay is gone
      document.getElementById('bottom-hint').style.visibility = '';
      cardTop.style.opacity = '';
      cardBottom.style.opacity = '';
      yearTop.style.visibility = '';
      yearBot.style.visibility = '';
      cardTop.classList.add('card-enter');
      cardBottom.classList.add('card-enter');
      setTimeout(() => {
        cardTop.classList.remove('card-enter');
        cardBottom.classList.remove('card-enter');
      }, 600);
    }, 400);
  }, 2200);
}

function handleTap(chosen) {
  if (locked) return;
  locked = true;

  const [a, b] = currentPair;
  const other = chosen === a ? b : a;

  // Determine older = smaller birth year
  const chosenIsOlder = chosen.b <= other.b;
  const chosenCard = chosen === a ? cardTop : cardBottom;
  const otherCard  = chosen === a ? cardBottom : cardTop;
  const chosenYear = chosen === a ? yearTop : yearBot;
  const otherYear  = chosen === a ? yearBot : yearTop;

  // Show years
  chosenYear.classList.add('visible');
  otherYear.classList.add('visible');

  // Show approximate-date notes alongside years
  const chosenNote = chosen === a ? noteTop : noteBot;
  const otherNote  = chosen === a ? noteBot : noteTop;
  if (chosenNote.textContent) chosenNote.classList.add('visible');
  if (otherNote.textContent)  otherNote.classList.add('visible');

  if (chosenIsOlder) {
    chosenCard.classList.add('correct');
    otherCard.classList.add('dimmed');
    chosenYear.classList.add('year-correct');
    otherYear.classList.add('year-dimmed');
    streak++;
    updateCounter(false);
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => loadNextPair(), 1100);
  } else {
    chosenCard.classList.add('wrong');
    otherCard.classList.add('correct');
    chosenYear.classList.add('year-wrong');
    otherYear.classList.add('year-correct');

    savedStreak = streak;
    usedPairs.add(pairKey(a, b));
    addRecent(a, b);

    setTimeout(() => {
      showFact(chosen);
    }, 1800);
  }
}

function loadNextPair() {
  const pair = nextPair();
  cardTop.classList.add('card-exit-up');
  cardBottom.classList.add('card-exit-down');
  setTimeout(() => {
    renderPair(pair, true);
  }, 300);
}

// Init
buildDeck();
renderPair(nextPair(), false);

const splash = document.getElementById('splash');
const splashSub = document.getElementById('splash-sub');
const langSelect = document.getElementById('lang-select');

// Splash → lang select
splash.addEventListener('click', () => {
  if (getComputedStyle(splashSub).opacity < 0.5) return;
  splash.classList.add('hide');
  setTimeout(() => {
    splash.remove();
    langSelect.classList.add('visible');
  }, 500);
});

// Lang select → game
function chooseLang(l) {
  langSelect.classList.add('hide');
  setLang(l);
  setTimeout(() => {
    langSelect.remove();
    document.getElementById('app').classList.add('ready');
  }, 400);
}

cardTop.addEventListener('click', () => handleTap(currentPair[0]));
cardBottom.addEventListener('click', () => handleTap(currentPair[1]));
</script>
