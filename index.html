<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Who's Older?</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F5F7;
    --surface: #E8E7E7;
    --border: rgba(30,26,26,0.08);
    --text-primary: #1E1A1A;
    --text-secondary: rgba(30,26,26,0.55);
    --text-hint: rgba(30,26,26,0.32);
    --green: #2A7A45;
    --red: #C0392B;
    --accent: rgba(30,26,26,0.04);
    --divider: rgba(30,26,26,0.12);
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #app.ready {
    opacity: 1;
  }

  /* HEADER */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 14px;
    padding-top: calc(env(safe-area-inset-top) + 18px);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  #title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  #counter-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  #lang-switcher {
    display: flex;
    gap: 2px;
    background: rgba(30,26,26,0.07);
    border-radius: 8px;
    padding: 3px;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--text-hint);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    letter-spacing: 0.05em;
    padding: 3px 7px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn.active {
    background: rgba(30,26,26,0.1);
    color: var(--text-secondary);
  }

  #counter {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    transition: color 0.4s ease;
    min-width: 18px;
    text-align: right;
  }

  #counter.bump {
    animation: counterBump 0.35s ease;
  }

  @keyframes counterBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--text-secondary); }
    100% { transform: scale(1); }
  }

  #counter.reset-anim {
    animation: counterReset 0.5s ease;
  }

  @keyframes counterReset {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* GAME AREA */
  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  /* CARDS */
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px 32px;
    cursor: pointer;
    position: relative;
    transition: background 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.03) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:active::before {
    opacity: 1;
  }

  .card.top {
    border-bottom: 1px solid var(--divider);
  }

  .card.correct {
    background: rgba(42, 122, 69, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.wrong {
    background: rgba(192, 57, 43, 0.08) !important;
    transition: background 0.3s ease;
  }

  .card.dimmed {
    opacity: 0.4;
    transition: opacity 0.3s ease;
  }

  .card-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    transition: transform 0.3s ease;
  }

  .person-name {
    font-family: 'PT Serif', serif;
    font-size: clamp(32px, 8.5vw, 48px);
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .person-hint {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .person-year {
    font-family: 'PT Serif', serif;
    font-size: clamp(40px, 11vw, 60px);
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.4s ease, color 0.3s ease;
    margin-top: 6px;
    letter-spacing: -0.02em;
  }

  .person-year.visible {
    opacity: 1;
  }

  .person-year.year-correct {
    color: var(--green);
  }

  .person-year.year-wrong {
    color: var(--red);
  }

  .person-year.year-dimmed {
    color: var(--text-hint);
  }

  #versus {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--divider);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    pointer-events: none;
    opacity: 1 !important;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    font-weight: 400;
    pointer-events: none;
  }

  /* FUN FACT OVERLAY */
  #fact-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    background: rgba(245, 245, 247, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #fact-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  #fact-name {
    font-family: 'PT Serif', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-hint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  #fact-text {
    font-family: 'PT Serif', serif;
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.6;
    text-align: center;
    max-width: 340px;
  }

  #fact-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-hint);
    margin-top: 32px;
    animation: pulseDot 1.5s ease infinite;
  }

  #fact-tap-hint {
    margin-top: 36px;
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.4); }
  }

  /* LANGUAGE SELECT SCREEN */
  #lang-select {
    position: fixed;
    inset: 0;
    z-index: 190;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #lang-select.visible {
    opacity: 1;
    pointer-events: all;
  }

  #lang-select.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  #lang-select-title {
    font-family: 'PT Serif', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .lang-select-btn {
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 200px;
    padding: 18px 0;
    border-radius: 12px;
    cursor: pointer;
    margin: 8px 0;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-select-btn:active {
    background: var(--surface);
  }

  /* SCORE SCREEN */
  #score-overlay {
    position: absolute;
    inset: 0;
    z-index: 110;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(245, 245, 247, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  #score-overlay.visible {
    opacity: 1;
  }

  #score-overlay.hide {
    animation: splashOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  #score-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #score-number {
    font-family: 'PT Serif', serif;
    font-size: clamp(64px, 18vw, 96px);
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #splash-title {
    font-family: 'PT Serif', serif;
    font-size: clamp(52px, 13vw, 76px);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: splashTitleIn 1s ease 0.4s forwards;
  }

  #splash-line {
    width: 0;
    height: 1px;
    background: var(--divider);
    margin-top: 20px;
    animation: splashLineIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
  }

  #splash-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 20px;
    animation: splashSubIn 0.6s ease 2s forwards;
  }

  #splash.hide {
    animation: splashOut 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }

  @keyframes splashTitleIn {
    to { opacity: 1; }
  }

  @keyframes splashLineIn {
    to { width: 48px; }
  }

  @keyframes splashSubIn {
    to { opacity: 1; }
  }

  @keyframes splashOut {
    to { opacity: 0; }
  }
  .card-enter {
    animation: cardEnter 0.6s ease both;
  }

  .card.top.card-enter {
    animation-delay: 0s;
  }

  .card.bottom.card-enter {
    animation-delay: 0s;
  }

  @keyframes cardEnter {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .card-exit-up {
    animation: cardFadeOut 0.35s ease both;
  }

  .card-exit-down {
    animation: cardFadeOut 0.35s ease both;
  }

  @keyframes cardFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* BOTTOM HINT */
  #bottom-hint {
    padding: 12px 24px;
    padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
    text-align: center;
    flex-shrink: 0;
  }

  #bottom-hint span {
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card.disabled {
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="splash">
  <div id="splash-title">Who's Older?</div>
  <div id="splash-line"></div>
  <div id="splash-sub">Tap to continue</div>
</div>

<div id="lang-select">
  <div id="lang-select-title">Choose language</div>
  <button class="lang-select-btn" onclick="chooseLang('en')">English</button>
  <button class="lang-select-btn" onclick="chooseLang('ru')">Русский</button>
</div>

<div id="app">
  <div id="header">
    <div></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="lang-switcher">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
      </div>
      <div id="counter-wrap">
        <span id="counter">0</span>
      </div>
    </div>
  </div>

  <div id="game">
    <div class="card top" id="card-top">
      <div class="card-inner">
        <div class="person-name" id="name-top"></div>
        <div class="person-hint" id="hint-top"></div>
        <div class="person-year" id="year-top"></div>
      </div>
    </div>

    <div id="versus">vs</div>

    <div class="card bottom" id="card-bottom">
      <div class="card-inner">
        <div class="person-name" id="name-bottom"></div>
        <div class="person-hint" id="hint-bottom"></div>
        <div class="person-year" id="year-bottom"></div>
      </div>
    </div>

    <div id="fact-overlay">
      <div id="fact-name"></div>
      <div id="fact-text"></div>
      <div id="fact-dot"></div>
      <div id="fact-tap-hint">Tap to continue</div>
    </div>

    <div id="score-overlay">
      <div id="score-label">Your streak</div>
      <div id="score-number">0</div>
    </div>
  </div>

  <div id="bottom-hint"><span>Tap the one born first</span></div>
</div>

<script>
const DB = [{"n": "Wolfgang Amadeus Mozart", "nr": "Вольфганг Амадей Моцарт", "b": 1756, "h": "composer", "hr": "композитор", "f": "He composed his first symphony at the age of 8", "fr": "Он написал свою первую симфонию в возрасте 8 лет", "c": "music"}, {"n": "Ludwig van Beethoven", "nr": "Людвиг ван Бетховен", "b": 1770, "h": "composer", "hr": "композитор", "f": "He composed his Ninth Symphony while completely deaf", "fr": "Он сочинил Девятую симфонию будучи полностью глухим", "c": "music"}, {"n": "Johann Sebastian Bach", "nr": "Иоганн Себастьян Бах", "b": 1685, "h": "composer", "hr": "композитор", "f": "He had 20 children, several of whom became notable composers", "fr": "У него было 20 детей, несколько из которых стали известными композиторами", "c": "music"}, {"n": "Frédéric Chopin", "nr": "Фредерик Шопен", "b": 1810, "h": "composer and pianist", "hr": "композитор и пианист", "f": "He performed his first public concert at age 7", "fr": "Он дал свой первый публичный концерт в возрасте 7 лет", "c": "music"}, {"n": "Franz Schubert", "nr": "Франц Шуберт", "b": 1797, "h": "composer", "hr": "композитор", "f": "He wrote over 600 songs in his short life, dying at just 31 years old", "fr": "За свою короткую жизнь он написал более 600 песен, умерев всего в 31 год", "c": "music"}, {"n": "Pyotr Tchaikovsky", "nr": "Пётр Чайковский", "b": 1840, "h": "composer", "hr": "композитор", "f": "He completed Swan Lake, Sleeping Beauty and The Nutcracker in just 8 years", "fr": "Он завершил «Лебединое озеро», «Спящую красавицу» и «Щелкунчика» всего за 8 лет", "c": "music"}, {"n": "Johannes Brahms", "nr": "Йоханнес Брамс", "b": 1833, "h": "composer", "hr": "композитор", "f": "He took 22 years to complete his First Symphony, afraid it wouldn't match Beethoven's", "fr": "Он потратил 22 года на создание своей Первой симфонии, боясь, что она не сравнится с симфониями Бетховена", "c": "music"}, {"n": "Franz Liszt", "nr": "Ференц Лист", "b": 1811, "h": "composer and pianist", "hr": "композитор и пианист", "f": "He was the first musician to perform solo recitals on stage", "fr": "Он был первым музыкантом, дававшим сольные концерты на сцене", "c": "music"}, {"n": "Antonio Vivaldi", "nr": "Антонио Вивальди", "b": 1678, "h": "composer", "hr": "композитор", "f": "He was ordained as a priest but was banned from saying Mass due to ill health", "fr": "Он был рукоположен в священники, но ему запретили служить мессу из-за слабого здоровья", "c": "music"}, {"n": "George Frideric Handel", "nr": "Георг Фридрих Гендель", "b": 1685, "h": "composer", "hr": "композитор", "f": "His anthem Zadok the Priest, written for the 1727 coronation, has been played at every British coronation since", "fr": "Его гимн «Zadok the Priest», написанный для коронации 1727 года, исполняется на каждой британской коронации", "c": "music"}, {"n": "Claude Debussy", "nr": "Клод Дебюсси", "b": 1862, "h": "composer", "hr": "композитор", "f": "He rejected the label 'impressionist' for his music, calling it a term used by imbeciles", "fr": "Он отвергал ярлык «импрессиониста» для своей музыки, называя это словом, придуманным имбецилами", "c": "music"}, {"n": "Giuseppe Verdi", "nr": "Джузеппе Верди", "b": 1813, "h": "composer and opera composer", "hr": "оперный композитор", "f": "He used his fortune to build a rest home for retired musicians in Milan, which still operates today", "fr": "На своё состояние он построил в Милане дом отдыха для вышедших на пенсию музыкантов, который работает по сей день", "c": "music"}, {"n": "Richard Wagner", "nr": "Рихард Вагнер", "b": 1813, "h": "composer and opera composer", "hr": "оперный композитор", "f": "He wrote the librettos for all of his own operas — unusually rare among composers", "fr": "Он сам писал либретто для всех своих опер — крайняя редкость среди композиторов", "c": "music"}, {"n": "Sergei Rachmaninoff", "nr": "Сергей Рахманинов", "b": 1873, "h": "composer and pianist", "hr": "композитор и пианист", "f": "His hands were so large he could span 12 piano keys with one hand", "fr": "Его руки были настолько велики, что он мог охватить одной рукой 12 клавиш пианино", "c": "music"}, {"n": "Igor Stravinsky", "nr": "Игорь Стравинский", "b": 1882, "h": "composer", "hr": "композитор", "f": "His ballet The Rite of Spring caused a riot in the audience at its 1913 premiere in Paris", "fr": "Его балет «Весна священная» вызвал беспорядки в зале на премьере в Париже в 1913 году", "c": "music"}, {"n": "Giacomo Puccini", "nr": "Джакомо Пуччини", "b": 1858, "h": "opera composer", "hr": "оперный композитор", "f": "He died before finishing Turandot — its premiere ended where he stopped, with the conductor turning to the audience", "fr": "Он умер, не закончив «Турандот» — на премьере дирижёр остановил оркестр там, где остановился композитор, и повернулся к зрителям", "c": "music"}, {"n": "Robert Schumann", "nr": "Роберт Шуман", "b": 1810, "h": "composer and pianist", "hr": "композитор и пианист", "f": "He permanently injured his right hand trying to strengthen his fingers with a mechanical device", "fr": "Он навсегда повредил правую руку, пытаясь укрепить пальцы с помощью механического устройства", "c": "music"}, {"n": "Edvard Grieg", "nr": "Эдвард Григ", "b": 1843, "h": "composer", "hr": "композитор", "f": "His Piano Concerto in A minor is one of the most performed concertos in the classical repertoire", "fr": "Его Фортепианный концерт ля минор — один из самых исполняемых концертов в классическом репертуаре", "c": "music"}, {"n": "Antonín Dvořák", "nr": "Антонин Дворжак", "b": 1841, "h": "composer", "hr": "композитор", "f": "He was a passionate train enthusiast who spent his free time at Prague's railway station spotting locomotives", "fr": "Он был страстным любителем поездов и в свободное время наблюдал за паровозами на пражском вокзале", "c": "music"}, {"n": "Louis Armstrong", "nr": "Луи Армстронг", "b": 1901, "h": "jazz musician and trumpeter", "hr": "джазовый музыкант и трубач", "f": "He wore a Star of David pendant his entire life, honouring the Jewish family who helped him as a child", "fr": "Всю жизнь он носил звезду Давида в память о еврейской семье, которая помогла ему в детстве", "c": "music"}, {"n": "Miles Davis", "nr": "Майлс Дэвис", "b": 1926, "h": "jazz musician and trumpeter", "hr": "джазовый музыкант и трубач", "f": "His album Kind of Blue is the best-selling jazz album of all time", "fr": "Его альбом Kind of Blue является самым продаваемым джазовым альбомом всех времён", "c": "music"}, {"n": "Duke Ellington", "nr": "Дюк Эллингтон", "b": 1899, "h": "jazz musician and composer", "hr": "джазовый музыкант и композитор", "f": "He composed over 3,000 songs in his career and performed almost every night for decades", "fr": "За свою карьеру он сочинил более 3000 песен и выступал почти каждую ночь на протяжении десятилетий", "c": "music"}, {"n": "Ella Fitzgerald", "nr": "Элла Фицджеральд", "b": 1917, "h": "jazz singer", "hr": "джазовая певица", "f": "She won 13 Grammy Awards and recorded more than 200 albums throughout her career", "fr": "Она завоевала 13 премий «Грэмми» и записала более 200 альбомов за свою карьеру", "c": "music"}, {"n": "John Coltrane", "nr": "Джон Колтрейн", "b": 1926, "h": "jazz musician and saxophonist", "hr": "джазовый музыкант и саксофонист", "f": "He practiced saxophone so obsessively that he would fall asleep with it still in his mouth", "fr": "Он так фанатично практиковался на саксофоне, что засыпал с инструментом во рту", "c": "music"}, {"n": "Elvis Presley", "nr": "Элвис Пресли", "b": 1935, "h": "singer and rock musician", "hr": "певец и рок-музыкант", "f": "He never performed outside North America", "fr": "Он никогда не выступал за пределами Северной Америки", "c": "music"}, {"n": "John Lennon", "nr": "Джон Леннон", "b": 1940, "h": "singer and songwriter", "hr": "певец и автор песен", "f": "He co-wrote over 180 songs with Paul McCartney", "fr": "Он совместно написал более 180 песен с Полом Маккартни", "c": "music"}, {"n": "Freddie Mercury", "nr": "Фредди М orge Harrison to play it", "fr": "Он познакомил западную аудиторию с ситаром и обучил Джорджа Харрисона игре на нём", "c": "music"}, {"n": "Miriam Makeba", "nr": "Мириам Макеба", "b": 1932, "h": "singer", "hr": "певица", "f": "She was exiled from South Africa for 31 years for her anti-apartheid activism", "fr": "Она была в изгнании из ЮАР 31 год за борьбу с апартеидом", "c": "music"}, {"n": "Fela Kuti", "nr": "Фела Кути", "b": 1938, "h": "singer and musician", "hr": "певец и музыкант", "f": "He was arrested over 200 times by the Nigerian government for his political activism", "fr": "Нигерийское правительство арестовывало его более 200 раз за политический активизм", "c": "music"}, {"n": "Brian Eno", "nr": "Брайан Ино", "b": 1948, "h": "musician and music producer", "hr": "музыкант и музыкальный продюсер", "f": "He coined the term 'ambient music' and helped shape the sound of U2, David Bowie and Talking Heads", "fr": "Он придумал термин «эмбиент-музыка» и помог сформировать звук U2, Дэвида Боуи и Talking Heads", "c": "music"}, {"n": "George Gershwin", "nr": "Джордж Гершвин", "b": 1898, "h": "composer", "hr": "композитор", "f": "He died of a brain tumor at just 38, leaving behind Rhapsody in Blue and Porgy and Bess", "fr": "Он умер от опухоли мозга всего в 38 лет, оставив после себя «Рапсодию в стиле блюз» и «Порги и Бесс»", "c": "music"}, {"n": "Camille Saint-Saëns", "nr": "Камиль Сен-Санс", "b": 1835, "h": "composer", "hr": "композитор", "f": "He composed Carnival of the Animals but refused to publish it during his lifetime, fearing it was too frivolous", "fr": "Он сочинил «Карнавал животных», но отказался публиковать его при жизни, считая слишком легкомысленным", "c": "music"}, {"n": "Maurice Ravel", "nr": "Морис Равель", "b": 1875, "h": "composer", "hr": "композитор", "f": "He orchestrated Mussorgsky's Pictures at an Exhibition — the orchestral version is now more famous than the original", "fr": "Он оркестровал «Картинки с выставки» Мусоргского — оркестровая верс orming in New York", "fr": "Он был одним из создателей бибопа, однако его стиль был настолько необычен, что его временно лишили права выступать в Нью-Йорке", "c": "music"}, {"n": "Charlie Parker", "nr": "Чарли Паркер", "b": 1920, "h": "jazz musician and saxophonist", "hr": "джазовый музыкант и саксофонист", "f": "He earned the nickname 'Bird' and revolutionised jazz with his speed and harmonic complexity", "fr": "Он получил прозвище «Птица» и произвёл революцию в джазе своей скоростью и гармонической сложностью", "c": "music"}, {"n": "Teresa Teng", "nr": "Тереза Тенг", "b": 1953, "h": "singer", "hr": "певица", "f": "Her music was banned in China for years yet she was adored by millions across Asia", "fr": "Её музыка была запрещена в Китае, однако она была обожаема миллионами по всей Азии", "c": "music"}, {"n": "AR Rahman", "nr": "А. Р. Рахман", "b": 1967, "h": "composer and music producer", "hr": "композитор и музыкальный продюсер", "f": "He composed the music for Slumdog Millionaire and won two Academy Awards for it", "fr": "Он написал музыку к «Миллионеру из трущоб» и получил за неё две премии «Оскар»", "c": "music"}, {"n": "Celia Cruz", "nr": "Селия Крус", "b": 1925, "h": "singer", "hr": "певица", "f": "Known as the Queen of Salsa, she recorded more than 70 albums over her career", "fr": "Известная как «Королева сальсы», она записала более 70 альбомов за свою карьеру", "c": "music"}, {"n": "Shakira", "nr": "Шакира", "b": 1977, "h": "singer and songwriter", "hr": "певица и автор песен", "f": "She is the most followed Latin artist on social media and speaks four languages fluently", "fr": "Она самый популярный латиноамериканский артист в социальных сетях и свободно говорит на четырёх языках", "c": "music"}, {"n": "Sergei Prokofiev", "nr": "Сергей Прокофьев", "b": 1891, "h": "composer", "hr": "композитор", "f": "He composed Peter and the Wolf specifically to introduce children to orchestral instruments", "fr": "Он сочинил «Петю и волка» специально для того, чтобы по icist", "hr": "физик", "f": "During the Manhattan Project he amused himself by picking the locks on secret filing cabinets and leaving notes inside", "fr": "Во время Манхэттенского проекта он развлекался, вскрывая секретные сейфы и оставляя в них записки", "c": "science"}, {"n": "Max Planck", "nr": "Макс Планк", "b": 1858, "h": "physicist", "hr": "физик", "f": "He was an accomplished musician who played piano, organ and cello, and even composed an opera in his youth", "fr": "Он был прекрасным музыкантом — играл на фортепиано, органе и виолончели, и даже сочинил оперу в юности", "c": "science"}, {"n": "Niels Bohr", "nr": "Нильс Бор", "b": 1885, "h": "physicist", "hr": "физик", "f": "During the Nazi occupation of Denmark he dissolved two gold Nobel Prize medals in acid to hide them — and recovered the gold after the war", "fr": "Во время нацистской оккупации Дании он растворил две золотые нобелевские медали в кислоте, чтобы их спрятать, и восстановил золото после войны", "c": "science"}, {"n": "Leonhard Euler", "nr": "Леонард Эйлер", "b": 1707, "h": "mathematician", "hr": "математик", "f": "He continued producing groundbreaking mathematics for 17 years after going completely blind", "fr": "Он продолжал создавать выдающиеся математические работы ещё 17 лет после того, как полностью ослеп", "c": "science"}, {"n": "Carl Friedrich Gauss", "nr": "Карл Фридрих Гаусс", "b": 1777, "h": "mathematician", "hr": "математик", "f": "He reportedly corrected his father's arithmetic at age 3 and summed all integers from 1 to 100 in seconds at age 10", "fr": "По легенде, он исправлял арифметические ошибки отца в 3 года, а в 10 лет мгновенно сложил все числа от 1 до 100", "c": "science"}, {"n": "Ada Lovelace", "nr": "Ада Лавлейс", "b": 1815, "h": "mathematician", "hr": "математик", "f": "She wrote the first algorithm intended for a machine — making her the first computer programmer", "fr": "Она написала первый алгоритм, предназначенный для машины — став первым программистом в истории", остояние на учреждение Нобелевских премий", "c": "science"}, {"n": "Thomas Edison", "nr": "Томас Эдисон", "b": 1847, "h": "inventor", "hr": "изобретатель", "f": "He held 1,093 patents — more than any other inventor of his era", "fr": "Он получил 1093 патента — больше, чем любой другой изобретатель его эпохи", "c": "science"}, {"n": "Alexander Graham Bell", "nr": "Александр Грэм Белл", "b": 1847, "h": "inventor", "hr": "изобретатель", "f": "He invented the telephone in 1876", "fr": "В 1876 году он изобрёл телефон", "c": "science"}, {"n": "Johannes Gutenberg", "nr": "Йоханнес Гутенберг", "b": 1400, "h": "inventor", "hr": "изобретатель", "f": "His printing press using movable type is considered one of the most influential inventions in human history", "fr": "Его печатный станок с подвижным шрифтом считается одним из самых влиятельных изобретений в истории человечества", "c": "science"}, {"n": "James Watt", "nr": "Джеймс Уатт", "b": 1736, "h": "inventor", "hr": "изобретатель", "f": "The unit of power — the watt — is named in his honour", "fr": "Единица мощности «ватт» названа в его честь", "c": "science"}, {"n": "Nicolaus Copernicus", "nr": "Николай Коперник", "b": 1473, "h": "astronomer", "hr": "астроном", "f": "He first proposed that the Earth orbits the Sun, not the other way around — a revolutionary idea that got others burned at the stake", "fr": "Он первым предположил, что Земля вращается вокруг Солнца, а не наоборот — идея, за которую других сжигали на костре", "c": "science"}, {"n": "Johannes Kepler", "nr": "Йоханнес Кеплер", "b": 1571, "h": "astronomer", "hr": "астроном", "f": "He calculated the exact laws of planetary motion while his mother was on trial for witchcraft", "fr": "Он вычислял точные законы движения планет, пока его мать находилась под судом по обвинению в колдовстве", "c": "science"}, {"n": "Hippocrates", "nr": "Гиппократ", "b": -460, "h": "physician", "hr": "врач", "f": "The Hippocratic Oath taken by doctors is named after him", "fr": "Клятва Гиппократа, которую произносят врачи, названа в его честь", "c": "science"}, {"n": "Ibn Sina (Avicenna)", "nr": "Ибн Сина (Авиценна)", "b": 980, "h": "physician and philosopher", "hr": "врач и философ", "f": "His medical encyclopedia The Canon of Medicine was a standard textbook in European universities for 600 years", "fr": "Его медицинская энциклопедия «Канон врачебной науки» была стандартным учебником в европейских университетах на протяжении 600 лет", "c": "science"}, {"n": "Alexander Fleming", "nr": "Александр Флеминг", "b": 1881, "h": "biologist", "hr": "врач и биолог", "f": "He discovered penicillin by accident when he noticed mould killing bacteria in a contaminated petri dish", "fr": "Он открыл пенициллин случайно, заметив, как плесень уничтожает бактерии в заражённой чашке Петри", "c": "science"}, {"n": "Pythagoras", "nr": "Пифагор", "b": -570, "h": "mathematician", "hr": "математик", "f": "He founded a secretive religious society that worshipped numbers", "fr": "Он основал тайное религиозное общество, поклонявшееся числам", "c": "science"}, {"n": "Archimedes", "nr": "Архимед", "b": -287, "h": "mathematician and inventor", "hr": "математик и изобретатель", "f": "He reportedly discovered his famous principle of buoyancy while taking a bath", "fr": "По легенде, он открыл знаменитый закон вытеснения тел, принимая ванну", "c": "science"}, {"n": "Blaise Pascal", "nr": "Блез Паскаль", "b": 1623, "h": "mathematician and inventor", "hr": "математик и изобретатель", "f": "He invented one of the first mechanical calculators at age 18", "fr": "Он изобрёл один из первых механических калькуляторов в возрасте 18 лет", "c": "science"}, {"n": "René Descartes", "nr": "Рене Декарт", "b": 1596, "h": "mathematician and philosopher", "hr": "математик и философ", "f": "He stayed in bed until noon every day, using mornings for thinking", "fr": "Каждый день он оставался в постели до полудня, используя утренние часы для размышлений", "c": "philosophy"}, {"n": "Sigmund Freud", "nr": форд", "b": 1871, "h": "physicist", "hr": "физик", "f": "He discovered that atoms are mostly empty space — upending the prevailing model of the atom overnight", "fr": "Он открыл, что атомы почти полностью состоят из пустого пространства — это перевернуло господствующую модель атома", "c": "science"}, {"n": "James Clerk Maxwell", "nr": "Джеймс Клерк Максвелл", "b": 1831, "h": "physicist", "hr": "физик", "f": "His equations predicting electromagnetic waves were the foundation for radio, television and mobile phones", "fr": "Его уравнения, предсказывавшие электромагнитные волны, стали основой для радио, телевидения и мобильных телефонов", "c": "science"}, {"n": "Carl Linnaeus", "nr": "Карл Линней", "b": 1707, "h": "biologist", "hr": "биолог", "f": "He created the system of classifying all living things that scientists still use today", "fr": "Он создал систему классификации всех живых организмов, которой учёные пользуются по сей день", "c": "science"}, {"n": "Francis Crick", "nr": "Фрэнсис Крик", "b": 1916, "h": "biologist", "hr": "биолог", "f": "He and Watson discovered the double helix structure of DNA in 1953 — partly using data taken without permission from Rosalind Franklin", "fr": "Они с Уотсоном открыли структуру двойной спирали ДНК в 1953 году, частично используя данные, взятые без ведома Розалинд Франклин", "c": "science"}, {"n": "James Watson", "nr": "Джеймс Уотсон", "b": 1928, "h": "biologist", "hr": "биолог", "f": "He co-discovered DNA's double helix structure at age 25 — one of the youngest Nobel laureates in science", "fr": "Он совместно открыл структуру двойной спирали ДНК в 25 лет — один из самых молодых лауреатов Нобелевской премии по науке", "c": "science"}, {"n": "Edward Jenner", "nr": "Эдвард Дженнер", "b": 1749, "h": "physician", "hr": "врач", "f": "He created the world's first vaccine — for smallpox — by injecting a boy with cowpox material in 1796", "fr": "Он создал первую в мире вакцину — от оспы — введя мальчику коровью оспу в 1796 году", "c": "science"}, {"n": "Joseph Lister", "nr": "Джозеф Листер", "b": 1827, "h": "physician", "hr": "врач", "f": "He introduced antiseptic surgery, reducing surgical death rates from over 40% to under 2%", "fr": "Он внедрил антисептическую хирургию, снизив смертность после операций с более 40% до менее 2%", "c": "science"}, {"n": "Linus Pauling", "nr": "Лайнус Полинг", "b": 1901, "h": "chemist", "hr": "химик", "f": "He is the only person to have won two unshared Nobel Prizes — one in Chemistry and one for Peace", "fr": "Он единственный человек, получивший две Нобелевские премии единолично — по химии и премию мира", "c": "science"}, {"n": "Al-Khwarizmi", "nr": "Аль-Хорезми", "b": 780, "h": "mathematician", "hr": "математик", "f": "The word 'algebra' comes from the title of his book, and the word 'algorithm' is derived from his name", "fr": "Слово «алгебра» происходит из названия его книги, а слово «алгоритм» — от его имени", "c": "science"}, {"n": "Omar Khayyam", "nr": "Омар Хайям", "b": 1048, "h": "mathematician", "hr": "поэт и математик", "f": "While famous in the West as a poet, in the East he was celebrated primarily as a brilliant mathematician and astronomer", "fr": "На Западе он известен как поэт, но на Востоке его прославляли прежде всего как блестящего математика и астронома", "c": "science"}, {"n": "Jane Goodall", "nr": "Джейн Гудолл", "b": 1934, "h": "biologist", "hr": "биолог", "f": "She named the chimpanzees she studied, which was controversial in science at the time", "fr": "Она давала шимпанзе имена — это было спорно с научной точки зрения в то время", "c": "science"}, {"n": "Carl Sagan", "nr": "Карл Саган", "b": 1934, "h": "astronomer", "hr": "астроном", "f": "He co-wrote and narrated the TV series Cosmos, watched by 500 million people worldwide", "fr": "Он стал соавтором и ведущим телесериала «Космос», который посмотрели 500 миллионов человек", "c": "science"}, {"n": "Leonardo da Vinci", "nr": "Леонардо да Винчи", "b": 1452, "h": "artist and inventor", "hr": "художник и изобретатель", "f": "He wrote his notebooks in mirror script, from right to left", "fr": "Он писал свои дневники зеркальным шрифтом, справа налево", "c": "science"}, {"n": "Gottfried Wilhelm Leibniz", "nr": "Готфрид Вильгельм Лейбниц", "b": 1646, "h": "mathematician and philosopher", "hr": "математик и философ", "f": "He and Newton invented calculus independently — their dispute over priority became one of the most bitter in scientific history", "fr": "Он и Ньютон изобрели математический анализ независимо — их спор о приоритете стал одним из самых острых в истории науки", "c": "science"}, {"n": "Benjamin Franklin", "nr": "Бенджамин Франклин", "b": 1706, "h": "inventor and statesman", "hr": "изобретатель и государственный деятель", "f": "He discovered that lightning is electricity by flying a kite in a storm", "fr": "Он доказал, что молния — это электричество, запустив змея во время грозы", "c": "politics"}, {"n": "Edwin Hubble", "nr": "Эдвин Хаббл", "b": 1889, "h": "astronomer", "hr": "астроном", "f": "He proved that the universe extends far beyond the Milky Way and that it is expanding — inspiring the theory of the Big Bang", "fr": "Он доказал, что вселенная простирается далеко за пределы Млечного Пути и расширяется — это вдохновило теорию Большого взрыва", "c": "science"}, {"n": "Tycho Brahe", "nr": "Тихо Браге", "b": 1546, "h": "astronomer", "hr": "астроном", "f": "He lost part of his nose in a sword duel over a mathematical dispute and wore a metal prosthetic for the rest of his life", "fr": "Он потерял часть носа на дуэли из-за математического спора и всю оставшуюся жизнь носил металлический протез", "c": "science"}, {"n": "Alexander von Humboldt", "nr": "Александр фон Гумбольдт", "b": 1769, "h": "naturalist", "hr": "натуралист и путешественник", "f": "Darwin called him the greatest scientific traveller who ever lived", "fr": "Дарвин называл его величайшим научным путешественником, когда-либо жившим на свете", "c": "science"}, {"n": "Charles Lyell", "nr": "Чарльз Лайель", "b": 1797, "h": "geologist", "hr": "геолог", "f": "His principle that geological change happens slowly over millions of years profoundly influenced Charles Darwin", "fr": "Его принцип о том, что геологические изменения происходят медленно на протяжении миллионов лет, глубоко повлиял на Чарльза Дарвина", "c": "science"}, {"n": "Euclid", "nr": "Евклид", "b": -300, "h": "mathematician", "hr": "математик", "f": "His book Elements, written around 300 BC, was used as a mathematics textbook for over 2,000 years", "fr": "Его книга «Начала», написанная около 300 года до н.э., использовалась как учебник математики более 2000 лет", "c": "science"}, {"n": "Fibonacci", "nr": "Фибоначчи", "b": 1170, "h": "mathematician", "hr": "математик", "f": "He introduced the Hindu-Arabic numeral system — including the number zero — to medieval Europe", "fr": "Он познакомил средневековую Европу с индо-арабской системой счисления, включая ноль", "c": "science"}, {"n": "Emmy Noether", "nr": "Эмми Нётер", "b": 1882, "h": "mathematician", "hr": "математик", "f": "Einstein called her the most significant creative mathematical genius thus far produced", "fr": "Эйнштейн назвал её самым значительным творческим математическим гением, которого породило человечество", "c": "science"}, {"n": "Florence Nightingale", "nr": "Флоренс Найтингейл", "b": 1820, "h": "physician and reformer", "hr": "физик и реформатор", "f": "She is considered the founder of modern nursing", "fr": "Она считается основательницей современного сестринского дела", "c": "science"}, {"n": "Erwin Schrödinger", "nr": "Эрвин Шрёдингер", "b": 1887, "h": "physicist", "hr": "физик", "f": "His famous thought experiment about a cat in a box is one of the most cited in physics", "fr": "Его знаменитый мысленный эксперимент с котом — один из самых цитируемых в физике", "c": "science"}, {"n": "Werner Heisenberg", "nr": "Вернер Гейзенберг", "b": 1901, "h": "physicist", "hr": "физик", "f": "His uncertainty principle states that you can never simultaneously know both the exact position and speed of a particle", "fr": "Его принцип неопределённости гласит, что нельзя одновременно точно знать и положение, и скорость частицы", "c": "science"}, {"n": "Enrico Fermi", "nr": "Энрико Ферми", "b": 1901, "h": "physicist", "hr": "физик", "f": "He built the world's first nuclear reactor in a squash court under a football stadium in Chicago in 1942", "fr": "В 1942 году он построил первый в мире ядерный реактор на площадке для сквоша под трибунами стадиона в Чикаго", "c": "science"}, {"n": "Srinivasa Ramanujan", "nr": "Сриниваса Рамануджан", "b": 1887, "h": "mathematician", "hr": "математик", "f": "He had almost no formal training in mathematics", "fr": "Он практически не получал формального математического образования", "c": "science"}, {"n": "Rosalind Franklin", "nr": "Розалинд Франклин", "b": 1920, "h": "biologist and chemist", "hr": "биолог и химик", "f": "Her X-ray photograph of DNA was used by Watson and Crick without her knowledge to determine its double helix structure", "fr": "Её рентгеновская фотография ДНК была использована Уотсоном и Криком без её ведома для определения структуры двойной спирали", "c": "science"}, {"n": "Michelangelo", "nr": "Микеланджело", "b": 1475, "h": "sculptor", "hr": "живописец и скульптор", "f": "He painted the Sistine Chapel ceiling lying on his back over four years", "fr": "Он расписал потолок Сикстинской капеллы лёжа на спине на протяжении четырёх лет", "c": "art"}, {"n": "Raphael", "nr": "Рафаэль", "b": 1483, "h": "painter", "hr": "живописец", "f": "He died on his 37th birthday — the same day he was born — leaving his greatest work, the Transfiguration, unfinished", "fr": "Он умер в день своего 37-летия — в тот же день, в который родился — оставив незаконченным своё величайшее произведение «Преображение»", "c": "art"}, {"n": "Caravaggio", "nr": "Караваджо", "b": 1571, "h": "painter", "hr": "живописец", "f": "He killed a man in a street brawl in 1606 and spent the rest of his life as a fugitive, continuing to paint masterpieces in exile", "fr": "В 1606 году он убил человека в уличной драке и провёл остаток жизни в бегах, продолжая создавать шедевры в изгнании", "c": "art"}, {"n": "Rembrandt", "nr": "Рембрандт", "b": 1606, "h": "painter", "hr": "живописец", "f": "He created over 90 self-portraits throughout his life", "fr": "За свою жизнь он создал более 90 автопортретов", "c": "art"}, {"n": "Jan Vermeer", "nr": "Ян Вермеер", "b": 1632, "h": "painter", "hr": "живописец", "f": "Only about 36 of his paintings survive — he is known as the Sphinx of Delft because so little is known about his life", "fr": "Сохранилось лишь около 36 его картин — его называют «Дельфтским сфинксом», поскольку о его жизни известно очень мало", "c": "art"}, {"n": "Peter Paul Rubens", "nr": "Питер Пауль Рубенс", "b": 1577, "h": "painter", "hr": "живописец", "f": "He ran one of the most successful art studios in Europe and was also a diplomat who negotiated peace between England and Spain", "fr": "Он руководил одной из самых успешных художественных мастерских в Европе и был дипломатом, участвовавшим в мирных переговорах между Англией и Испанией", "c": "art"}, {"n": "Albrecht Dürer", "nr": "Альбрехт Дюрер", "b": 1471, "h": "painter and engraver", "hr": "живописец и гравёр", "f": "He was the first major artist north of the Alps to fully embrace the ideas of the Italian Renaissance", "fr": "Он был первым крупным художником к северу от Альп, полностью воспринявшим идеи итальянского Ренессанса", "c": "art"}, {"n": "Sandro Botticelli", "nr": "Сандро Боттичелли", "b": 1445, "h": "painter", "hr": "живописец", "f": "His masterpiece The Birth of Venus was one of the first large-scale paintings of a non-religious subject since antiquity", "fr": "Его шедевр «Рождение Венеры» стал одной из первых крупноформатных картин нерелигиозного содержания со времён античности", "c": "art"}, {"n": "El Greco", "nr": "Эль Греко", "b": 1541, "h": "painter", "hr": "живописец", "f": "His real name was Doménikos Theotokópoulos — El Greco simply means 'The Greek' in Spanish", "fr": "Его настоящее имя — Доменикос Теотокопулос; «Эль Греко» по-испански просто означает «Грек»", "c": "art"}, {"n": "Claude Monet", "nr": "Клод Моне", "b": 1840, "h": "painter", "hr": "живописец", "f": "He painted his famous Water Lilies series while suffering from cataracts", "fr": "Он писал знаменитые «Кувшинки», страдая от катаракты", "c": "art"}, {"n": "Pierre-Auguste Renoir", "nr": "Пьер-Огюст Ренуар", "b": 1841, "h": "painter", "hr": "живописец", "f": "In his final years, crippled by arthritis, he painted by having brushes tied to his wrists", "fr": "В последние годы, страдая от артрита, он писал с привязанными к запястьям кистями", "c": "art"}, {"n": "Edgar Degas", "nr": "Эдгар Дега", "b": 1834, "h": "painter", "hr": "живописец", "f": "He is famous for painting ballet dancers but never watched ballet for pleasure — he was interested in the geometry of movement", "fr": "Он прославился картинами балерин, но никогда не ходил на балет ради удовольствия — его интересовала геометрия движения", "c": "art"}, {"n": "Édouard Manet", "nr": "Эдуард Мане", "b": 1832, "h": "painter", "hr": "живописец", "f": "His painting Le Déjeuner sur l'herbe caused a massive scandal in 1863 for depicting a nude woman picnicking with clothed men", "fr": "Его картина «Завтрак на траве» вызвала огромный скандал в 1863 году, изобразив обнажённую женщину на пикнике с одетыми мужчинами", "c": "art"}, {"n": "Camille Pissarro", "nr": "Камиль Писсарро", "b": 1830, "h": "painter", "hr": "живописец", "f": "He was the only artist to exhibit in all eight of the Impressionist exhibitions", "fr": "Он единственный художник, участвовавший во всех восьми выставках импрессионистов", "c": "art"}, {"n": "Vincent van Gogh", "nr": "Винсент ван Гог", "b": 1853, "h": "painter", "hr": "живописец", "f": "He sold only one painting during his lifetime", "fr": "За всю жизнь он продал лишь одну картину", "c": "art"}, {"n": "Paul Gauguin", "nr": "Поль Гоген", "b": 1848, "h": "painter", "hr": "живописец", "f": "He abandoned his career as a stockbroker and his family at age 35 to become a full-time painter in Tahiti", "fr": "В 35 лет он бросил карьеру биржевого маклера и семью, чтобы стать художником и уехать на Таити", "c": "art"}, {"n": "Paul Cézanne", "nr": "Поль Сезанн", "b": 1839, "h": "painter", "hr": "живописец", "f": "He was rejected from the prestigious École des Beaux-Arts and was largely unknown during his lifetime — his work inspired Picasso and Matisse", "fr": "Его отвергли в престижную École des Beaux-Arts, и при жизни он оставался малоизвестным — его работы вдохновили Пикассо и Матисса", "c": "art"}, {"n": "Georges Seurat", "nr": "Жорж Сёра", "b": 1859, "h": "painter", "hr": "живописец", "f": "He invented Pointillism — painting entirely with tiny dots of pure color that blend in the viewer's eye", "fr": "Он изобрёл пуантилизм — технику живописи крошечными точками чистого цвета, которые смешиваются в глазу зрителя", "c": "art"}, {"n": "Henri de Toulouse-Lautrec", "nr": "Анри де Тулуз-Лотрек", "b": 1864, "h": "painter", "hr": "живописец", "f": "He was just 4 feet 8 inches tall due to a genetic disorder and broken legs in childhood", "fr": "Из-за генетического заболевания и переломов ног в детстве его рост составлял всего 152 сантиметра", "c": "art"}, {"n": "Pablo Picasso", "nr": "Пабло Пикассо", "b": 1881, "h": "painter and sculptor", "hr": "живописец и скульптор", "f": "He co-founded the Cubist movement and created over 20,000 works", "fr": "Он стал соучредителем кубизма и создал более 20 000 работ", "c": "art"}, {"n": "Salvador Dalí", "nr": "Сальвадор Дали", "b": 1904, "h": "painter", "hr": "живописец", "f": "He designed the Chupa Chups lollipop logo", "fr": "Он разработал логотип леденцов Chupa Chups", "c": "art"}, {"n": "Henri Matisse", "nr": "Анри Матисс", "b": 1869, "h": "painter", "hr": "живописец", "f": "In his eighties, too ill to paint, he created giant paper cut-out artworks from a wheelchair — calling it 'drawing with scissors'", "fr": "В восьмидесятилетнем возрасте, уже не способный рисовать, он создавал огромные коллажи из бумаги в инвалидном кресле — называя это «рисованием ножницами»", "c": "art"}, {"n": "Wassily Kandinsky", "nr": "Василий Кандинский", "b": 1866, "h": "painter", "hr": "живописец", "f": "He is widely credited as the creator of the first truly abstract painting — he believed colors could produce sounds in the viewer's mind", "fr": "Ему широко приписывают создание первой по-настоящему абстрактной картины — он считал, что цвета способны вызывать у зрителя звуки", "c": "art"}, {"n": "Piet Mondrian", "nr": "Пит Мондриан", "b": 1872, "h": "painter", "hr": "живописец", "f": "He was so devoted to his geometric style that he once refused to work with an artist who used diagonal lines instead of vertical and horizontal", "fr": "Он был настолько предан своему геометрическому стилю, что однажды отказался работать с художником, использовавшим диагональные линии вместо вертикальных и горизонтальных", "c": "art"}, {"n": "Marc Chagall", "nr": "Марк Шагал", "b": 1887, "h": "painter", "hr": "живописец", "f": "Picasso said of him: 'When Matisse dies, Chagall will be the only painter left who understands what color really is'", "fr": "Пикассо сказал о нём: «Когда умрёт Матисс, Шагал останется единственным художником, по-настоящему понимающим цвет»", "c": "art"}, {"n": "Gustav Klimt", "nr": "Густав Климт", "b": 1862, "h": "painter", "hr": "живописец", "f": "His painting Portrait of Adele Bloch-Bauer was sold in 2006 for $135 million — at the time the highest price ever paid for a painting", "fr": "В 2006 году его картина «Портрет Адели Блох-Бауэр» была продана за 135 миллионов долларов — на тот момент это была рекордная цена за картину", "c": "art"}, {"n": "Edvard Munch", "nr": "Эдвард Мунк", "b": 1863, "h": "painter", "hr": "живописец", "f": "The Scream exists in four versions — two paintings and two pastels", "fr": "«Крик» существует в четырёх версиях — две картины и два пастеля", "c": "art"}, {"n": "Frida Kahlo", "nr": "Фрида Кало", "b": 1907, "h": "painter", "hr": "живописец", "f": "She began painting while recovering from a serious bus accident at age 18", "fr": "Она начала рисовать в 18 лет, восстанавливаясь после тяжёлой аварии", "c": "art"}, {"n": "Diego Rivera", "nr": "Диего Ривера", "b": 1886, "h": "painter and muralist", "hr": "живописец и монументалист", "f": "He and Frida Kahlo divorced and then remarried — their relationship was described as a union of two eagles", "fr": "Он с Фридой Кало развёлся, а затем женился на ней снова — их отношения называли союзом двух орлов", "c": "art"}, {"n": "Auguste Rodin", "nr": "Огюст Роден", "b": 1840, "h": "sculptor", "hr": "скульптор", "f": "His sculpture The Thinker was originally conceived as a portrait of Dante", "fr": "Его скульптура «Мыслитель» изначально задумывалась как портрет Данте", "c": "art"}, {"n": "Donatello", "nr": "Донателло", "b": 1386, "h": "sculptor", "hr": "скульптор", "f": "His bronze statue of David was the first free-standing nude sculpture made since antiquity", "fr": "Его бронзовая статуя Давида стала первой отдельно стоящей скульптурой обнажённой фигуры со времён античности", "c": "art"}, {"n": "Gian Lorenzo Bernini", "nr": "Джан Лоренцо Бернини", "b": 1598, "h": "sculptor and architect", "hr": "скульптор и архитектор", "f": "He designed the grand colonnade in St. Peter's Square in Rome — one of the most magnificent architectural spaces in the world", "fr": "Он спроектировал величественную колоннаду на площади Святого Петра в Риме — одно из самых грандиозных архитектурных пространств в мире", "c": "art"}, {"n": "Constantin Brâncuși", "nr": "Константин Бранкузи", "b": 1876, "h": "sculptor", "hr": "скульптор", "f": "His sculpture Bird in Space was seized by US customs in 1926 because officials refused to believe it was art", "fr": "В 1926 году американская таможня конфисковала его скульптуру «Птица в пространстве», отказавшись признавать её произведением искусства", "c": "art"}, {"n": "Alberto Giacometti", "nr": "Альберто Джакометти", "b": 1901, "h": "sculptor", "hr": "скульптор", "f": "He was so dissatisfied with his work that he reportedly destroyed most of it — he would often start the same sculpture hundreds of times", "fr": "Он был так недоволен своими работами, что по легенде уничтожал большинство из них — он мог начинать одну и ту же скульптуру сотни раз", "c": "art"}, {"n": "Andy Warhol", "nr": "Энди Уорхол", "b": 1928, "h": "artist and filmmaker", "hr": "художник и кинорежиссёр", "f": "He famously said everyone will be world-famous for 15 minutes", "fr": "Он знаменито сказал, что каждый будет знаменит 15 минут", "c": "art"}, {"n": "Jackson Pollock", "nr": "Джексон Поллок", "b": 1912, "h": "painter", "hr": "живописец", "f": "He pioneered 'drip painting' by laying canvases on the floor and dripping paint from above — he called it his way of being in the painting", "fr": "Он создал «капельную живопись», кладя холсты на пол и капая краску сверху — называя это «способом быть внутри картины»", "c": "art"}, {"n": "Mark Rothko", "nr": "Марк Ротко", "b": 1903, "h": "painter", "hr": "живописец", "f": "He reportedly cried when he heard that his monumental paintings for the Seagram Building would hang near a restaurant — and withdrew from the commission", "fr": "Он отказался от крупного заказа для ресторана в небоскрёбе Сигрэм, когда узнал, что его монументальные картины будут висеть в столовой", "c": "art"}, {"n": "René Magritte", "nr": "Рене Магритт", "b": 1898, "h": "painter", "hr": "живописец", "f": "He wore a bowler hat every day of his adult life and his paintings often featured a man in a bowler hat as a symbol of the ordinary", "fr": "Он носил котелок каждый день своей взрослой жизни, и на его картинах часто фигурирует человек в котелке как символ обыденности", "c": "art"}, {"n": "Joan Miró", "nr": "Жоан Миро", "b": 1893, "h": "painter, sculptor and printmaker", "hr": "живописец, скульптор и график", "f": "He described his paintings as 'murdering painting' — deliberately departing from all traditional artistic conventions", "fr": "Он описывал свои картины как «убийство живописи» — намеренно отступая от всех традиционных художественных условностей", "c": "art"}, {"n": "Paul Klee", "nr": "Пауль Клее", "b": 1879, "h": "painter", "hr": "живописец", "f": "He was a gifted violinist who considered music and painting equally important throughout his life", "fr": "Он был одарённым скрипачом и на протяжении всей жизни считал музыку и живопись равнозначными занятиями", "c": "art"}, {"n": "Egon Schiele", "nr": "Эгон Шиле", "b": 1890, "h": "painter", "hr": "живописец", "f": "He was briefly imprisoned for allegedly seducing a minor — the judge burned one of his drawings in court", "fr": "Он был кратковременно заключён под стражу по обвинению в совращении несовершеннолетней — судья сжёг один из его рисунков прямо в зале суда", "c": "art"}, {"n": "Georgia O'Keeffe", "nr": "Джорджия О'Киф", "b": 1887, "h": "painter", "hr": "живописец", "f": "She lived alone in the New Mexico desert for decades, becoming one of America's most iconic artists and longest-lived at age 98", "fr": "Она десятилетиями жила одна в пустыне Нью-Мексико и стала одной из самых известных американских художниц, дожив до 98 лет", "c": "art"}, {"n": "Ansel Adams", "nr": "Ансел Адамс", "b": 1902, "h": "photographer", "hr": "фотограф", "f": "He co-founded the photography group f/64 and helped establish photography as a legitimate fine art form", "fr": "Он стал соучредителем фотографической группы f/64 и помог утвердить фотографию как самостоятельный вид изобразительного искусства", "c": "art"}, {"n": "Henri Cartier-Bresson", "nr": "Анри Картье-Брессон", "b": 1908, "h": "photographer", "hr": "фотограф", "f": "He coined the phrase 'the decisive moment' — his theory that photography captures the perfect split second of any situation", "fr": "Он ввёл понятие «решающего момента» — теории о том, что фотография способна запечатлеть идеальную долю секунды любой ситуации", "c": "art"}, {"n": "Hokusai", "nr": "Хокусай", "b": 1760, "h": "painter and printmaker", "hr": "живописец и гравёр", "f": "He changed his name over 30 times throughout his life", "fr": "На протяжении жизни он менял имя более 30 раз", "c": "art"}, {"n": "Qi Baishi", "nr": "Ци Байши", "b": 1864, "h": "painter", "hr": "живописец", "f": "He did not begin studying painting seriously until he was in his late twenties — he had worked as a carpenter", "fr": "Он всерьёз занялся живописью лишь в конце двадцатых — до этого работал плотником", "c": "art"}, {"n": "Ilya Repin", "nr": "Илья Репин", "b": 1844, "h": "painter", "hr": "живописец", "f": "His monumental painting Barge Haulers on the Volga shocked Russian society by portraying the brutal conditions of ordinary workers", "fr": "Его монументальная картина «Бурлаки на Волге» потрясла российское общество, показав суровые условия труда простых людей", "c": "art"}, {"n": "Kazimir Malevich", "nr": "Казимир Малевич", "b": 1879, "h": "painter", "hr": "живописец", "f": "His Black Square — a black square on a white canvas — caused outrage when exhibited in 1915 and is considered one of art history's most radical works", "fr": "Его «Чёрный квадрат» — чёрный квадрат на белом фоне — вызвал возмущение на выставке 1915 года и считается одной из самых радикальных работ в истории искусства", "c": "art"}, {"n": "Francisco Goya", "nr": "Франсиско Гойя", "b": 1746, "h": "painter", "hr": "живописец", "f": "He became completely deaf at age 46 after a severe illness and went on to create his darkest and most powerful works", "fr": "В 46 лет он полностью оглох после тяжёлой болезни и именно тогда создал свои самые мрачные и мощные произведения", "c": "art"}, {"n": "Eugène Delacroix", "nr": "Эжен Делакруа", "b": 1798, "h": "painter", "hr": "живописец", "f": "His Liberty Leading the People became one of the most reproduced images in French history and inspired the Statue of Liberty", "fr": "Его «Свобода, ведущая народ» стала одним из самых тиражируемых образов во французской истории и вдохновила создателей Статуи Свободы", "c": "art"}, {"n": "Jacques-Louis David", "nr": "Жак-Луи Давид", "b": 1748, "h": "painter", "hr": "живописец", "f": "He was the official painter of Napoleon and orchestrated the propaganda imagery of the French Revolution", "fr": "Он был официальным художником Наполеона и организовывал пропагандистские образы Французской революции", "c": "art"}, {"n": "William Turner", "nr": "Уильям Тёрнер", "b": 1775, "h": "painter", "hr": "живописец", "f": "He allegedly had himself tied to a ship's mast during a storm so he could paint the sea from direct experience", "fr": "По легенде, он велел привязать себя к мачте во время шторма, чтобы писать море с натуры", "c": "art"}, {"n": "Ivan Aivazovsky", "nr": "Иван Айвазовский", "b": 1817, "h": "painter", "hr": "живописец", "f": "He painted over 6,000 works in his lifetime, almost all of them depicting the sea", "fr": "За свою жизнь он написал более 6000 картин, почти все из которых изображали море", "c": "art"}, {"n": "Andrei Rublev", "nr": "Андрей Рублёв", "b": 1360, "h": "icon painter", "hr": "иконописец", "f": "His icon The Trinity is considered the greatest masterpiece of Russian medieval art and a defining work of Orthodox Christianity", "fr": "Его икона «Троица» считается величайшим шедевром русского средневекового искусства и определяющим произведением православного христианства", "c": "art"}, {"n": "Coco Chanel", "nr": "Коко Шанель", "b": 1883, "h": "fashion designer", "hr": "модельер", "f": "She liberated women from the corset and introduced jersey fabric to fashion", "fr": "Она освободила женщин от корсета и ввела в моду трикотажную ткань", "c": "art"}, {"n": "Christian Dior", "nr": "Кристиан Диор", "b": 1905, "h": "fashion designer", "hr": "модельер", "f": "His 1947 'New Look' collection revolutionized fashion after World War II by reintroducing feminine silhouettes and luxury fabrics", "fr": "Его коллекция 1947 года «Новый облик» произвела революцию в моде после Второй мировой войны, вернув женственный силуэт и роскошные ткани", "c": "art"}, {"n": "Yves Saint Laurent", "nr": "Ив Сен-Лоран", "b": 1936, "h": "fashion designer", "hr": "модельер", "f": "He was the first designer to introduce the tuxedo suit for women, transforming it into a fashion staple", "fr": "Он первым из дизайнеров предложил женщинам смокинг, превратив его в модный элемент гардероба", "c": "art"}, {"n": "Giorgio Armani", "nr": "Джорджио Армани", "b": 1934, "h": "fashion designer", "hr": "модельер", "f": "He was the first designer to ban models from wearing fur on his runway — in 2007", "fr": "В 2007 году он первым из дизайнеров запретил использование меха на своих показах", "c": "art"}, {"n": "Gianni Versace", "nr": "Джанни Версаче", "b": 1946, "h": "fashion designer", "hr": "модельер", "f": "He was assassinated outside his Miami mansion in 1997 by serial killer Andrew Cunanan", "fr": "В 1997 году он был убит у своего особняка в Майами серийным убийцей Эндрю Кунананом", "c": "art"}, {"n": "Karl Lagerfeld", "nr": "Карл Лагерфельд", "b": 1933, "h": "fashion designer", "hr": "модельер", "f": "He reportedly slept only a few hours a night and worked continuously — designing for Chanel, Fendi, and his own label simultaneously", "fr": "По имеющимся данным, он спал всего несколько часов в сутки и работал непрерывно — одновременно создавая коллекции для Chanel, Fendi и собственного бренда", "c": "art"}, {"n": "Filippo Brunelleschi", "nr": "Филиппо Брунеллески", "b": 1377, "h": "architect", "hr": "архитектор", "f": "He is credited with rediscovering the mathematical rules of linear perspective — transforming how artists depict space", "fr": "Ему приписывают повторное открытие математических правил линейной перспективы — это изменило способ изображения пространства художниками", "c": "architecture"}, {"n": "Andrea Palladio", "nr": "Андреа Палладио", "b": 1508, "h": "architect", "hr": "архитектор", "f": "His architectural principles influenced Thomas Jefferson so deeply that Jefferson modelled Monticello on Palladio's designs", "fr": "Его архитектурные принципы произвели такое впечатление на Томаса Джефферсона, что тот создал Монтичелло по образцу его проектов", "c": "architecture"}, {"n": "Christopher Wren", "nr": "Кристофер Рен", "b": 1632, "h": "architect", "hr": "архитектор", "f": "He designed 52 churches in London after the Great Fire of 1666, including St Paul's Cathedral", "fr": "После Великого лондонского пожара 1666 года он спроектировал 52 церкви в Лондоне, в том числе собор Святого Павла", "c": "architecture"}, {"n": "Antoni Gaudí", "nr": "Антони Гауди", "b": 1852, "h": "architect", "hr": "архитектор", "f": "The Sagrada Família he designed has been under construction since 1882", "fr": "Спроектированный им собор Саграда Фамилия находится в строительстве с 1882 года", "c": "architecture"}, {"n": "Frank Lloyd Wright", "nr": "Фрэнк Ллойд Райт", "b": 1867, "h": "architect", "hr": "архитектор", "f": "He designed over 1,000 structures in his 70-year career", "fr": "За 70-летнюю карьеру он спроектировал более 1000 сооружений", "c": "architecture"}, {"n": "Le Corbusier", "nr": "Ле Корбюзье", "b": 1887, "h": "architect", "hr": "архитектор", "f": "He pioneered the concept of the open floor plan in modern architecture", "fr": "Он был пионером концепции открытой планировки в современной архитектуре", "c": "architecture"}, {"n": "Ludwig Mies van der Rohe", "nr": "Людвиг Мис ван дер Роэ", "b": 1886, "h": "architect", "hr": "архитектор", "f": "His famous motto 'Less is more' became the defining principle of minimalist architecture", "fr": "Его знаменитый девиз «Меньше значит больше» стал определяющим принципом минималистической архитектуры", "c": "architecture"}, {"n": "Walter Gropius", "nr": "Вальтер Гропиус", "b": 1883, "h": "architect", "hr": "архитектор", "f": "He founded the Bauhaus school of design in 1919", "fr": "В 1919 году он основал школу дизайна Баухаус", "c": "architecture"}, {"n": "Zaha Hadid", "nr": "Заха Хадид", "b": 1950, "h": "architect", "hr": "архитектор", "f": "She was the first woman to win the Pritzker Architecture Prize", "fr": "Она стала первой женщиной, получившей Притцкеровскую премию по архитектуре", "c": "architecture"}, {"n": "Renzo Piano", "nr": "Ренцо Пьяно", "b": 1937, "h": "architect", "hr": "архитектор", "f": "His Centre Pompidou in Paris was so controversial when it opened in 1977 that critics called it an oil refinery", "fr": "Его Центр Помпиду в Париже при открытии в 1977 году был настолько скандальным, что критики называли его нефтеперерабатывающим заводом", "c": "architecture"}, {"n": "Frank Gehry", "nr": "Фрэнк Гери", "b": 1929, "h": "architect", "hr": "архитектор", "f": "He designed his own house in Santa Monica by wrapping a conventional suburban home in corrugated steel and chain-link fencing", "fr": "Он спроектировал собственный дом в Санта-Монике, обернув обычный пригородный дом гофрированной сталью и сеткой-рабицей", "c": "architecture"}, {"n": "Norman Foster", "nr": "Норман Фостер", "b": 1935, "h": "architect", "hr": "архитектор", "f": "He designed the glass dome of the Reichstag in Berlin — now one of the most visited buildings in the world", "fr": "Он спроектировал стеклянный купол берлинского Рейхстага — ныне одного из самых посещаемых зданий в мире", "c": "architecture"}, {"n": "Tadao Ando", "nr": "Тадао Андо", "b": 1941, "h": "architect", "hr": "архитектор", "f": "He is entirely self-taught — he never studied architecture formally, learning by travelling and reading", "fr": "Он полностью самоучка — никогда не изучал архитектуру формально, познавая её через путешествия и книги", "c": "architecture"}, {"n": "Rem Koolhaas", "nr": "Рем Колхас", "b": 1944, "h": "architect", "hr": "архитектор", "f": "He worked as a journalist and screenwriter before becoming one of the world's most influential architects", "fr": "До того как стать одним из самых влиятельных архитекторов мира, он работал журналистом и сценаристом", "c": "architecture"}, {"n": "Santiago Calatrava", "nr": "Сантьяго Калатрава", "b": 1951, "h": "architect", "hr": "архитектор", "f": "He is both an architect and a structural engineer — his buildings are famous for resembling living organisms in motion", "fr": "Он одновременно архитектор и инженер-конструктор — его здания знамениты тем, что напоминают живые организмы в движении", "c": "architecture"}, {"n": "Oscar Niemeyer", "nr": "Оскар Нимейер", "b": 1907, "h": "architect", "hr": "архитектор", "f": "He designed the entire capital city of Brasília from scratch — it was built in just 41 months", "fr": "Он спроектировал целую столицу — Бразилиа — с нуля; она была построена всего за 41 месяц", "c": "architecture"}, {"n": "I.M. Pei", "nr": "И. М. Пей", "b": 1917, "h": "architect", "hr": "архитектор", "f": "His glass pyramid at the Louvre in Paris was initially met with public outrage — it is now one of the most loved landmarks in France", "fr": "Его стеклянная пирамида в Лувре поначалу вызвала волну общественного возмущения — сегодня она стала одной из самых любимых достопримечательностей Франции", "c": "architecture"}, {"n": "Eugène Viollet-le-Duc", "nr": "Эжен Виолле-ле-Дюк", "b": 1814, "h": "architect", "hr": "архитектор", "f": "He led the restoration of Notre-Dame de Paris and many medieval buildings — and added the famous spire that collapsed in the 2019 fire", "fr": "Он руководил реставрацией Нотр-Дама и добавил знаменитый шпиль, рухнувший во время пожара 2019 года", "c": "architecture"}, {"n": "Charles Garnier", "nr": "Шарль Гарнье", "b": 1825, "h": "architect", "hr": "архитектор", "f": "His Paris Opera House took 15 years to build and contains a hidden underground lake beneath the stage", "fr": "Его Парижская опера строилась 15 лет и содержит скрытое подземное озеро под сценой", "c": "architecture"}, {"n": "Vitruvius", "nr": "Витрувий", "b": -80, "h": "architect and writer", "hr": "архитектор и писатель", "f": "His writings describe the ideal human proportions that inspired Leonardo da Vinci's famous Vitruvian Man drawing", "fr": "Его описание идеальных пропорций человека вдохновило Леонардо да Винчи на создание знаменитого рисунка Витрувианского человека", "c": "architecture"}, {"n": "Kenzo Tange", "nr": "Кэндзо Тангэ", "b": 1913, "h": "architect", "hr": "архитектор", "f": "He designed the iconic stadiums for the 1964 Tokyo Olympics, considered masterpieces of modern architecture", "fr": "Он спроектировал знаменитые стадионы для Олимпийских игр 1964 года в Токио — признанные шедевры современной архитектуры", "c": "architecture"}, {"n": "Louis Sullivan", "nr": "Луис Салливан", "b": 1856, "h": "architect", "hr": "архитектор", "f": "He coined the phrase 'form follows function' — one of the most influential ideas in the history of architecture", "fr": "Он ввёл в обиход фразу «форма следует за функцией» — одну из самых влиятельных идей в истории архитектуры", "c": "architecture"}, {"n": "Eero Saarinen", "nr": "Ээро Сааринен", "b": 1910, "h": "architect", "hr": "архитектор", "f": "He designed the TWA Flight Center at JFK Airport to look like a bird in flight — it is now a luxury hotel", "fr": "Он спроектировал терминал TWA в аэропорту имени Кеннеди в форме птицы в полёте — сейчас там располагается роскошный отель", "c": "architecture"}, {"n": "William Shakespeare", "nr": "Уильям Шекспир", "b": 1564, "h": "playwright", "hr": "драматург", "f": "He invented over 1,700 words still used in English today", "fr": "Он ввёл в английский язык более 1700 слов, которые используются по сей день", "c": "literature"}, {"n": "Molière", "nr": "Мольер", "b": 1622, "h": "playwright", "hr": "драматург", "f": "He collapsed on stage during a performance of his play The Imaginary Invalid — ironically, about a hypochondriac — and died hours later", "fr": "Он потерял сознание прямо на сцене во время спектакля «Мнимый больной» — об ипохондрике — и умер несколько часов спустя", "c": "literature"}, {"n": "Anton Chekhov", "nr": "Антон Чехов", "b": 1860, "h": "playwright", "hr": "драматург и прозаик", "f": "He was a practising doctor throughout his writing career and said medicine was his wife while literature was his mistress", "fr": "На протяжении всей писательской карьеры он был практикующим врачом и говорил, что медицина — его жена, а литература — любовница", "c": "literature"}, {"n": "Henrik Ibsen", "nr": "Хенрик Ибсен", "b": 1828, "h": "playwright", "hr": "драматург", "f": "His last words were reportedly 'On the contrary' — spoken in response to his nurse saying he seemed a little better", "fr": "Его последними словами, по преданию, было «Напротив» — в ответ на слова медсестры о том, что ему немного лучше", "c": "literature"}, {"n": "Bertolt Brecht", "nr": "Бертольт Брехт", "b": 1898, "h": "playwright", "hr": "драматург", "f": "He fled Nazi Germany and eventually settled in the USA — but was called before the House Un-American Activities Committee in 1947", "fr": "Он бежал из нацистской Германии и в итоге осел в США — но в 1947 году его вызвали перед Комиссией по расследованию антиамериканской деятельности", "c": "literature"}, {"n": "Oscar Wilde", "nr": "Оскар Уайльд", "b": 1854, "h": "playwright and novelist", "hr": "драматург и романист", "f": "He was sentenced to two years hard labour for homosexuality and died in poverty in Paris aged 46", "fr": "Он был приговорён к двум годам каторжных работ за гомосексуализм и умер в нищете в Париже в 46 лет", "c": "literature"}, {"n": "Homer", "nr": "Гомер", "b": -800, "h": "poet", "hr": "поэт", "f": "Ancient Greeks debated whether Homer was one person or many", "fr": "Древние греки спорили, был ли Гомер одним человеком или несколькими", "c": "literature"}, {"n": "Dante Alighieri", "nr": "Данте Алигьери", "b": 1265, "h": "poet", "hr": "поэт", "f": "He wrote the Divine Comedy entirely in Italian, not Latin — revolutionary for his time", "fr": "Он написал «Божественную комедию» целиком на итальянском языке, а не на латыни — это было революционно для его времени", "c": "literature"}, {"n": "Johann Wolfgang von Goethe", "nr": "Иоганн Вольфганг фон Гёте", "b": 1749, "h": "novelist and poet", "hr": "поэт и романист", "f": "He began writing his masterpiece Faust at age 23 and completed it just before his death at 82 — it took nearly 60 years", "fr": "Он начал писать «Фауста» в 23 года и завершил его незадолго до смерти в 82 — работа заняла почти 60 лет", "c": "literature"}, {"n": "William Blake", "nr": "Уильям Блейк", "b": 1757, "h": "poet", "hr": "поэт", "f": "He claimed to have visions of angels and supernatural figures from childhood, which directly inspired his poetry and art", "fr": "С детства он утверждал, что видит ангелов и сверхъестественные существа — это напрямую вдохновляло его поэзию и искусство", "c": "literature"}, {"n": "Lord Byron", "nr": "Лорд Байрон", "b": 1788, "h": "poet", "hr": "поэт", "f": "He kept a tame bear in his college rooms at Cambridge because dogs were not allowed", "fr": "Он держал в своих университетских комнатах в Кембридже ручного медведя — потому что собак не разрешали", "c": "literature"}, {"n": "Percy Bysshe Shelley", "nr": "Перси Биши Шелли", "b": 1792, "h": "poet", "hr": "поэт", "f": "He was expelled from Oxford for co-writing a pamphlet called The Necessity of Atheism", "fr": "Его отчислили из Оксфорда за то, что он в соавторстве написал брошюру «Необходимость атеизма»", "c": "literature"}, {"n": "John Keats", "nr": "Джон Китс", "b": 1795, "h": "poet", "hr": "поэт", "f": "He trained as a surgeon but abandoned medicine for poetry — he died of tuberculosis at just 25", "fr": "Он выучился на хирурга, но бросил медицину ради поэзии — и умер от туберкулёза в 25 лет", "c": "literature"}, {"n": "Edgar Allan Poe", "nr": "Эдгар Аллан По", "b": 1809, "h": "poet", "hr": "поэт и прозаик", "f": "He married his 13-year-old cousin Virginia Clemm", "fr": "Он женился на своей тринадцатилетней двоюродной сестре Вирджинии Клемм", "c": "literature"}, {"n": "Walt Whitman", "nr": "Уолт Уитмен", "b": 1819, "h": "poet", "hr": "поэт", "f": "He self-published the first edition of Leaves of Grass in 1855 — and spent the rest of his life revising and expanding it", "fr": "Он самостоятельно опубликовал первое издание «Листьев травы» в 1855 году и провёл остаток жизни, пересматривая и дополняя его", "c": "literature"}, {"n": "Emily Dickinson", "nr": "Эмили Дикинсон", "b": 1830, "h": "poet", "hr": "поэт", "f": "She published fewer than 12 poems during her lifetime — nearly 1,800 were discovered after her death", "fr": "При жизни она опубликовала менее 12 стихотворений — почти 1800 были обнаружены после её смерти", "c": "literature"}, {"n": "Rumi", "nr": "Руми", "b": 1207, "h": "poet", "hr": "поэт", "f": "His poetry is among the best-selling in the United States", "fr": "Его стихи входят в число самых продаваемых поэтических сборников в США", "c": "literature"}, {"n": "Leo Tolstoy", "nr": "Лев Толстой", "b": 1828, "h": "novelist", "hr": "романист", "f": "He renounced his noble title and gave away his wealth in his later years", "fr": "В «Войне и мире» насчитывается более 580 персонажей", "c": "literature"}, {"n": "Fyodor Dostoevsky", "nr": "Фёдор Достоевский", "b": 1821, "h": "novelist", "hr": "романист", "f": "He was sentenced to death but pardoned at the last moment before execution", "fr": "Он был приговорён к смертной казни, но помилован в самый последний момент перед расстрелом", "c": "literature"}, {"n": "Victor Hugo", "nr": "Виктор Гюго", "b": 1802, "h": "novelist and poet", "hr": "романист и поэт", "f": "Les Misérables contains one of the longest sentences in French literature — 823 words", "fr": "«Отверженные» содержат одно из самых длинных предложений во французской литературе — 823 слова", "c": "literature"}, {"n": "Honoré de Balzac", "nr": "Оноре де Бальзак", "b": 1799, "h": "novelist", "hr": "романист", "f": "He reportedly drank up to 50 cups of strong coffee a day to fuel his marathon writing sessions", "fr": "По легенде, он выпивал до 50 чашек крепкого кофе в день, чтобы работать на марафонских ночных сессиях", "c": "literature"}, {"n": "Gustave Flaubert", "nr": "Гюстав Флобер", "b": 1821, "h": "novelist", "hr": "романист", "f": "He spent five years writing Madame Bovary, obsessively revising every sentence for rhythm and sound", "fr": "Он провёл пять лет над «Мадам Бовари», навязчиво выверяя каждую фразу ради ритма и звучания", "c": "literature"}, {"n": "Charles Dickens", "nr": "Чарльз Диккенс", "b": 1812, "h": "novelist", "hr": "романист", "f": "He published most of his novels in monthly installments in magazines", "fr": "Большинство своих романов он публиковал ежемесячными выпусками в журналах", "c": "literature"}, {"n": "Jane Austen", "nr": "Джейн Остин", "b": 1775, "h": "novelist", "hr": "романист", "f": "She published all her novels anonymously during her lifetime", "fr": "При жизни она публиковала все свои романы анонимно", "c": "literature"}, {"n": "Virginia Woolf", "nr": "Вирджиния Вулф", "b": 1882, "h": "novelist", "hr": "романист", "f": "She and her husband Leonard founded the Hogarth Press from their home, publishing T.S. Eliot and the first English translations of Freud", "fr": "Она с мужем Леонардом основала издательство Hogarth Press прямо у себя дома, публикуя Т.С. Элиота и первые английские переводы Фрейда", "c": "literature"}, {"n": "Franz Kafka", "nr": "Франц Кафка", "b": 1883, "h": "novelist", "hr": "романист", "f": "He asked his friend Max Brod to burn all his manuscripts after his death — Brod refused", "fr": "Он попросил своего друга Макса Брода сжечь все рукописи после смерти — Брод отказался", "c": "literature"}, {"n": "Thomas Mann", "nr": "Томас Манн", "b": 1875, "h": "novelist", "hr": "романист", "f": "He was forced to flee Germany after Hitler came to power and eventually became an American citizen", "fr": "После прихода Гитлера к власти он был вынужден бежать из Германии и в итоге получил американское гражданство", "c": "literature"}, {"n": "Marcel Proust", "nr": "Марсель Пруст", "b": 1871, "h": "novelist", "hr": "романист", "f": "His novel In Search of Lost Time is one of the longest ever written — over 1.5 million words across seven volumes", "fr": "Его роман «В поисках утраченного времени» — один из самых длинных в истории: более 1,5 миллиона слов в семи томах", "c": "literature"}, {"n": "James Joyce", "nr": "Джеймс Джойс", "b": 1882, "h": "novelist", "hr": "романист", "f": "He met Marcel Proust at a dinner party in 1922 — both admitted they hadn't read each other's work", "fr": "В 1922 году он встретился с Марселем Прустом на ужине — оба признались, что не читали друг друга", "c": "literature"}, {"n": "Miguel de Cervantes", "nr": "Мигель де Сервантес", "b": 1547, "h": "novelist", "hr": "романист", "f": "Don Quixote is considered the first modern novel", "fr": "«Дон Кихот» считается первым современным романом", "c": "literature"}, {"n": "Mark Twain", "nr": "Марк Твен", "b": 1835, "h": "novelist", "hr": "романист", "f": "His real name was Samuel Langhorne Clemens", "fr": "Его настоящее имя — Сэмюэл Лэнгхорн Клеменс", "c": "literature"}, {"n": "Ernest Hemingway", "nr": "Эрнест Хемингуэй", "b": 1899, "h": "novelist", "hr": "романист", "f": "He survived two plane crashes in consecutive days in 1954", "fr": "Он пережил два авиакрушения за два дня подряд в 1954 году", "c": "literature"}, {"n": "F. Scott Fitzgerald", "nr": "Фрэнсис Скотт Фицджеральд", "b": 1896, "h": "novelist", "hr": "романист", "f": "His novel The Great Gatsby sold poorly in his lifetime — it became a classic only after his death", "fr": "«Великий Гэтсби» плохо продавался при его жизни — классикой он стал лишь после смерти автора", "c": "literature"}, {"n": "William Faulkner", "nr": "Уильям Фолкнер", "b": 1897, "h": "novelist", "hr": "романист", "f": "He wrote As I Lay Dying in just six weeks while working night shifts at a power plant", "fr": "«Когда я умирала» он написал всего за шесть недель, работая в ночные смены на электр
